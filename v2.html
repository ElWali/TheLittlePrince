<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staatliches Bauhaus — SYSTEM_CORE_POST_V1</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- html2canvas for export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bauhaus: {
                            red: '#E3000F',
                            blue: '#0054A6',
                            yellow: '#FFD100',
                            black: '#111111',
                            white: '#F4F4F0',
                            gray: '#E5E5E5',
                            cream: '#EDE8DE'
                        }
                    },
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    animation: {
                        'marquee': 'marquee 30s linear infinite',
                        'marquee-reverse': 'marquee-reverse 30s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 3s linear infinite',
                        'blink': 'blink 1.2s step-end infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        },
                        'marquee-reverse': {
                            '0%': { transform: 'translateX(-50%)' },
                            '100%': { transform: 'translateX(0%)' },
                        },
                        scan: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' },
                        },
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F4F4F0;
            color: #111111;
            overflow-x: hidden;
        }
        .grid-bg {
            background-image: 
                linear-gradient(rgba(17,17,17,0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(17,17,17,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }
        .grid-bg-dark {
            background-image: 
                linear-gradient(rgba(244,244,240,0.06) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(244,244,240,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .dot-bg {
            background-image: radial-gradient(rgba(17,17,17,0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .shape-shadow { box-shadow: 8px 8px 0px #111111; }
        .shape-shadow-sm { box-shadow: 4px 4px 0px #111111; }
        .shape-shadow-hover:hover {
            box-shadow: 12px 12px 0px #111111;
            transform: translate(-4px, -4px);
        }
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,209,0,0.6), transparent);
            pointer-events: none;
        }
        .ticker {
            display: inline-block;
            padding: 2px 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .corner-bracket::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 12px; height: 12px;
            border-top: 2px solid currentColor;
            border-left: 2px solid currentColor;
        }
        .corner-bracket::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 12px; height: 12px;
            border-bottom: 2px solid currentColor;
            border-right: 2px solid currentColor;
        }
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .rotate-slow { animation: rotate-slow 20s linear infinite; }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ═══════════════════════════════════════════════════════════════
        // SYSTEM CONSTANTS
        // ═══════════════════════════════════════════════════════════════
        const SYSTEM_ID = "SYSTEM_CORE_POST_V1";
        const COORDINATES = {
            WEIMAR: { lat: 50.9797, lon: 11.3236, years: "1919–1925" },
            DESSAU: { lat: 51.8367, lon: 12.2350, years: "1925–1932" },
            BERLIN: { lat: 52.5200, lon: 13.4050, years: "1932–1933" }
        };

        // ═══════════════════════════════════════════════════════════════
        // DATA REGISTRIES
        // ═══════════════════════════════════════════════════════════════
        const MANIFESTO_TEXT = `Architects, sculptors, painters, we must all turn to the crafts! [...] Let us together create the new building of the future which will unite everything in simple form — architecture, sculpture, and painting, rising one day to heaven from the hands of a million workers as the crystal symbol of a new and coming faith.`;

        const PRINCIPLES = [
            { id: "P01", title: "Form Follows Function", desc: "The shape of a building or object should be primarily based upon its intended function or purpose. Ornament is crime; utility is beauty.", color: "bg-bauhaus-red" },
            { id: "P02", title: "Truth to Materials", desc: "Materials should be used in their most appropriate and honest form, celebrating their natural properties rather than disguising them.", color: "bg-bauhaus-blue" },
            { id: "P03", title: "Unity of Art & Technology", desc: "Bridging the gap between fine arts and applied arts, mass production, and craftsmanship. The machine is a medium, not a master.", color: "bg-bauhaus-yellow" },
            { id: "P04", title: "Gesamtkunstwerk", desc: "The 'total work of art' that integrates architecture, sculpture, painting, and design into a single cohesive whole.", color: "bg-bauhaus-black" }
        ];

        const TIMELINE = [
            { year: "1919", era: "WEIMAR", event: "Walter Gropius founds the Staatliches Bauhaus by merging the Grand Ducal School of Arts and Crafts with the Weimar Academy of Fine Art. The manifesto is published." },
            { year: "1920", era: "WEIMAR", event: "Johannes Itten establishes the foundational Vorkurs (preliminary course), emphasizing material studies and form theory." },
            { year: "1922", era: "WEIMAR", event: "Wassily Kandinsky joins the faculty. Paul Klee arrives, bringing color theory and pedagogical innovation." },
            { year: "1923", era: "WEIMAR", event: "First major Bauhaus exhibition. The school pivots toward 'Art and Technology: A New Unity' under pressure from De Stijl and Constructivism." },
            { year: "1925", era: "DESSAU", event: "Forced relocation to Dessau. Gropius designs the iconic Bauhaus building — a manifesto of modern architecture in glass, steel, and concrete." },
            { year: "1927", era: "DESSAU", event: "The architecture department is formally established. Marianne Brandt's metal workshop produces iconic industrial designs." },
            { year: "1928", era: "DESSAU", event: "Gropius resigns. Hannes Meyer becomes director, emphasizing social responsibility and scientific design methodology." },
            { year: "1930", era: "DESSAU", event: "Ludwig Mies van der Rohe takes over, shifting focus toward architecture and austere minimalism." },
            { year: "1932", era: "BERLIN", event: "The Nazis force the school out of Dessau. It relocates to Berlin as a private, underfunded institute." },
            { year: "1933", era: "BERLIN", event: "Under Gestapo pressure, Mies and the faculty vote to close the Bauhaus permanently. The diaspora begins." }
        ];

        const MASTERS = [
            { id: "M01", name: "Walter Gropius", role: "Founder & Director", years: "1919–1928", wiki: "Walter_Gropius", color: "bg-bauhaus-black text-bauhaus-white", desc: "Visionary architect who established the school's foundational philosophy of unifying art, craft, and technology. Designed the Dessau Bauhaus building." },
            { id: "M02", name: "Wassily Kandinsky", role: "Master of Form & Color", years: "1922–1933", wiki: "Wassily_Kandinsky", color: "bg-bauhaus-blue text-bauhaus-white", desc: "Pioneer of abstract art. Taught the preliminary course and mural painting, exploring the spiritual in art and geometric theory. Authored 'Point and Line to Plane'." },
            { id: "M03", name: "Paul Klee", role: "Master of Form", years: "1921–1931", wiki: "Paul_Klee", color: "bg-bauhaus-yellow text-bauhaus-black", desc: "Painter and color theorist. His pedagogical sketches remain foundational to modern design education. Bridged expressionism and constructivism." },
            { id: "M04", name: "László Moholy-Nagy", role: "Metal Workshop Master", years: "1923–1928", wiki: "László_Moholy-Nagy", color: "bg-bauhaus-red text-bauhaus-white", desc: "Hungarian painter and photographer. Took over the Vorkurs from Itten. Championed the integration of technology and industry into art education." },
            { id: "M05", name: "Marianne Brandt", role: "Metal Workshop Lead", years: "1924–1929", wiki: "Marianne_Brandt", color: "bg-bauhaus-black text-bauhaus-white", desc: "Pioneering industrial designer. Created iconic teapots and lamps that became symbols of Bauhaus functionalism. One of the few women to lead a workshop." },
            { id: "M06", name: "Herbert Bayer", role: "Typography & Printing", years: "1925–1928", wiki: "Herbert_Bayer", color: "bg-bauhaus-red text-bauhaus-white", desc: "Graphic designer who developed the 'universal typeface', advocating for the removal of capital letters. Designed the Bauhaus exhibition posters." }
        ];

        const ARTIFACTS = [
            { title: "Composition VIII", artist: "Kandinsky", year: "1923", type: "Painting" },
            { title: "Bauhaus Building, Dessau", artist: "Gropius", year: "1926", type: "Architecture" },
            { title: "Universal Typeface", artist: "Bayer", year: "1925", type: "Typography" },
            { title: "Ad Parnassum", artist: "Klee", year: "1932", type: "Painting" },
            { title: "MT8 Table Lamp", artist: "Brandt & Wagenfeld", year: "1924", type: "Industrial Design" },
            { title: "Red Balloon", artist: "Klee", year: "1922", type: "Painting" },
            { title: "Several Circles", artist: "Kandinsky", year: "1926", type: "Painting" },
            { title: "Wassily Chair (B3)", artist: "Breuer", year: "1925", type: "Furniture" }
        ];

        // ═══════════════════════════════════════════════════════════════
        // ICONS (Custom SVG)
        // ═══════════════════════════════════════════════════════════════
        const IconMenu = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const IconX = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconLayers = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const IconDownload = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconExternal = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconPin = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;

        // ═══════════════════════════════════════════════════════════════
        // NAVIGATION
        // ═══════════════════════════════════════════════════════════════
        const Navigation = ({ activeSection, setActiveSection, mobileMenuOpen, setMobileMenuOpen }) => {
            const links = [
                { id: 'hero', label: 'CORE_GRID', num: '01' },
                { id: 'manifesto', label: 'MANIFESTO', num: '02' },
                { id: 'timeline', label: 'CHRONICLE', num: '03' },
                { id: 'sandbox', label: 'GEOMETRIES', num: '04' },
                { id: 'masters', label: 'GUILD', num: '05' },
                { id: 'exhibition', label: 'EXHIBITION', num: '06' },
                { id: 'workshop', label: 'LABORATORY', num: '07' }
            ];

            return (
                <>
                    {/* Desktop Sidebar */}
                    <nav className="hidden md:flex fixed left-0 top-0 h-full w-60 bg-bauhaus-black text-bauhaus-white flex-col border-r-2 border-bauhaus-yellow z-50">
                        <div className="p-6 border-b-2 border-bauhaus-white/10">
                            <div className="flex items-center gap-2 mb-2">
                                <div className="w-3 h-3 bg-bauhaus-red"></div>
                                <div className="w-3 h-3 bg-bauhaus-yellow rounded-full"></div>
                                <div className="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[10px] border-b-bauhaus-blue"></div>
                            </div>
                            <h1 className="font-display font-bold text-xl tracking-tighter leading-none">STAATLICHES<br/>BAUHAUS</h1>
                            <p className="text-[10px] mt-2 text-bauhaus-gray font-mono tracking-widest">1919 — 1933 / DE</p>
                        </div>
                        <div className="flex-1 flex flex-col justify-center p-6 space-y-1">
                            {links.map(link => (
                                <button 
                                    key={link.id}
                                    onClick={() => setActiveSection(link.id)}
                                    className={`text-left font-mono text-xs tracking-wider transition-all duration-300 flex items-center gap-3 py-2 px-3 border-l-2 ${
                                        activeSection === link.id 
                                            ? 'text-bauhaus-yellow border-bauhaus-yellow bg-bauhaus-white/5' 
                                            : 'text-bauhaus-white/50 border-transparent hover:text-bauhaus-white hover:border-bauhaus-white/30'
                                    }`}
                                >
                                    <span className="opacity-60">{link.num}</span>
                                    <span>{link.label}</span>
                                </button>
                            ))}
                        </div>
                        <div className="p-6 border-t-2 border-bauhaus-white/10">
                            <div className="font-mono text-[10px] text-bauhaus-gray space-y-1">
                                <div className="flex justify-between"><span>SYS</span><span className="text-bauhaus-yellow">{SYSTEM_ID}</span></div>
                                <div className="flex justify-between"><span>STATUS</span><span className="text-bauhaus-red">● ACTIVE</span></div>
                                <div className="flex justify-between"><span>BUILD</span><span>2026.06</span></div>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Header */}
                    <header className="md:hidden fixed top-0 left-0 right-0 h-14 bg-bauhaus-black text-bauhaus-white flex items-center justify-between px-4 z-50 border-b-2 border-bauhaus-yellow">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 bg-bauhaus-red"></div>
                            <h1 className="font-display font-bold text-sm tracking-tighter">BAUHAUS / {SYSTEM_ID}</h1>
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2">
                            {mobileMenuOpen ? <IconX /> : <IconMenu />}
                        </button>
                    </header>

                    {/* Mobile Menu */}
                    {mobileMenuOpen && (
                        <div className="md:hidden fixed inset-0 bg-bauhaus-black text-bauhaus-white z-40 pt-20 px-6 flex flex-col space-y-1 overflow-y-auto">
                            {links.map(link => (
                                <button 
                                    key={link.id}
                                    onClick={() => { setActiveSection(link.id); setMobileMenuOpen(false); }}
                                    className="text-left font-mono text-sm tracking-wider border-b border-bauhaus-white/10 py-4 flex items-center gap-4"
                                >
                                    <span className="text-bauhaus-yellow">{link.num}</span>
                                    <span>{link.label}</span>
                                </button>
                            ))}
                        </div>
                    )}
                </>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        // HERO — THE CORE GRID
        // ═══════════════════════════════════════════════════════════════
        const Hero = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [time, setTime] = useState(new Date());
            const containerRef = useRef(null);

            useEffect(() => {
                const interval = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(interval);
            }, []);

            const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width / 2) / 25;
                const y = (e.clientY - rect.top - rect.height / 2) / 25;
                setMousePos({ x, y });
            };

            return (
                <section id="hero" className="min-h-screen flex flex-col justify-center pt-14 md:pt-0 relative overflow-hidden bg-bauhaus-white grid-bg">
                    {/* Top System Bar */}
                    <div className="absolute top-0 left-0 right-0 bg-bauhaus-black text-bauhaus-white px-6 py-2 flex items-center justify-between font-mono text-[10px] tracking-widest z-10">
                        <div className="flex items-center gap-4">
                            <span className="text-bauhaus-yellow">● REC</span>
                            <span>{SYSTEM_ID}</span>
                            <span className="hidden md:inline">/ CORE_GRID_MODULE</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="hidden md:inline">{time.toISOString().slice(0,19).replace('T', ' ')}</span>
                            <span className="animate-blink">▮</span>
                        </div>
                    </div>

                    <div 
                        ref={containerRef}
                        onMouseMove={handleMouseMove}
                        className="relative w-full max-w-6xl mx-auto px-6 md:px-12 flex-1 flex items-center"
                        style={{ perspective: '1200px' }}
                    >
                        <div className="grid md:grid-cols-2 gap-12 items-center w-full">
                            {/* Left: Composition */}
                            <div 
                                className="relative aspect-square max-w-lg mx-auto w-full transition-transform duration-100 ease-out"
                                style={{ transform: `rotateY(${mousePos.x}deg) rotateX(${-mousePos.y}deg)`, transformStyle: 'preserve-3d' }}
                            >
                                {/* Red Square */}
                                <div 
                                    className="absolute top-[10%] left-[10%] w-[45%] h-[45%] bg-bauhaus-red shape-shadow z-10 mix-blend-multiply"
                                    style={{ transform: `translateZ(20px) translate(${mousePos.x * 0.5}px, ${mousePos.y * 0.5}px)` }}
                                ></div>
                                
                                {/* Blue Circle */}
                                <div 
                                    className="absolute bottom-[5%] right-[5%] w-[55%] h-[55%] bg-bauhaus-blue rounded-full shape-shadow z-20 mix-blend-multiply"
                                    style={{ transform: `translateZ(40px) translate(${mousePos.x * -1}px, ${mousePos.y * -1}px)` }}
                                ></div>
                                
                                {/* Yellow Triangle */}
                                <div 
                                    className="absolute top-[30%] left-[35%] w-0 h-0 border-l-[70px] border-l-transparent border-r-[70px] border-r-transparent border-b-[120px] border-b-bauhaus-yellow shape-shadow z-30 mix-blend-multiply"
                                    style={{ transform: `translateZ(60px) rotate(${mousePos.x * 2}deg)` }}
                                ></div>

                                {/* Corner brackets */}
                                <div className="absolute inset-0 border-2 border-bauhaus-black/20 pointer-events-none"></div>
                                <div className="absolute -top-2 -left-2 w-4 h-4 border-t-2 border-l-2 border-bauhaus-black"></div>
                                <div className="absolute -top-2 -right-2 w-4 h-4 border-t-2 border-r-2 border-bauhaus-black"></div>
                                <div className="absolute -bottom-2 -left-2 w-4 h-4 border-b-2 border-l-2 border-bauhaus-black"></div>
                                <div className="absolute -bottom-2 -right-2 w-4 h-4 border-b-2 border-r-2 border-bauhaus-black"></div>
                            </div>

                            {/* Right: Typography */}
                            <div className="relative">
                                <div className="font-mono text-[10px] text-bauhaus-black/60 tracking-widest mb-4">
                                    / 01 — CORE_GRID / INTERACTIVE_COMPOSITION
                                </div>
                                <h2 className="font-display text-6xl md:text-8xl font-bold leading-[0.85] tracking-tighter mb-8">
                                    FORM<br/>
                                    FOLLOWS<br/>
                                    <span className="text-bauhaus-red">FUNCTION</span>
                                </h2>
                                <div className="border-l-4 border-bauhaus-black pl-6 max-w-md">
                                    <p className="font-body text-sm md:text-base leading-relaxed mb-4 italic">
                                        "{MANIFESTO_TEXT.slice(0, 180)}..."
                                    </p>
                                    <p className="font-mono text-xs text-bauhaus-black/60">— WALTER GROPIUS, 1919</p>
                                </div>
                                <div className="mt-8 flex flex-wrap gap-2">
                                    {['RED/SQUARE', 'BLUE/CIRCLE', 'YELLOW/TRIANGLE'].map((tag, i) => (
                                        <span key={i} className="ticker bg-bauhaus-black text-bauhaus-white">{tag}</span>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Coordinates */}
                    <div className="relative border-t-2 border-bauhaus-black bg-bauhaus-cream">
                        <div className="max-w-6xl mx-auto px-6 md:px-12 py-4 grid grid-cols-3 gap-4 font-mono text-xs">
                            {Object.entries(COORDINATES).map(([city, data]) => (
                                <div key={city} className="flex items-center gap-2">
                                    <IconPin />
                                    <div>
                                        <div className="font-bold">{city}</div>
                                        <div className="text-bauhaus-black/60 text-[10px]">{data.lat.toFixed(4)}°N, {data.lon.toFixed(4)}°E / {data.years}</div>
                                    </div>

                if (!audioActive || !audioCtxRef.current) return;
                const osc = audioCtxRef.current.createOscillator();
                const gain = audioCtxRef.current.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, audioCtxRef.current.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtxRef.current.currentTime + 1.5);
                osc.connect(gain);
                gain.connect(audioCtxRef.current.destination);
                osc.start();
                osc.stop(audioCtxRef.current.currentTime + 1.5);

                const id = Date.now();
                setRipples(r => [...r, { id, freq }]);

        // ═══════════════════════════════════════════════════════════════
        const Workshop = () => {
            const [shapes, setShapes] = useState([]);
            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [formData, setFormData] = useState({ name: '', email: '', title: '' });
            const [submitted, setSubmitted] = useState(false);
            const [exporting, setExporting] = useState(false);
            const canvasRef = useRef(null);

            const addShape = (type) => {
                const id = Date.now() + Math.random();
                const newShape = {
                    id,
                    type,
                    x: 100 + Math.random() * 150,
                    y: 100 + Math.random() * 150,
                    color: type === 'square' ? '#E3000F' : type === 'circle' ? '#0054A6' : '#FFD100',
                    rotation: Math.floor(Math.random() * 360),
                    size: 60 + Math.random() * 40
                };
                setShapes([...shapes, newShape]);
            };

            const handleMouseDown = (e, id) => {
                e.preventDefault();
                const shape = shapes.find(s => s.id === id);
                const rect = e.currentTarget.parentElement.getBoundingClientRect();
                setDraggingId(id);
                setDragOffset({
                    x: e.clientX - rect.left - shape.x,
                    y: e.clientY - rect.top - shape.y
                });
            };

            const handleMouseMove = useCallback((e) => {
                if (draggingId !== null && canvasRef.current) {
                    const rect = canvasRef.current.getBoundingClientRect();
                    setShapes(prev => prev.map(s => 
                        s.id === draggingId 
                            ? { ...s, x: e.clientX - rect.left - dragOffset.x, y: e.clientY - rect.top - dragOffset.y }
                            : s
                    ));
                }
            }, [draggingId, dragOffset]);

            const handleMouseUp = useCallback(() => setDraggingId(null), []);

            useEffect(() => {
                if (draggingId !== null) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                    return () => {
                        window.removeEventListener('mousemove', handleMouseMove);
                        window.removeEventListener('mouseup', handleMouseUp);
                    };
                }
            }, [draggingId, handleMouseMove, handleMouseUp]);

            const rotateShape = (id) => {
                setShapes(prev => prev.map(s => s.id === id ? { ...s, rotation: s.rotation + 45 } : s));
            };

            const deleteShape = (id) => {
                setShapes(prev => prev.filter(s => s.id !== id));
            };

            const exportCanvas = async () => {
                if (!canvasRef.current) return;
                setExporting(true);
                try {
                    const canvas = await html2canvas(canvasRef.current, { backgroundColor: '#F4F4F0' });
                    const link = document.createElement('a');
                    link.download = `bauhaus_composition_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                } catch (e) {
                    console.error('Export failed', e);
                } finally {
                    setExporting(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setSubmitted(true);
                setTimeout(() => {
                    setShapes([]);
                    setFormData({ name: '', email: '', title: '' });
                    setSubmitted(false);
                }, 3000);
            };

            return (
                <section id="workshop" className="min-h-screen bg-bauhaus-white py-20 px-4 md:px-20 relative">
                    <div className="max-w-6xl mx-auto">
                        <div className="font-mono text-[10px] text-bauhaus-black/60 tracking-widest mb-4">
                            / 07 — LABORATORY / POSTER_ENGINE / COMPOSITION_TOOL
                        </div>
                        <h2 className="font-display text-5xl md:text-7xl font-bold mb-4 tracking-tighter">
                            DESIGN<br/><span className="text-bauhaus-yellow">LABORATORY</span>
                        </h2>
                        <p className="font-body text-bauhaus-black/60 mb-12 max-w-xl">Spawn, layer, and compose geometric elements. Drag shapes to arrange your poster. Export as PNG or register to the academy archive.</p>

                        <div className="grid lg:grid-cols-3 gap-6">
                            {/* Controls */}
                            <div className="lg:col-span-1 space-y-4">
                                <div className="border-2 border-bauhaus-black p-5 bg-bauhaus-cream">
                                    <h3 className="font-display font-bold text-lg mb-4 flex items-center gap-2"><IconLayers /> TOOLBOX</h3>
                                    <div className="grid grid-cols-3 gap-2 mb-3">
                                        <button 
                                            onClick={() => addShape('square')} 
                                            className="aspect-square bg-bauhaus-red shape-shadow-sm hover:scale-105 transition-all border-2 border-bauhaus-black"
                                            title="Add Square"
                                        ></button>
                                        <button 
                                            onClick={() => addShape('circle')} 
                                            className="aspect-square bg-bauhaus-blue rounded-full shape-shadow-sm hover:scale-105 transition-all border-2 border-bauhaus-black"
                                            title="Add Circle"
                                        ></button>
                                        <button 
                                            onClick={() => addShape('triangle')} 
                                            className="aspect-square flex items-center justify-center shape-shadow-sm hover:scale-105 transition-all border-2 border-bauhaus-black bg-bauhaus-white"
                                            title="Add Triangle"
                                        >
                                            <div className="w-0 h-0 border-l-[18px] border-l-transparent border-r-[18px] border-r-transparent border-b-[30px] border-b-bauhaus-yellow"></div>
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button 
                                            onClick={exportCanvas} 
                                            disabled={exporting || shapes.length === 0}
                                            className="py-2 border-2 border-bauhaus-black font-mono text-[10px] uppercase tracking-widest hover:bg-bauhaus-black hover:text-bauhaus-white transition-colors flex items-center justify-center gap-1 disabled:opacity-40"
                                        >
                                            <IconDownload /> EXPORT PNG
                                        </button>
                                        <button 
                                            onClick={() => setShapes([])} 
                                            disabled={shapes.length === 0}
                                            className="py-2 border-2 border-bauhaus-black font-mono text-[10px] uppercase tracking-widest hover:bg-bauhaus-red hover:text-bauhaus-white transition-colors flex items-center justify-center gap-1 disabled:opacity-40"
                                        >
                                            <IconTrash /> CLEAR
                                        </button>
                                    </div>
                                </div>

                                <div className="border-2 border-bauhaus-black p-5 bg-bauhaus-black text-bauhaus-white">
                                    <h3 className="font-display font-bold text-lg mb-4">ARCHIVE REGISTRATION</h3>
                                    {submitted ? (
                                        <div className="text-bauhaus-yellow font-mono text-xs text-center py-6 border border-bauhaus-yellow">
                                            <div className="text-2xl mb-2">✓</div>
                                            COMMITTED TO REGISTER<br/>
                                            <span className="text-bauhaus-white/50">ID: #{Date.now().toString(36).toUpperCase()}</span>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleSubmit} className="space-y-3">
                                            <div>
                                                <label className="text-[10px] uppercase tracking-widest text-bauhaus-gray block mb-1 font-mono">Composition Title</label>
                                                <input required type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full bg-bauhaus-white/10 border border-bauhaus-white/30 p-2 text-bauhaus-white focus:outline-none focus:border-bauhaus-yellow font-body text-sm" placeholder="Untitled Composition" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] uppercase tracking-widest text-bauhaus-gray block mb-1 font-mono">Student Name</label>
                                                <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-bauhaus-white/10 border border-bauhaus-white/30 p-2 text-bauhaus-white focus:outline-none focus:border-bauhaus-yellow font-body text-sm" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] uppercase tracking-widest text-bauhaus-gray block mb-1 font-mono">Workshop Email</label>
                                                <input required type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full bg-bauhaus-white/10 border border-bauhaus-white/30 p-2 text-bauhaus-white focus:outline-none focus:border-bauhaus-yellow font-body text-sm" />
                                            </div>
                                            <button type="submit" className="w-full py-3 bg-bauhaus-yellow text-bauhaus-black font-mono text-xs uppercase tracking-widest hover:bg-bauhaus-white transition-colors font-bold">
                                                SUBMIT COMPOSITION
                                            </button>
                                        </form>
                                    )}
                                </div>

                                {/* Shape list */}
                                {shapes.length > 0 && (
                                    <div className="border-2 border-bauhaus-black p-5 bg-bauhaus-cream">
                                        <h3 className="font-mono text-[10px] uppercase tracking-widest mb-3 text-bauhaus-black/60">
                                            LAYER_STACK / {shapes.length} OBJECTS
                                        </h3>
                                        <div className="space-y-1 max-h-48 overflow-y-auto">
                                            {shapes.map((s, i) => (
                                                <div key={s.id} className="flex items-center gap-2 text-xs font-mono py-1 border-b border-bauhaus-black/10">
                                                    <span className="text-bauhaus-black/40">#{String(i + 1).padStart(2, '0')}</span>
                                                    <span className="w-3 h-3 flex-shrink-0" style={{ background: s.color, borderRadius: s.type === 'circle' ? '50%' : 0 }}></span>
                                                    <span className="flex-1 uppercase">{s.type}</span>
                                                    <button onClick={() => rotateShape(s.id)} className="text-bauhaus-black/60 hover:text-bauhaus-blue" title="Rotate">↻</button>
                                                    <button onClick={() => deleteShape(s.id)} className="text-bauhaus-black/60 hover:text-bauhaus-red" title="Delete">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Canvas */}
                            <div className="lg:col-span-2">
                                <div 
                                    ref={canvasRef}
                                    className="relative w-full aspect-[4/5] md:aspect-[4/3] bg-bauhaus-white border-4 border-bauhaus-black shadow-2xl overflow-hidden dot-bg"
                                >
                                    {/* Canvas watermark */}
                                    <div className="absolute bottom-2 right-3 font-mono text-[9px] text-bauhaus-black/30 tracking-widest pointer-events-none">
                                        BAUHAUS / {SYSTEM_ID}
                                    </div>
                                    <div className="absolute top-2 left-3 font-mono text-[9px] text-bauhaus-black/30 tracking-widest pointer-events-none">
                                        {formData.title || 'UNTITLED_COMPOSITION'}
                                    </div>

                                    {shapes.length === 0 && (
                                        <div className="absolute inset-0 flex items-center justify-center text-bauhaus-black/20 font-mono text-sm pointer-events-none">
                                            <div className="text-center">
                                                <div className="text-4xl mb-2">+</div>
                                                <div>SELECT A SHAPE TO BEGIN</div>
                                            </div>
                                        </div>
                                    )}
                                    {shapes.map((shape, idx) => (
                                        <div
                                            key={shape.id}
                                            onMouseDown={(e) => handleMouseDown(e, shape.id)}
                                            onDoubleClick={() => rotateShape(shape.id)}
                                            className={`absolute cursor-move shape-shadow-sm transition-shadow hover:z-50 ${draggingId === shape.id ? 'z-50' : ''}`}
                                            style={{
                                                left: shape.x,
                                                top: shape.y,
                                                width: shape.type === 'triangle' ? '0' : `${shape.size}px`,
                                                height: shape.type === 'triangle' ? '0' : `${shape.size}px`,
                                                borderLeft: shape.type === 'triangle' ? `${shape.size/2}px solid transparent` : 'none',
                                                borderRight: shape.type === 'triangle' ? `${shape.size/2}px solid transparent` : 'none',
                                                borderBottom: shape.type === 'triangle' ? `${shape.size * 0.87}px solid ${shape.color}` : 'none',
                                                backgroundColor: shape.type !== 'triangle' ? shape.color : 'transparent',
                                                borderRadius: shape.type === 'circle' ? '50%' : 0,
                                                transform: `rotate(${shape.rotation}deg)`,
                                                zIndex: draggingId === shape.id ? 100 : idx + 1
                                            }}
                                        ></div>
                                    ))}
                                </div>
                                <div className="mt-3 font-mono text-[10px] text-bauhaus-black/50 tracking-widest">
                                    DRAG_TO_POSITION / DOUBLE_CLICK_TO_ROTATE / {shapes.length} OBJECTS_IN_SCENE
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        // FOOTER
        // ═══════════════════════════════════════════════════════════════
        const Footer = () => {
            return (
                <footer className="bg-bauhaus-black text-bauhaus-white py-12 px-6 md:px-20 border-t-4 border-bauhaus-yellow relative grid-bg-dark">
                    <div className="max-w-6xl mx-auto">
                        <div className="grid md:grid-cols-3 gap-8 mb-8">
                            <div>
                                <div className="flex items-center gap-2 mb-3">
                                    <div className="w-3 h-3 bg-bauhaus-red"></div>
                                    <div className="w-3 h-3 bg-bauhaus-yellow rounded-full"></div>
                                    <div className="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[10px] border-b-bauhaus-blue"></div>
                                </div>
                                <h4 className="font-display font-bold text-2xl tracking-tighter">STAATLICHES BAUHAUS</h4>
                                <p className="text-bauhaus-gray text-xs mt-2 font-mono tracking-widest">WEIMAR • DESSAU • BERLIN</p>
                                <p className="text-bauhaus-gray text-xs mt-1 font-mono">1919 — 1933</p>
                            </div>
                            <div>
                                <h5 className="font-mono text-[10px] text-bauhaus-yellow tracking-widest mb-3">SYSTEM_INFO</h5>
                                <div className="space-y-1 font-mono text-xs text-bauhaus-gray">
                                    <div>ID: {SYSTEM_ID}</div>
                                    <div>STACK: REACT 18 / TAILWIND / BABEL</div>
                                    <div>AUDIO: WEB_AUDIO_API</div>
                                    <div>DATA: WIKIPEDIA REST API</div>
                                    <div>EXPORT: HTML2CANVAS</div>
                                </div>
                            </div>
                            <div>
                                <h5 className="font-mono text-[10px] text-bauhaus-yellow tracking-widest mb-3">COORDINATES</h5>
                                <div className="space-y-2 font-mono text-xs text-bauhaus-gray">
                                    {Object.entries(COORDINATES).map(([city, data]) => (
                                        <div key={city} className="flex justify-between">
                                            <span>{city}</span>
                                            <span>{data.lat.toFixed(4)}°N, {data.lon.toFixed(4)}°E</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="border-t border-bauhaus-white/10 pt-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                            <p className="font-mono text-[10px] text-bauhaus-gray tracking-widest">
                                FORM FOLLOWS FUNCTION / © 1919–1933 / EDUCATIONAL_RECONSTRUCTION
                            </p>
                            <p className="font-mono text-[10px] text-bauhaus-gray tracking-widest">
                                BUILT WITH REACT + TAILWIND + WEB AUDIO API
                            </p>
                        </div>
                    </div>
                </footer>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        // APP ROOT
        // ═══════════════════════════════════════════════════════════════
        const App = () => {
            const [activeSection, setActiveSection] = useState('hero');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const element = document.getElementById(activeSection);
                if (element) {
                    const offset = window.innerWidth < 768 ? 56 : 0;
                    const top = element.getBoundingClientRect().top + window.pageYOffset - offset;
                    window.scrollTo({ top, behavior: 'smooth' });
                }
            }, [activeSection]);

            // Track active section on scroll
            useEffect(() => {
                const sections = ['hero', 'manifesto', 'timeline', 'sandbox', 'masters', 'exhibition', 'workshop'];
                const handleScroll = () => {
                    const scrollPos = window.scrollY + 200;
                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el && el.offsetTop <= scrollPos && el.offsetTop + el.offsetHeight > scrollPos) {
                            setActiveSection(id);
                            break;
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="font-body antialiased selection:bg-bauhaus-yellow selection:text-bauhaus-black">
                    <Navigation 
                        activeSection={activeSection} 
                        setActiveSection={setActiveSection}
                        mobileMenuOpen={mobileMenuOpen}
                        setMobileMenuOpen={setMobileMenuOpen}
                    />
                    
                    <main className="md:ml-60">
                        <Hero />
                        <Manifesto />
                        <Chronicle />
                        <Sandbox />
                        <MastersGuild />
                        <Exhibition />
                        <Workshop />
                        <Footer />
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
