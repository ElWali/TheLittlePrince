ibérés du poids du soleil. La nuit : cette demeure…</p>\\n<p>Mais comment croire à notre paix ? Les vents alizés glissaient sans repos vers le Sud. Ils essuyaient la plage avec un bruit de soie. Ce n’étaient plus ces vents d’Europe qui tournent, cèdent ; ils étaient établis sur nous comme sur le rapide en marche. Parfois la nuit, ils nous touchaient, si durs, que l’on s’appuyait contre eux, face au Nord, avec le sentiment d’être emporté, de les remonter vers un but obscur. Quelle hâte, quelle inquiétude !</p>\\n<p>Le soleil tournait, ramenait le jour. Les Maures s’agitaient peu. Ceux qui s’aventuraient jusqu’au fort espagnol gesticulaient, portaient leur fusil comme un jouet. C’était le Sahara vu des coulisses : les tribus insoumises y perdaient leur mystère et livraient quelques figurants.</p>\\n<p>Nous vivions les uns sur les autres en face de notre propre image, la plus bornée. C’est pourquoi nous ne savions pas être isolés dans le désert : il nous eût fallu rentrer chez nous pour imaginer notre éloignement, et le découvrir dans sa perspective.</p>","<p>Nous n’allions guère qu’à cinq cents mètres où commençait la dissidence, captifs des Maures et de nous-mêmes. Nos plus proches voisins, ceux de Cisneros, de Port-Étienne, étaient, à sept cents, mille kilomètres, pris aussi dans le Sahara comme dans une gangue. Ils gravitaient autour du même fort. Nous les connaissions par leurs surnoms, par leurs manies, mais il y avait entre nous la même épaisseur de silence qu’entre les planètes habitées.</p>\\n<p>Ce matin-là, le monde commençait pour nous à s’émouvoir. L’opérateur de T.S.F. nous remit enfin un télégramme : deux pylônes, plantés dans le sable, nous reliaient une fois par semaine à ce monde :</p>\\n<p>« Courrier France-Amérique parti de Toulouse 5 h. 45 stop. Passé Alicante 11 h. 10. »</p>\\n<p>Toulouse parlait, Toulouse, tête de ligne. Dieu lointain.</p>\\n<p>En dix minutes, la nouvelle nous parvenait par Barcelone, par Casablanca, par Agadir, puis se propageait vers Dakar. Sur cinq mille kilomètres de ligne, les aéroports étaient alertés. À la reprise de six heures du soir, on nous communiquait encore :</p>\\n<p>« Courrier atterrira Agadir 21 heures repartira pour Cabo Juby 21 h. 30, s’y posera avec bombe Michelin stop. Cabo Juby préparera feux habituels stop. Ordre rester en contact avec Agadir. Signé : Toulouse. »</p>\\n<p>De l’observatoire de Cabo Juby, isolés en plein Sahara, nous suivions une comète lointaine.</p>\\n<p>Vers six heures du soir le Sud s’agitait :</p>\\n<p>« De Dakar pour Port-Étienne, Cisneros, Juby : communiquer urgence nouvelles courrier. »</p>","<p>« De Juby pour Cisneros, Port-Étienne, Dakar : pas de nouvelles depuis passage 11 h. 10 Alicante. »</p>\\n<p>Un moteur grondait quelque part. De Toulouse jusqu’au Sénégal on cherchait à l’entendre.</p>","<h2>II</h2>\\n<p>Toulouse 5 h. 30.</p>\\n<p>La voiture de l’aéroport stoppe net à l’entrée du hangar, ouvert sur la nuit mêlée de pluie. Des ampoules de cinq cents bougies livrent des objets durs, nus, précis comme ceux d’un stand. Sous cette voûte chaque mot prononcé résonne, demeure, charge le silence.</p>\\n<p>Tôles luisantes, moteur sans cambouis. L’avion semble neuf. Horlogerie délicate à quoi touchaient les mécaniciens avec des doigts d’inventeurs. Maintenant ils s’écartent de l’œuvre au point.</p>\\n<p>« Pressons, messieurs, pressons… »</p>\\n<p>Sac par sac, le courrier s’enfonce dans le ventre de l’appareil. Pointage rapide :</p>\\n<p>– Buenos-Ayres… Natal… Dakar… Casa… Dakar… Trente-neuf sacs. Exact ?</p>\\n<p>– Exact.</p>\\n<p>Le pilote s’habille. Chandails, foulard, combinaison de cuir, bottes fourrées. Son corps endormi pèse. On l’interpelle : « Allons ! Pressons… » Les mains encombrées de sa montre, de son altimètre, de son porte-cartes, les doigts gourds sous les gants épais, il se hisse lourd et maladroit jusqu’au poste de pilotage. Scaphandrier hors de son élément. Mais une fois en place, tout s’allège.</p>\\n<p>Un mécanicien monte à lui :</p>\\n<p>– Six cent trente kilos.</p>\\n<p>– Bien. Passagers ?</p>\\n<p>– Trois.</p>\\n<p>Il les prend en consigne sans les voir.</p>\\n<p>Le chef de piste fait demi-tour vers les manœuvres :</p>\\n<p>– Qui a goupillé ce capot ?</p>\\n<p>– Moi.</p>\\n<p>– Vingt francs d’amende.</p>","<p>Le chef de piste jette un dernier coup d’œil : ordre absolu des choses ; gestes réglés comme pour un ballet. Cet avion a sa place exacte dans ce hangar, comme dans cinq minutes dans ce ciel. Ce vol aussi bien calculé que le lancement d’un navire. Cette goupille qui manque : erreur éclatante. Ces ampoules de cinq cents bougies, ces regards précis, cette dureté pour que ce vol relancé d’escale en escale jusqu’à Buenos-Ayres ou Santiago du Chili soit un effet de balistique et non une œuvre de hasard. Pour que, malgré les tempêtes, les brumes, les tornades, malgré les mille pièges du ressort de soupape, du culbuteur, de la matière, soient rejoints, distancés, effacés : express, rapides, cargos, vapeurs ! Et touchés dans un temps record Buenos-Ayres ou Santiago du Chili.</p>\\n<p>– Mettez en route.</p>\\n<p>On passe un papier au pilote Bernis : le plan de bataille.</p>\\n<p>Bernis lit :</p>\\n<p>« Perpignan signale ciel clair, vent nul. Barcelone : tempête. Alicante… »</p>\\n<p>Toulouse. 5 h. 45.</p>\\n<p>Les roues puissantes écrasent les cales. Battue par le vent de l’hélice, l’herbe jusqu’à vingt mètres en arrière semble couler. Bernis, d’un mouvement de son poignet, déchaîne ou retient l’orage.</p>","<p>Le bruit s’enfle maintenant, dans les reprises répétées, jusqu’à devenir un milieu dense, presque solide où le corps se trouve enfermé. Quand le pilote le sent combler en lui quelque chose de jusqu’alors inassouvi, il pense : c’est bien. Puis regarde le capot noir appuyé sur le ciel, à contre-jour, en obusier. Derrière l’hélice, un paysage d’aube tremble.</p>\\n<p>Ayant roulé, lentement, vent debout, il tire à lui la manette des gaz. L’avion, happé par l’hélice, fonce. Les premiers bonds sur l’air élastique s’amortissent et le sol enfin paraît se tendre, luire sous les roues comme une courroie. Ayant jugé l’air, d’abord impalpable puis fluide, devenu maintenant solide, le pilote s’y appuie et monte.</p>\\n<p>Les arbres qui bordent la piste livrent l’horizon et se dérobent. À deux cents mètres on se penche encore sur une bergerie d’enfant, aux arbres posés droit, aux maisons peintes, et les forêts gardent leur épaisseur de fourrure : terre habitée…</p>\\n<p>Bernis cherche l’inclinaison du dos, la position exacte du coude qui sont nécessaires à sa paix. Derrière lui, les nuages bas de Toulouse figurent le hall sombre des gares. Maintenant, il résiste moins à l’avion qui cherche à monter, laisse s’épanouir un peu la force que sa main comprime. Il libère d’un mouvement de son poignet chaque vague qui le soulève et qui se propage en lui comme une onde.</p>","<p>Dans cinq heures Alicante, ce soir l’Afrique. Bernis rêve. Il est en paix : « J’ai mis de l’ordre. » Hier, il quittait Paris par l’express du soir ; quelles étranges vacances. Il en garde le souvenir confus d’un tumulte obscur. Il souffrira plus tard, mais, pour l’instant, il abandonne tout en arrière comme si tout se continuait en dehors de lui. Pour l’instant, il lui semble naître avec le petit jour qui monte, aider, ô matinal, à construire ce jour. Il pense : « Je ne suis plus qu’un ouvrier, j’établis le courrier d’Afrique. » Et chaque jour, pour l’ouvrier, qui commence à bâtir le monde, le monde commence.</p>\\n<p>« J’ai mis de l’ordre… » Dernier soir dans l’appartement. Journaux pliés autour des blocs de livres. Lettres brûlées, lettres classées, housses des meubles. Chaque chose cernée, tirée de sa vie, posée dans l’espace. Et ce tumulte du cœur qui n’avait plus de sens.</p>\\n<p>Il s’est préparé pour le lendemain comme pour un voyage. Il s’est embarqué pour le jour suivant comme pour une Amérique. Tant de choses inachevées l’attachaient encore à lui-même. Et tout à coup, il était libre. Bernis a presque peur de se découvrir si disponible, si mortel.</p>\\n<p>Carcassonne, escale de secours, sous lui dérive.</p>\\n<p>Quel monde bien rangé aussi – 3.000 mètres. – Rangé comme dans sa boîte la bergerie. Maisons, canaux, routes, jouets des hommes.</p>","<p>Monde loti, monde carrelé, où chaque champ touche sa haie, le parc son mur. Carcassonne où chaque mercière refait la vie de son aïeule. Humbles bonheurs parqués. Jouets des hommes bien rangés dans leur vitrine.</p>\\n<p>Monde en vitrine, trop exposé, trop étalé, villes en ordre sur la carte roulée et qu’une terre lente porte à lui avec la sûreté d’une marée.</p>\\n<p>Il songe qu’il est seul. Sur le cadran de l’altimètre le soleil miroite. Un soleil lumineux et glacé. Un coup de palonnier : le paysage entier dérive. Cette lumière est minérale, ce sol apparaît minéral : ce qui fait la douceur, le parfum, la faiblesse des choses vivantes est aboli.</p>\\n<p>Et pourtant, sous la veste de cuir, une chair tiède – et fragile, Bernis. – Sous les gants épais des mains merveilleuses qui savaient, Geneviève, caresser du revers des doigts ton visage…</p>\\n<p>Voici l’Espagne.</p>","<h2>III</h2>\\n<p>Aujourd’hui, Jacques Bernis, tu franchiras l’Espagne avec une tranquillité de propriétaire. Des visions connues, une à une, s’établiront. Tu joueras des coudes, avec aisance, entre les orages. Barcelone, Valence, Gibraltar, apportées à toi, emportées. C’est bien. Tu dévideras ta carte roulée, le travail fini s’entasse en arrière. Mais je me souviens de tes premiers pas, de mes derniers conseils, la veille de ton premier courrier. Tu devais, à l’aube, prendre dans tes bras les méditations d’un peuple. Dans tes faibles bras. Les porter à travers mille embûches comme un trésor sous le manteau. Courrier précieux, t’avait-on dit, courrier plus précieux que la vie. Et si fragile. Et qu’une faute disperse en flammes, et mêle au vent. Je me souviens de cette veillée d’armes :</p>\\n<p>– Et alors ?</p>\\n<p>– Alors tu tâcherais d’atteindre la plage de Peniscola. Méfie-toi des barques de pêche.</p>\\n<p>– Ensuite ?</p>\\n<p>– Ensuite jusqu’à Valence tu trouveras toujours des terrains de secours : je les souligne au crayon rouge. Faute de mieux, pose-toi dans les rios secs.</p>\\n<p>Bernis retrouvait le collège sous l’abat-jour vert de cette lampe, devant ces cartes dépliées. Mais de chaque point du sol, son maître d’aujourd’hui lui dégageait un secret vivant. Les pays inconnus ne livraient plus de chiffres morts, mais de vrais champs avec leurs fleurs – où justement il faut se méfier de cet arbre – mais de vraies plages avec leur sable – où, vers le soir, il faut éviter les pêcheurs.</p>","<p>Déjà tu savais, Jacques Bernis, que nous ne connaîtrons jamais de Grenade ou d’Almeria ni l’Alhambra, ni les mosquées, mais un ruisseau, un oranger, mais leurs plus humbles confidences.</p>\\n<p>– Écoute-moi donc : s’il fait beau ici, tu passes tout droit. Mais, s’il fait mauvais, si tu voles bas, tu appuies à gauche, tu t’engages dans cette vallée.</p>\\n<p>– Je m’engage dans cette vallée.</p>\\n<p>– Tu rejoins la mer, plus tard, par ce col.</p>\\n<p>– Je rejoins la mer par ce col.</p>\\n<p>– Et tu te méfies de ton moteur : la falaise à pic et des rochers.</p>\\n<p>– Et s’il me plaque ?</p>\\n<p>– Tu te débrouilles.</p>\\n<p>Et Bernis souriait : les pilotes jeunes sont romanesques. Un rocher passe, en jet de fronde, et l’assassine. Un enfant court, mais une main l’arrête au front et le renverse…</p>\\n<p>– Mais non, mon vieux, mais non ! on se débrouille.</p>\\n<p>Et Bernis était fier de cet enseignement : son enfance n’avait pas tiré de l’Énéide un seul secret qui le protégeât de la mort. Le doigt du professeur sur la carte d’Espagne n’était pas un doigt de sourcier et ne démasquait ni trésor ni piège, ne touchait pas cette bergère dans ce pré.</p>\\n<p>Quelle douceur aujourd’hui répandait cette lampe dont coulait une lumière d’huile. Ce filet d’huile qui fait le calme dans la mer. Dehors il ventait. Cette chambre était bien un îlot dans le monde comme une auberge de marins.</p>\\n<p>– Un petit Porto ?</p>\\n<p>– Bien sûr…</p>","<p>Chambre de pilote, auberge incertaine, il fallait souvent te rebâtir. La compagnie nous avisait la veille au soir : « Le pilote X est affecté au Sénégal… à l’Amérique… » Il fallait, la nuit même, dénouer ses liens, clouer ses caisses, déshabiller sa chambre de soi-même, de ses photos, de ses bouquins et la laisser derrière soi, moins marquée que par un fantôme. Il fallait quelquefois, la nuit même, dénouer deux bras, épuiser les forces d’une petite fille, non la raisonner, toutes se butent, mais l’user, et, vers trois heures du matin, la déposer doucement dans le sommeil, soumise, non à ce départ, mais à son chagrin, et se dire : voilà qu’elle accepte, elle pleure.</p>\\n<p>Qu’as-tu appris plus tard à courir le monde, Jacques Bernis ? L’avion ? On avance lentement en creusant son trou dans un cristal dur. Les villes peu à peu se remplacent l’une l’autre, il faut atterrir pour y prendre corps. Maintenant tu sais que ces richesses ne sont qu’offertes puis effacées, lavées par les heures comme par la mer. Mais au retour de tes premiers voyages, quel homme pensais-tu être devenu et pourquoi ce désir de le confronter avec le fantôme d’un gamin tendre ? Dès ta première permission tu m’avais entraîné vers le collège : du Sahara, Bernis, où j’attends ton passage, je me souviens avec mélancolie de cette visite à notre enfance.</p>\\n<p>Une villa blanche entre les pins, une fenêtre s’allumait, puis une autre. Tu me disais :</p>\\n<p>« Voici l’étude où nous écrivions nos premiers poèmes… »</p>","<p>Nous venions de très loin. Nos manteaux lourds capitonnaient le monde et nos âmes de voyageurs veillaient au centre de nous-mêmes. Nous abordions les villes inconnues, les mâchoires closes, les mains gantées, bien protégés. Les foules coulaient sur nous sans nous heurter. Nous réservions pour les villes apprivoisées le pantalon de flanelle blanche et la chemise de tennis. Pour Casablanca, pour Dakar. À Tanger nous marchions nu-tête : il n’était pas besoin d’armure dans cette petite ville endormie.</p>\\n<p>Nous revenions solides, appuyés sur des muscles d’homme. Nous avions lutté, nous avions souffert, nous avions traversé des terres sans limites, nous avions aimé quelques femmes, joué parfois à pile ou face avec la mort, pour simplement dépouiller cette crainte, qui avait dominé notre enfance, des pensums et des retenues, pour assister invulnérables aux lectures des notes du samedi soir.</p>\\n<p>Ce fut dans le vestibule un chuchotement, puis des appels, puis toute une hâte de vieillards. Ils venaient, habillés de la lumière dorée des lampes, les joues de parchemin, mais les yeux si clairs : égayés, charmants. Et, tout de suite, nous comprîmes qu’ils nous savaient déjà d’une autre chair : les anciens ont coutume de revenir avec un pas dur qui prend sa revanche.</p>","<p>Car ils ne s’étonnaient pas de ma poignée de main robuste, ni du regard droit de Jacques Bernis, car ils nous traitèrent sans transition comme des hommes, car ils coururent chercher une bouteille de vieux Samos dont ils ne nous avaient jamais rien dit.</p>\\n<p>On s’installa pour le repas du soir. Ils se resserraient sous l’abat-jour comme les paysans autour du feu et nous apprîmes qu’ils étaient faibles.</p>\\n<p>Ils étaient faibles car ils devenaient indulgents, car notre paresse d’autrefois, qui devait nous conduire au vice, à la misère, n’était plus qu’un défaut d’enfant, ils en souriaient ; car notre orgueil, qu’ils nous menaient vaincre avec tant de fougue, ils le flattaient, ce soir, le disaient noble. Nous tenions même des aveux du maître de philosophie.</p>","<p>Descartes avait, peut-être, appuyé son système sur une pétition de principe. Pascal… Pascal était cruel. Lui-même terminait sa vie, sans résoudre, malgré tant d’efforts, le vieux problème de la liberté humaine. Et lui, qui nous défendait de toutes ses forces contre le déterminisme, contre Taine, lui, qui ne voyait pas d’ennemi plus cruel dans la vie, pour des enfants qui sortent du collège, que Nietzsche, il nous avouait des tendresses coupables. Nietzsche… Nietzsche lui-même le troublait. Et la réalité de la matière… Il ne savait plus, il s’inquiétait… Alors ils nous interrogèrent. Nous étions sortis de cette maison tiède dans la grande tempête de la vie, il nous fallait leur raconter le vrai temps qu’il fait sur la terre. Si vraiment l’homme qui aime une femme devient son esclave comme Pyrrhus ou son bourreau comme Néron. Si vraiment l’Afrique et ses solitudes et son ciel bleu répondent à l’enseignement du maître de géographie. (Et les autruches qui ferment les yeux pour se protéger ?) Jacques Bernis s’inclinait un peu car il possédait de grands secrets, mais les professeurs les lui dérobèrent.</p>","<p>Ils voulurent savoir de lui l’ivresse de l’action, le grondement de son moteur et qu’il ne nous suffisait plus, pour être heureux, de tailler comme eux des rosiers, le soir. C’était son tour d’expliquer Lucrèce ou l’Ecclésiaste et de conseiller. Bernis leur enseignait, à temps encore, ce qu’il faut emporter de vivres et d’eau pour ne pas mourir, perdu en panne dans le désert. Bernis en hâte leur jetait les derniers conseils : les secrets qui sauvent le pilote des Maures, les réflexes qui sauvent le pilote du feu. Et voici qu’ils hochaient la tête, encore inquiets, déjà rassurés et fiers aussi d’avoir lâché par le monde ces forces neuves. Ces héros qu’ils célébraient depuis toujours, ils les touchaient enfin du doigt et, les ayant enfin connus, pouvaient mourir. Ils parlèrent de Jules César, enfant.</p>\\n<p>Mais, de peur de les attrister, nous leur dîmes les déceptions et le goût amer du repos après l’action inutile. Et, comme le plus vieux rêvait, ce qui nous fit mal, combien la seule vérité est peut-être la paix des livres. Mais les professeurs le savaient déjà. Leur expérience était cruelle puisqu’ils enseignaient l’histoire aux hommes.</p>\\n<p>« Pourquoi êtes-vous revenus au pays ? » Bernis ne leur répondait pas, mais les vieux professeurs connaissaient les âmes et, clignant de l’œil, pensaient à l’amour…</p>","<h2>IV</h2>\\n<p>La terre, de là-haut, paraissait nue et morte ; l’avion descend : elle s’habille. Les bois de nouveau la capitonnent, les vallées, les coteaux impriment en elle une houle : elle respire. Une montagne qu’il survole, poitrine de géant couché, se gonfle presque jusqu’à lui.</p>\\n<p>Maintenant proche, comme le torrent sous un pont, le cours des choses s’accélère. C’est la débâcle de ce monde uni. Arbres, maisons, villages se séparent d’un horizon lisse, sont emportés derrière lui à la dérive.</p>\\n<p>Le terrain d’Alicante monte, bascule, se place, les roues le frôlent, s’en rapprochent comme d’un laminoir, s’y aiguisent…</p>\\n<p>Bernis descend de la carlingue, les jambes lourdes. Une seconde, il ferme les yeux ; la tête pleine encore du bruit de son moteur et d’images vives, les membres encore comme chargés par les vibrations de l’appareil. Puis il entre dans le bureau où il s’assied avec lenteur, repousse du coude l’encrier, quelques livres, et tire à lui le carnet de route du 612.</p>\\n<p>Toulouse-Alicante : 5 h. 15 de vol.</p>","<p>Il s’interrompt, se laisse dominer par la fatigue et par le rêve. Il lui parvient un bruit confus. Une commère crie quelque part. Le chauffeur de la Ford ouvre la porte, s’excuse, sourit. Bernis considère gravement ces murs, cette porte et ce chauffeur grandeur nature. Il est mêlé pour dix minutes à une discussion qu’il ne comprend pas, à des gestes que l’on achève, que l’on commence. Cette vision est irréelle. Un arbre planté devant la porte dure pourtant depuis trente ans. Depuis trente ans repère l’image.</p>\\n<p>Moteur : Rien à signaler.</p>\\n<p>Avion : Penche à droite.</p>\\n<p>Il dépose le porte-plume, pense simplement : « J’ai sommeil », et le rêve qui serre ses tempes s’impose encore.</p>\\n<p>Une lumière couleur d’ambre sur un paysage si clair. Des champs bien ratissés et des prairies. Un village posé à droite, à gauche un troupeau minuscule et, l’enfermant, la voûte d’un ciel bleu. « Une maison », pense Bernis. Il se souvient d’avoir ressenti avec une évidence soudaine que ce paysage, ce ciel, cette terre étaient bâtis à la manière d’une demeure. Demeure familière, bien en ordre. Chaque chose si verticale. Nulle menace, nulle fissure dans cette vision unie : il était comme à l’intérieur du paysage.</p>","<p>Ainsi les vieilles dames se sentent éternelles à la fenêtre de leur salon. La pelouse est fraîche, le jardinier lent arrose les fleurs. Elles suivent des yeux son dos rassurant. Une odeur d’encaustique monte du parquet luisant et les ravit. L’ordre dans la maison est doux : le jour a passé traînant son vent et son soleil et ses averses pour user à peine quelques roses.</p>\\n<p>« C’est l’heure. Adieu. » Bernis repart.</p>\\n<p>Bernis entre dans la tempête. Elle s’acharne sur l’avion comme les coups de pioche du démolisseur : on en a vu d’autres, on passera. Bernis n’a plus que des pensées rudimentaires, les pensées qui dirigent l’action : sortir de ce cirque de montagnes où la tornade descendante le plonge, où la pluie en rafales est si drue qu’il fait nuit, sauter ce mur, gagner la mer.</p>\\n<p>Un choc ! Une rupture ? L’avion tout à coup pèse vers la gauche. Bernis le retient d’une main, puis des deux mains, puis de tout son corps. « Nom de Dieu ! » L’avion a repris son poids vers la terre. Voici Bernis ruiné. Une seconde encore, et de cette maison bousculée, et qu’il vient à peine de comprendre, il sera rejeté pour toujours. Plaines, forêts, villages, jailliront vers lui en spirale. Fumée des apparences, spirales de fumée, fumée ! Bergerie culbutée aux quatre coins du ciel…</p>\\n<p>« Ah ! J’ai eu peur… » Un coup de talon libère un câble. Commande coincée. Quoi ? Sabotage ? Non. Trois fois rien : un coup de talon rétablit le monde. Quelle aventure !</p>","<p>Une aventure ? Il ne reste de cette seconde qu’un goût dans la bouche, une aigreur de la chair. Eh ! mais cette faille entrevue ! Tout n’était là qu’en trompe-l’œil : routes, canaux, maisons, jouets des hommes !…</p>\\n<p>Passé. Fini. Ici le ciel est clair. La météo l’avait prédit. « Ciel un quart couvert de cirrus. » La météo ? Les isobares ? Les « Systèmes nuageux » du professeur Borjsen ? Un ciel de fête populaire : oui. Un ciel de 14 Juillet. Il fallait dire : « À Malaga c’est jour de fête ! » Chaque habitant possède dix mille mètres de ciel pur sur lui. Un ciel qui va jusqu’aux cirrus. Jamais l’aquarium ne fut si lumineux, si vaste. Ainsi dans le golfe, un soir de régates : ciel bleu, mer bleu, col bleu et les yeux bleu du capitaine. Congé lumineux.</p>\\n<p>Fini. Trente mille lettres ont passé.</p>\\n<p>La Compagnie prêchait : courrier précieux, courrier plus précieux que la vie. Oui. De quoi faire vivre trente mille amants… Patience, amants ! Dans les feux du soir on vous arrive. Derrière Bernis les nuages épais, brassés dans une cuve par la tornade. Devant lui une terre vêtue de soleil, l’étoffe claire des prés, la laine des bois, le voile froncé de la mer.</p>\\n<p>À la hauteur de Gibraltar il fera nuit. Alors un virage à gauche vers Tanger détachera de Bernis l’Europe, banquise énorme, à la dérive…</p>\\n<p>Encore quelques villes nourries de terre brune puis l’Afrique. Encore quelques villes nourries de pâte noire puis le Sahara. Bernis assistera ce soir au déshabiller de la terre.</p>","<p>Bernis est las. Deux mois plus tôt, il montait vers Paris à la conquête de Geneviève. Il rentrait hier à la Compagnie, ayant mis de l’ordre dans sa défaite. Ces plaines, ces villes, ces lumières qui s’en vont, c’est bien lui qui les abandonne. Qui s’en dévêt. Dans une heure le phare de Tanger luira : Jacques Bernis, jusqu’au phare de Tanger, va se souvenir.</p>","<h1>DEUXIÈME PARTIE</h1>","<h2>I</h2>\\n<p>Je dois revenir en arrière, raconter ces deux mois passés, autrement qu’en resterait-il ? Quand les événements que je vais dire auront peu à peu terminé leur faible remous, leurs cercles concentriques, sur ceux des personnages qu’ils ont simplement effacés, comme l’eau refermée d’un lac, quand seront amorties les émotions poignantes, puis moins poignantes, puis douces que je leur dois, le monde de nouveau me paraîtra sûr. Ne puis-je pas me promener déjà, là où devrait m’être cruel le souvenir de Geneviève et de Bernis, sans qu’à peine le regret me touche ?</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Deux mois plus tôt il montait vers Paris, mais, après tant d’absence, on ne retrouve plus sa place : on encombre une ville. Il n’était plus que Jacques Bernis habillé d’un veston qui sentait le camphre. Il se mouvait dans un corps engourdi, maladroit, et demandait à ses cantines, trop bien rangées dans un coin de la chambre, tout ce qu’elles révélaient d’instable, de provisoire : cette chambre n’était pas conquise encore par du linge blanc, par des livres.</p>\\n<p>« Allo… C’est toi ? » Il recense les amitiés. On s’exclame, on le félicite :</p>\\n<p>– Un revenant ! Bravo !</p>\\n<p>– Eh oui ! Quand te verrai-je ?</p>\\n<p>On n’est justement pas libre aujourd’hui. Demain ? Demain on joue au golf, mais qu’il vienne aussi. Il ne veut pas ? Alors après-demain. Dîner. Huit heures précises.</p>","<p>Il entre, pesant, dans un dancing, garde, parmi les gigolos, son manteau comme un vêtement d’explorateur. Ils vivent leur nuit dans cette enceinte comme des goujons dans un aquarium, tournent un madrigal, dansent, reviennent boire. Bernis dans ce milieu flou, où seul il garde sa raison, se sent lourd comme un portefaix, pèse droit sur ses jambes. Ses pensées n’ont point de halo. Il avance, parmi les tables, vers une place libre. Les yeux des femmes qu’il touche des siens se dérobent, semblent s’éteindre. Les jeunes gens s’écartent flexibles pour qu’il passe. Ainsi, la nuit, les cigarettes des sentinelles, à mesure que l’officier de ronde avance, tombent des doigts.</p>\\n<p>Ce monde, nous le retrouvions chaque fois, comme les matelots bretons retrouvent leur village de carte postale et leur fiancée trop fidèle, à leur retour à peine vieillie. Toujours pareille, la gravure d’un livre d’enfance. À reconnaître tout si bien en place, si bien réglé par le destin, nous avions peur de quelque chose d’obscur. Bernis s’informait d’un ami : « Mais oui. Le même. Ses affaires ne vont pas bien fort. Enfin tu sais… la vie. » Tous étaient prisonniers d’eux-mêmes, limités par ce frein obscur et non comme lui, ce fugitif, cet enfant pauvre, ce magicien.</p>","<p>Les visages de ses amis à peine usés, à peine amincis par deux hivers, par deux étés. Cette femme dans un coin du bar : il la reconnaissait. Le visage à peine fatigué d’avoir servi tant de sourires. Ce barman : le même. Il eut peur d’en être reconnu, comme si cette voix en l’interpellant devait ressusciter en lui un Bernis mort, un Bernis sans ailes, un Bernis qui ne s’était pas évadé.</p>\\n<p>Peu à peu, pendant le retour, un paysage se bâtissait déjà autour de lui, comme une prison. Les sables du Sahara, les rochers d’Espagne, étaient peu à peu retirés, comme des vêtements de théâtre, du paysage vrai qui allait transparaître. Enfin, dès la frontière franchie, Perpignan servie par sa plaine. Cette plaine où traînait encore le soleil, en coulées obliques, allongées, à chaque minute plus élimées, ces vêtements d’or, çà et là sur l’herbe, à chaque minute plus fragiles, plus transparents et qui ne s’éteignent pas mais s’évaporent. Alors ce limon vert, sombre et doux sous l’air bleu. Ce fond tranquille. Moteur au ralenti, cette plongée vers ce fond de mers où tout repose, où tout prend l’évidence et la durée d’un mur.</p>","<p>Ce trajet en voiture de l’aéroport vers la gare. Ces visages en face du sien fermés, durcis. Ces mains qui portaient leur destin gravé et reposaient à plat sur les genoux, si lourdes. Ces paysans frôlés qui revenaient des champs. Cette jeune fille devant sa porte qui guettait un homme entre cent mille, qui avait renoncé à cent mille espérances. Cette mère qui berçait un enfant, qui en était déjà prisonnière, qui ne pouvait fuir.</p>\\n<p>Bernis directement posé au secret des choses revenait au pays par le sentier le plus intime, les mains dans les poches, sans valise, pilote de ligne. Dans le monde le plus immuable où, pour toucher un mur, pour allonger un champ, il fallait vingt ans de procès.</p>\\n<p>Après deux ans d’Afrique et de paysages mouvants et toujours changeants comme la face de la mer, mais qui, un à un dérobés, laissaient nu ce vieux paysage, le seul, l’éternel, celui dont il était sorti, il prenait pied sur un vrai sol, archange triste.</p>\\n<p>« Et voilà tout pareil… »</p>","<p>Il avait craint de trouver les choses différentes et voici qu’il souffrait de les découvrir si semblables. Il n’attendait plus des rencontres, des amitiés qu’un ennui vague. De loin on imagine. Les tendresses, au départ, on les abandonne derrière soi avec une morsure au cœur, mais aussi avec un étrange sentiment de trésor enfoui sous terre. Ces fuites quelquefois témoignent de tant d’amour avare. Une nuit dans le Sahara peuplé d’étoiles, comme il rêvait à ces tendresses lointaines, chaudes et couvertes par la nuit, par le temps, comme des semences, il eut ce brusque sentiment : s’être écarté un peu pour regarder dormir. Appuyé à l’avion en panne, devant cette courbe du sable, ce fléchissement de l’horizon, il veillait ses amours comme un berger…</p>\\n<p>« Et voici ce que je retrouve ! »</p>\\n<p>Et Bernis m’écrivit un jour :</p>","<p>… Je ne te parle pas de mon retour : je me crois le maître des choses quand les émotions me répondent. Mais aucune ne s’est réveillé. J’étais pareil à ce pèlerin qui arrive une minute trop tard à Jérusalem. Son désir, sa foi venaient de mourir : il trouve des pierres. Cette ville ici : un mur. Je veux repartir. Te souviens-tu de ce premier départ ? Nous l’avons fait ensemble. Murcie, Grenade couchées comme des bibelots dans leur vitrine et, car nous n’atterrissions pas, ensevelies dans le passé. Déposées là par les siècles qui se retirent. Le moteur faisait ce bruit dense qui existe seul et derrière lequel le paysage passe en silence comme un film. Et ce froid, car nous volions haut : ces villes prises dans la glace. Tu te souviens ?</p>\\n<p>J’ai gardé les papiers que tu me passais :</p>\\n<p>« Surveille ce cliquetis bizarre… ne t’engage pas sur le détroit si ça augmente. »</p>\\n<p>Deux heures après, à Gibraltar : « Attends Tarifa pour traverser : meilleur. »</p>\\n<p>À Tanger : « Ne te pose pas trop long : terrain mou. »</p>","<p>Simplement. Avec ces phrases-là, on gagne le monde. J’avais la révélation d’une stratégie que ces ordres brefs rendaient si forte. Tanger, cette petite ville de rien du tout, c’était ma première conquête. C’était, vois-tu, c’était mon premier cambriolage. Oui. À la verticale, d’abord, mais si loin. Puis, pendant la descente, cette éclosion des prés, des fleurs, des maisons. Je ramenais au jour une ville engloutie et qui devenait vivante. Et tout à coup cette découverte merveilleuse : à cinq cents mètres du terrain cet Arabe qui labourait, que je tirais à moi, dont je faisais un homme à mon échelle, qui était vraiment mon butin de guerre ou ma création ou mon jeu. J’avais pris un otage et l’Afrique m’appartenait.</p>\\n<p>Deux minutes plus tard, debout sur l’herbe, j’étais jeune, comme posé dans quelque étoile où la vie recommence. Dans ce climat neuf. Je me sentais dans ce sol, dans ce ciel, comme un jeune arbre. Et je m’étirais du voyage avec cette adorable faim. Je faisais des pas allongés, flexibles, pour me délasser du pilotage et je riais d’avoir rejoint mon ombre : l’atterrissage.</p>","<p>Et ce printemps ! Te souviens-tu de ce printemps après la pluie grise de Toulouse ? Cet air si neuf qui circulait entre les choses. Chaque femme contenait un secret : un accent, un geste, un silence. Et toutes étaient désirables. Et puis, tu me connais, cette hâte de repartir, de chercher plus loin ce que je pressentais et ne comprenais pas, car j’étais ce sourcier dont le coudrier tremble et qu’il promène sur le monde jusqu’au trésor.</p>\\n<p>Mais dis-moi donc ce que je cherche et pourquoi contre ma fenêtre, appuyé à la ville de mes amis, de mes désirs, de mes souvenirs, je désespère ? Pourquoi, pour la première fois, je ne découvre pas de source et me sens si loin du trésor ? Quelle est cette promesse obscure que l’on m’a faite et qu’un dieu obscur ne tient pas ?</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>J’ai retrouvé la source. T’en souviens-tu ? C’est Geneviève…</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>En lisant ce mot de Bernis, Geneviève, j’ai fermé les yeux et vous ai revue petite fille. Quinze ans quand nous en avions treize. Comment auriez-vous vieilli dans nos souvenirs ? Vous étiez restée cette enfant fragile, et c’est elle, quand nous entendions parler de vous, que nous hasardions, surpris, dans la vie.</p>","<p>Tandis que d’autres poussaient devant l’Autel une femme déjà faite, c’est une petite fille que Bernis et moi, du fond de l’Afrique, avons fiancée. Vous avez été, enfant de quinze ans, le plus jeune des mères. À l’âge où l’on écorche aux branches des mollets nus, vous exigiez un vrai berceau, jouet royal. Et tandis que parmi les vôtres, qui ne devinaient pas le prodige, vous faisiez dans la vie d’humbles gestes de femme, vous viviez pour nous un conte enchanté et vous entriez dans le monde par la porte magique – comme dans un bal costumé, un bal d’enfants – déguisée en épouse, en mère, en fée…</p>\\n<p>Car vous étiez fée. Je me souviens. Vous habitiez sous l’épaisseur des murs une vieille maison. Je vous revois vous accoudant à la fenêtre, percée en meurtrière, et guettant la lune. Elle montait. Et la plaine commençait à bruire et secouait aux ailes des cigales ses crécelles, au ventre des grenouilles ses grelots, au cou des bœufs qui rentraient ses cloches. La lune montait. Parfois du village un glas s’élevait, portant aux grillons, aux blés, aux cigales, l’inexplicable mort. Et vous vous penchiez en avant, inquiète pour les fiancés seulement, car rien n’est aussi menacé que l’espérance. Mais la lune montait. Alors couvrant le glas, les chats-huants s’appelaient l’un l’autre pour l’amour. Les chiens errants l’assiégeaient en cercle et criaient vers elle. Et chaque arbre, chaque herbe, chaque roseau était vivant. Et la lune montait.</p>","<p>Alors vous nous preniez les mains et vous nous disiez d’écouter parce que c’étaient les bruits de la terre et qu’ils rassuraient et qu’ils étaient bons.</p>\\n<p>Vous étiez si bien abritée par cette maison et, autour d’elle, par cette robe vivante de la terre. Vous aviez conclu tant de pactes avec les tilleuls, avec les chênes, avec les troupeaux que nous vous nommions leur princesse. Votre visage s’apaisait par degrés quand, le soir, on rangeait le monde pour la nuit. « Le fermier a rentré ses bêtes. » Vous le lisiez aux lumières lointaines des étables. Un bruit sourd : « On ferme l’écluse. » Tout était en ordre. Enfin le rapide de sept heures du soir faisait son orage, doublait la province et s’évadait, nettoyant enfin votre monde de ce qui est inquiet, mobile, incertain comme un visage aux vitres des sleepings. Et c’était le dîner dans une salle à manger trop grande, mal éclairée, où tu devenais la reine de la nuit car nous te surveillons sans relâche comme des espions. Tu t’asseyais silencieuse parmi de vieilles gens, au centre de ces boiseries et penchée en avant, n’offrant que ta seule chevelure à l’enclos doré des abat-jour, couronnée de lumière, tu régnais. Tu nous paraissais éternelle d’être si bien liée aux choses, si sûre des choses, de tes pensées, de ton avenir. Tu régnais…</p>","<p>Mais nous voulions savoir s’il était possible de te faire souffrir, de te serrer dans les bras jusqu’à t’étouffer, car nous sentions en toi une présence humaine que nous désirions amener au jour. Une tendresse, une détresse que nous désirions amener aux yeux. Et Bernis te prenait dans les bras et tu rougissais. Et Bernis te serrait plus fort et tes yeux devenaient brillants de larmes sans que tes lèvres se soient enlaidies, comme aux vieilles qui pleurent, et Bernis me disait que ces larmes venaient du cœur soudain rempli, plus précieuses que des diamants, et que celui qui les boirait serait immortel. Il me disait aussi que tu habitais ton corps, comme cette fée sous les eaux, et qu’il connaissait mille sortilèges pour te ramener à la surface, dont le plus sûr était de te faire pleurer. C’est ainsi que nous te volions de l’amour. Mais, quand nous te lâchions, tu riais et ce rire nous remplissait de confusion. Ainsi un oiseau, moins serré, s’envole.</p>\\n<p>« Geneviève, lis-nous des vers. »</p>\\n<p>Tu lisais peu et nous pensions que déjà tu connaissais tout. Nous ne t’avons jamais vue étonnée.</p>\\n<p>« Lis-nous des vers… »</p>\\n<p>Tu lisais, et, pour nous, c’étaient des enseignements sur le monde, sur la vie, qui nous venaient non du poète, mais de ta sagesse. Et les détresses des amants et les pleurs des reines devenaient de grandes choses tranquilles. On mourait d’amour avec tant de calme dans ta voix…</p>\\n<p>« Geneviève, est-ce vrai que l’on meurt d’amour ? »</p>","<p>Tu suspendais les vers, tu réfléchissais gravement. Tu cherchais sans doute la réponse chez les fougères, les grillons, les abeilles et tu répondais « oui » puisque les abeilles en meurent. C’était nécessaire et paisible.</p>\\n<p>« Geneviève, qu’est-ce qu’un amant ? »</p>\\n<p>Nous désirions te faire rougir. Tu ne rougissais pas. À peine moins légère tu regardais de face l’étang tremblant de lune. Nous pensions qu’un amant, c’était pour toi cette lumière.</p>\\n<p>« Geneviève, as-tu un amant ? »</p>\\n<p>Cette fois-ci tu rougirais ! Mais non. Tu souriais sans gêne. Tu secouais la tête. Dans ton royaume, une saison apporte les fleurs, l’automne les fruits, une saison apporte l’amour : la vie est simple.</p>\\n<p>« Geneviève, sais-tu ce que nous ferons plus tard ? » Nous voulions t’éblouir et nous t’appelions : faible femme. « Nous serons, faible femme, des conquérants. » Nous t’expliquions la vie. Les conquérants qui reviennent chargés de gloire et prennent pour maîtresse celle qu’ils aimaient.</p>\\n<p>« Alors nous serons tes amants. Esclave, lis-nous des vers… »</p>","<p>Mais tu ne lisais plus. Tu repoussais le livre. Tu sentais soudain ta vie si certaine, comme un jeune arbre se sentirait croître et développer la graine au jour. Il n’était plus rien que de nécessaire. Nous étions des conquérants de fable, mais toi tu t’appuyais sur tes fougères, tes abeilles, tes chèvres, tes étoiles, tu écoutais les voix de tes grenouilles, tu tirais ta confiance de toute cette vie qui montait et autour de toi dans la paix nocturne et en toi-même de tes chevilles vers ta nuque pour ce destin inexprimable et pourtant sûr.</p>\\n<p>Et comme la lune était haute et qu’il était temps de dormir, tu fermais la fenêtre et la lune brillait derrière la vitre. Et nous te disions que tu avais fermé le ciel comme une vitrine et que la lune y était prise et une poignée d’étoiles, car nous cherchions par tous les symboles, par tous les pièges, à t’entraîner, sous les apparences, dans ce fond des mers où nous appelait notre inquiétude.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>… J’ai retrouvé la source. C’est elle qu’il me fallait pour me reposer du voyage. Elle est présente. Les autres… Il est des femmes dont nous disions qu’elles sont, après l’amour, rejetées au loin dans les étoiles, qui ne sont rien qu’une construction du cœur. Geneviève… tu te souviens, nous la disions, elle, habitée. Je l’ai retrouvée comme on retrouve le sens des choses et je marche à son côté dans un monde dont je découvre enfin l’intérieur…</p>","<p>Elle lui venait de la part des choses. Elle servait d’intermédiaire, après mille divorces, pour mille mariages. Elle lui rendait ces marronniers, ce boulevard, cette fontaine. Chaque chose portait de nouveau ce secret au centre qui est son âme. Ce parc n’était plus peigné, rasé et dépouillé comme pour un Américain, mais justement on y rencontrait ce désordre dans les allées, ces feuilles sèches, ce mouchoir perdu qu’y laisse le pas des amants. Et ce parc devenait un piège.</p>","<h2>II</h2>\\n<p>Elle n’a jamais parlé d’Herlin, son mari, à Bernis, mais ce soir : « Un dîner ennuyeux, Jacques, des tas de gens : dînez avec nous, je serai moins seule ! »</p>\\n<p>Herlin fait des gestes. Trop. Pourquoi cette assurance qu’il dépouillera dans l’intimité ? Elle le regarde avec inquiétude. Cet homme pousse en avant un personnage qu’il se compose. Non par vanité, mais pour croire en soi. « Très juste, mon cher, votre observation. » Geneviève détourne la tête écœurée : ce geste rond, ce ton, cette sûreté apparente !</p>\\n<p>« Garçon ! Cigares. »</p>\\n<p>Elle ne l’a jamais vu si actif, ivre, il semble, de son pouvoir. Dans un restaurant, sur un tréteau, on conduit le monde. Un mot touche une idée et la renverse. Un mot touche le garçon, le maître d’hôtel et les met en branle.</p>\\n<p>Geneviève sourit à demi : pourquoi ce dîner politique ? Pourquoi depuis six mois cette lubie de politique ? Il suffit à Herlin, pour se croire fort, de sentir passer par lui des idées fortes. Alors, émerveillé, il s’écarte un peu de sa statue et se contemple.</p>\\n<p>Elle les abandonne à leur jeu et se retourne vers Bernis :</p>\\n<p>– Enfant prodigue, parlez-moi du désert… quand nous reviendrez-vous pour toujours ?</p>\\n<p>Bernis la regarde.</p>","<p>Bernis devine une enfant de quinze ans, qui lui sourit sous la femme inconnue, comme dans les contes de fées. Une enfant qui se cache mais ébauche ce geste et se dénonce : Geneviève, je me souviens du sortilège. Il faudra vous prendre dans les bras et vous serrer jusqu’à vous faire mal, et c’est elle, ramenée au jour, qui va pleurer…</p>\\n<p>Les hommes, maintenant, penchent vers Geneviève leurs plastrons blancs et font leur métier de séducteurs, comme si l’on gagnait la femme avec des idées, avec des images, comme si la femme était le prix d’un tel concours. Son mari aussi se fait charmant et la désirera ce soir. Il la découvre quand les autres l’ont désirée. Quand, dans sa robe du soir, son éclat, son désir de plaire, sous la femme a brillé un peu la courtisane. Elle pense : il aime ce qui est médiocre. Pourquoi ne l’aime-t-on jamais tout entière ? On aime une part d’elle-même, mais on laisse l’autre dans l’ombre. On l’aime comme on aime la musique, le luxe. Elle est spirituelle ou sentimentale et on la désire. Mais ce qu’elle croit, ce qu’elle sent, ce qu’elle porte en elle… on s’en moque. Sa tendresse pour son enfant, ses soucis les plus raisonnables, toute cette part d’ombre : on la néglige.</p>\\n<p>Chaque homme près d’elle devient veule. Il s’offense avec elle, s’attendrit avec elle et semble dire pour lui plaire : je serai l’homme que vous voudrez. Et c’est vrai. Cela n’a pour lui aucune importance. Ce qui aurait de l’importance serait de coucher avec elle.</p>","<p>Elle ne pense pas toujours à l’amour : elle n’a pas le temps !</p>\\n<p>Elle se souvient des premiers jours de ses fiançailles. Elle sourit : Herlin découvre soudain qu’il est amoureux (sans doute l’avait-il oublié ?). Il veut lui parler, l’apprivoiser, la conquérir : « Eh ! Je n’ai pas le temps… » Elle marchait devant lui dans le sentier et d’une baguette nerveuse fauchait de jeunes branches sur le rythme d’une chanson. La terre mouillée sentait bon. Les branches se rabattaient en pluie sur le visage. Elle se répétait : « Je n’ai pas le temps… pas le temps ! » Il fallait d’abord courir à la serre surveiller ses fleurs.</p>\\n<p>– Geneviève, vous êtes une enfant cruelle !</p>\\n<p>– Oui. Bien sûr. Regardez mes roses, elles pèsent lourd ! C’est admirable une fleur qui pèse lourd.</p>\\n<p>– Geneviève, laissez-moi vous embrasser…</p>\\n<p>– Bien sûr. Pourquoi pas ? Aimez-vous mes roses ?</p>\\n<p>Les hommes aiment toujours ses roses.</p>\\n<p>« Mais non, mais non, mon petit Jacques, je ne suis pas triste. » Elle se penche à demi vers Bernis : « Je me souviens… j’étais une drôle de petite fille. Je m’étais fait un Dieu à mon idée. S’il me venait un désespoir d’enfant, je pleurais tout le jour sur l’irréparable. Mais, la nuit, dès la lampe soufflée, j’allais retrouver mon ami. Je lui disais dans ma prière : voilà ce qui m’arrive et je suis bien trop faible pour réparer ma vie gâchée. Mais je vous donne tout : vous êtes bien plus fort que moi. Débrouillez-vous. Et je m’endormais. »</p>","<p>Et puis, parmi les choses peu sûres, il en est tant d’obéissantes. Elle régnait sur les livres, les fleurs, les amis. Elle entretenait avec eux des pactes. Elle savait le signe qui fait sourire, le mot de ralliement, le seul : « Ah ! C’est vous, mon vieil astrologue… » Ou quand Bernis entrait : « Asseyez-vous, enfant prodigue… » Chacun était lié à elle par un secret, par cette douceur d’être découvert, d’être compromis. L’amitié la plus pure devenait riche comme un crime.</p>\\n<p>« Geneviève, disait Bernis, vous régnez toujours sur les choses. »</p>\\n<p>Les meubles du salon, elle les remuait un peu, ce fauteuil elle le tirait, et l’ami trouvait enfin, là, surpris, sa vraie place dans le monde. Après la vie de tout un jour quel tumulte silencieux de musique éparse, de fleurs abîmées : tout ce que l’amitié saccage sur terre. Geneviève, sans bruit, faisait la paix dans son royaume. Et Bernis sentait si lointaine en elle, si bien défendue la petite fille captive qui l’avait aimé…</p>\\n<p>Mais les choses, un jour, se révoltèrent.</p>","<h2>III</h2>\\n<p>– Laisse-moi dormir…</p>\\n<p>– C’est inconcevable ! Lève-toi. L’enfant étouffe.</p>\\n<p>Jetée hors du sommeil, elle courut au lit. L’enfant dormait. Lustré par la fièvre, la respiration courte, mais calme. Dans son demi-sommeil, Geneviève imaginait le souffle pressé des remorqueurs. « Quel travail ! » Et cela durait depuis trois jours ! Incapable de penser à rien, elle resta courbée sur le malade.</p>\\n<p>– Pourquoi m’as-tu dit qu’il étouffait ? Pourquoi m’as-tu fait peur ?…</p>\\n<p>Son cœur battait encore d’un tel sursaut. Herlin répondit :</p>\\n<p>– J’ai cru.</p>\\n<p>Elle savait qu’il mentait. Touché par quelque angoisse, incapable de souffrir seul, il faisait partager cette angoisse. La paix du monde, quand il souffrait, lui devenait insupportable. Et pourtant, après trois nuits de veille, elle avait besoin d’une heure de repos. Déjà, elle ne savait plus où elle en était.</p>\\n<p>Elle pardonnait ces mille chantages parce que les mots… quelle importance ? Ridicule, cette comptabilité du sommeil !</p>\\n<p>« Tu n’es pas raisonnable », dit-elle seulement, puis, pour l’adoucir : « Tu es un enfant… »</p>\\n<p>Sans transition, elle demanda l’heure à la garde.</p>\\n<p>– Deux heures vingt.</p>\\n<p>– Ah oui ?</p>\\n<p>Geneviève répétait « deux heures vingt… » Comme si s’imposait un geste urgent. Mais non. Il n’y avait rien qu’à attendre, comme en voyage. Elle tapota le lit, rangea les fioles, toucha la fenêtre. Elle créait un ordre invisible et mystérieux.</p>\\n<p>« Vous devriez dormir un peu », disait la garde.</p>","<p>Puis le silence. Puis, de nouveau, l’oppression d’un voyage où le paysage invisible court.</p>\\n<p>« Cet enfant qu’on a regardé vivre, qu’on a chéri… », déclamait Herlin. Il désirait se faire plaindre par Geneviève. Ce rôle de père malheureux…</p>\\n<p>« Occupe-toi, mon vieux, fais quelque chose ! » conseillait doucement Geneviève. « Tu as un rendez-vous d’affaires : vas-y ! »</p>\\n<p>Elle le poussait par les épaules, mais il cultivait sa douleur :</p>\\n<p>« Comment veux-tu ! Dans un moment pareil… »</p>\\n<p>Dans un moment pareil, se disait Geneviève, mais… mais plus que jamais ! Elle éprouvait un étrange besoin d’ordre. Ce vase déplacé, ce manteau d’Herlin traînant sur un meuble, cette poussière sur la console, c’était… c’étaient des pas gagnés par l’ennemi. Des indices d’une débâcle obscure. Elle luttait contre cette débâcle. L’or des bibelots, les meubles rangés sont des réalités claires à la surface. Tout ce qui est sain, net et luisant semblait, à Geneviève, protéger de la mort qui est obscure.</p>\\n<p>Le médecin disait : « Cela peut s’arranger : l’enfant est fort. » Bien sûr. Quand il dormait, il se cramponnait à la vie de ses deux petits poings fermés. C’était si joli. C’était si solide.</p>\\n<p>« Madame, vous devriez sortir un peu, vous promener, disait la garde ; j’irai ensuite. Sans quoi nous n’allons pas tenir. »</p>\\n<p>Et le spectacle était étrange de cet enfant qui épuisait deux femmes. Qui, les yeux clos, la respiration courte, les entraînait au bout du monde.</p>","<p>Et Geneviève sortait pour fuir Herlin. Il lui faisait des conférences : « Mon devoir le plus élémentaire… Ton orgueil… » Elle ne comprenait rien à toutes ces phrases, parce qu’elle avait sommeil, mais certains mots l’étonnaient au passage comme « orgueil ». Pourquoi orgueil ? Qu’est-ce que ça vient faire ici ?</p>\\n<p>Le médecin s’étonnait de cette jeune femme qui ne pleurait pas, ne prononçait aucun mot inutile, et le servait comme une infirmière précise. Il admirait cette petite servante de la vie. Et pour Geneviève, ces visites étaient les instants les meilleurs du jour. Non qu’il la consolât : il ne disait rien. Mais parce qu’en lui ce corps d’enfant était situé exactement. Parce que tout ce qui est grave, obscur, malsain, était exprimé. Quelle protection dans cette lutte contre l’ombre ! Et cette opération même de l’avant-veille… Herlin geignait dans le salon. Elle était restée. Le chirurgien entrait dans la chambre en blouse blanche, comme la puissance tranquille du jour. L’interne et lui commençaient un combat rapide. Des mots nus, des ordres : chloroforme puis serrez puis iode détachés à voix basse et dépouillés d’émotion. Et tout à coup, comme Bernis dans son avion, elle avait eu la révélation d’une stratégie si forte : on allait vaincre.</p>\\n<p>« Comment peux-tu voir ça, disait Herlin, tu es donc une mère sans cœur ? »</p>","<p>Un matin, devant le médecin, elle glissa doucement le long d’un fauteuil, évanouie. Quand elle revint à elle, il ne lui parla ni de courage ni d’espoir, ni n’exprima aucune pitié. Il la regarda gravement et lui dit : « Vous vous fatiguez trop. Ce n’est pas sérieux. Je vous donne l’ordre de sortir cet après-midi. N’allez pas au théâtre, les gens seraient trop bornés pour comprendre, mais faites quelque chose d’analogue. »</p>\\n<p>Et il pensait :</p>\\n<p>« Voilà ce que j’ai vu de plus vrai au monde. »</p>\\n<p>La fraîcheur du boulevard la surprit. Elle marchait et éprouvait un grand repos à se souvenir de son enfance. Des arbres, des plaines. Des choses simples. Un jour, beaucoup plus tard, cet enfant lui était venu et c’était quelque chose d’incompréhensible et en même temps de plus simple encore. Une évidence plus forte que les autres. Elle avait servi cet enfant à la surface des choses et parmi d’autres choses vivantes. Et les mots n’existaient pas pour décrire ce qu’elle avait tout de suite éprouvé. Elle s’était sentie… mais oui, c’est cela : intelligente. Et sûre d’elle-même et liée à tout et faisant partie d’un grand concert. Elle s’était fait porter le soir près de sa fenêtre. Les arbres vivaient, montaient, tiraient un printemps du sol : elle était leur égale. Et son enfant près d’elle respirait faiblement et c’était le moteur du monde et sa faible respiration animait le monde.</p>","<p>Mais depuis trois jours quel désarroi. Le moindre geste – ouvrir la fenêtre, la fermer – devenait lourd de conséquences. On ne savait plus quel geste faire. On touchait les fioles, les draps, l’enfant, sans connaître la portée du geste dans un monde obscur.</p>\\n<p>Elle passait devant un antiquaire. Geneviève songeait aux bibelots de son salon comme à des pièges pour le soleil. Tout ce qui retient la lumière lui plaisait, tout ce qui émerge, bien éclairé, à la surface. Elle s’arrêta pour savourer dans ce cristal un sourire silencieux : celui qui luit aux bons vieux vins. Elle mêlait, dans sa conscience fatiguée, lumière, santé, certitude de vivre et désira pour cette chambre d’enfant fuyant, ce reflet posé comme un clou d’or.</p>","<h2>IV</h2>\\n<p>Herlin revenait à la charge. « Et tu as le cœur de t’amuser, de flâner chez les antiquaires ! Je ne te le pardonnerai jamais ! C’est… – il cherchait ses mots – c’est monstrueux, c’est inconcevable, c’est indigne d’une mère ! » Il avait machinalement tiré une cigarette et balançait d’une main un étui rouge. Geneviève entendit encore : « Le respect de soi-même ! » Elle pensait aussi : « Va-t-il allumer sa cigarette ? »</p>\\n<p>« Oui…, » lâcha lentement Herlin, il avait gardé cette révélation pour la fin : « Oui… Et pendant que la mère s’amuse, l’enfant vomit du sang ! »</p>\\n<p>Geneviève devint très pâle.</p>\\n<p>Elle voulut quitter la pièce, il lui barra la porte. « Reste ! » Il avait le souffle court d’une bête. Cette angoisse qu’il avait supportée seul, il la ferait payer !</p>\\n<p>« Tu vas me faire du mal et ensuite tu t’en voudras », lui dit simplement Geneviève.</p>\\n<p>Mais cette remarque destinée à la baudruche pleine de vent qu’il était, à sa nullité en face des choses, fut le coup de fouet décisif sur son exaltation. Et il déclama. Oui, elle avait toujours été indifférente à ses efforts, coquette, légère. Oui, il avait été longtemps la dupe, lui Herlin, qui plaçait en elle toute sa force. Oui. Mais tout cela n’était rien : il en souffrait seul, on est toujours seul dans la vie… Geneviève excédée se détournait : il la ramena face à lui et détacha :</p>\\n<p>– Mais les fautes des femmes se paient.</p>\\n<p>Et comme elle se dérobait encore, il s’imposa par un outrage :</p>\\n<p>– L’enfant meurt : c’est le doigt de Dieu !</p>","<p>Sa colère tombe d’un seul coup comme après un meurtre. Ce mot lâché, il en reste lui-même stupide. Geneviève toute blanche fait un pas vers la porte. Il devine quelle image elle emporte de lui quand la seule qu’il voulait former était noble. Et le désir lui vient d’effacer cette image, de réparer, de faire entrer de force en elle une image douce.</p>\\n<p>D’une voix tout à coup brisée :</p>\\n<p>« Pardon… reviens… j’ai été fou ! »</p>\\n<p>La main sur le loquet et tournée à demi vers lui, elle lui semble un animal sauvage prêt à fuir s’il bouge. Il ne bouge pas.</p>\\n<p>« Viens… j’ai à te parler… c’est difficile… »</p>\\n<p>Elle reste immobile : de quoi a-t-elle peur ? Il s’irrite presque d’une crainte si vaine. Il veut lui dire qu’il était fou, cruel, injuste, qu’elle seule est vraie, mais il faut d’abord qu’elle s’approche, qu’elle témoigne de la confiance, qu’elle se livre. Alors il s’humiliera devant elle. Alors elle comprendra… mais voici qu’elle tourne déjà le loquet.</p>\\n<p>Il allonge le bras et lui saisit brusquement le poignet. Elle le considère avec un mépris écrasant. Il se bute : il faut à tout prix maintenant la tenir sous son joug, lui montrer sa force, lui dire : « Vois : j’ouvre les mains. »</p>","<p>Il tira d’abord doucement, puis durement sur le bras fragile. Elle leva la main prête à le gifler mais il paralysa cette autre main. Maintenant il lui faisait mal. Il sentait qu’il lui faisait mal. Il pensait aux enfants qui se sont saisis d’un chat sauvage et, pour l’apprivoiser de force, l’étranglent presque, pour le caresser de force. Pour être doux. Il respirait profondément : « Je lui fais du mal, tout est perdu. » Il éprouva quelques secondes l’envie folle d’étouffer avec Geneviève cette image de lui qu’il formait et qui l’épouvantait lui-même.</p>\\n<p>Il desserra enfin les doigts avec un sentiment étrange d’impuissance et de vide. Elle s’écartait sans hâte, comme si vraiment il n’était plus à craindre, comme si quelque chose la plaçait soudain hors de portée. Il n’existait pas. Elle s’attarda, refit lentement sa coiffure et, toute droite, sortit.</p>\\n<p>Le soir, quand Bernis vint la voir, elle ne lui parla de rien. On n’avoue pas ces choses-là. Mais elle lui fit raconter des souvenirs de leur commune enfance et de sa vie à lui, là-bas. Et cela parce qu’elle lui confiait une petite fille à consoler et qu’on les console avec des images.</p>\\n<p>Elle appuyait son front à cette épaule et Bernis crut que Geneviève, tout entière, trouvait là son refuge. Sans doute le croyait-elle aussi. Sans doute ne savaient-ils pas que l’on aventure, sous la caresse, bien peu de soi-même.</p>","<h2>V</h2>\\n<p>« Vous chez moi, à cette heure-ci, Geneviève… Comme vous êtes pâle… »</p>\\n<p>Geneviève se tait. La pendule fait un tic-tac insupportable. La lumière de la lampe se mêle déjà à celle de l’aube, breuvage maussade qui donne la fièvre. Cette fenêtre écœure. Geneviève fait un effort !</p>\\n<p>« J’ai vu de la lumière, je suis venue… » et ne trouve plus rien à dire.</p>\\n<p>« Oui, Geneviève, je… je bouquine, voyez-vous… »</p>\\n<p>Les livres brochés font des taches jaunes, blanches, rouges. « Des pétales », pense Geneviève. Bernis attend. Geneviève reste immobile.</p>\\n<p>« Je rêvais dans ce fauteuil-là, Geneviève, j’ouvrais un livre, puis l’autre, j’avais l’impression d’avoir tout lu. »</p>\\n<p>Il donne cette image de vieillard pour cacher son exaltation, et de sa voix la plus tranquille :</p>\\n<p>« Vous avez à me parler, Geneviève ?… »</p>\\n<p>Mais au fond de lui-même, il pense : « C’est un prodige de l’amour. »</p>\\n<p>Geneviève lutte contre une seule idée : il ne sait pas… Et le regarde avec étonnement. Elle ajoute tout haut :</p>\\n<p>« Je suis venue… »</p>\\n<p>Et passe sa main sur son front.</p>\\n<p>Les vitres blanchissent, versent dans la pièce une lumière d’aquarium. « La lampe se fane », pense Geneviève.</p>\\n<p>Puis tout à coup avec détresse :</p>\\n<p>« Jacques, Jacques, emmenez-moi ! »</p>\\n<p>Bernis est pâle et la prend dans ses bras et la berce.</p>\\n<p>Geneviève ferme les yeux :</p>\\n<p>« Vous allez m’emporter… »</p>","<p>Le temps fuit sur cette épaule sans faire de mal. C’est presque une joie de renoncer à tout : on s’abandonne, on est emportée par le courant, il semble que sa propre vie s’écoule… s’écoule. Elle rêve tout haut « sans me faire mal ».</p>\\n<p>Bernis lui caresse le visage. Elle se souvient de quelque chose : « Cinq ans, cinq ans… et c’est permis ! » Elle pense encore : « Je lui ai tant donné… »</p>\\n<p>– Jacques !… Jacques… Mon fils est mort…</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>– Voyez-vous, j’ai fui la maison. J’ai un tel besoin de paix. Je n’ai pas compris encore, je n’ai pas encore de peine. Suis-je une femme sans cœur ? Les autres pleurent et voudraient bien me consoler. Ils sont émus d’être si bons. Mais vois-tu… je n’ai pas encore de souvenirs.</p>\\n<p>« À toi, je puis tout raconter. La mort vient dans un grand désordre ; les piqûres, les pansements, les télégrammes. Après quelques nuits sans sommeil on croit rêver. Pendant les consultations on appuie au mur sa tête qui est creuse.</p>\\n<p>« Et les discussions avec mon mari, quel cauchemar ! Aujourd’hui, un peu avant… il m’a prise au poignet et j’ai cru qu’il allait le tordre. Tout ça pour une piqûre. Mais je savais bien… ce n’était pas l’heure. Ensuite il voulait mon pardon, mais ce n’était pas important ! Je répondais : « Oui… oui… Laisse-moi rejoindre mon fils. » Il barrait la porte : « Pardonne-moi… j’en ai besoin ! » Un vrai caprice. « Voyons, laisse-moi passer. Je te pardonne. » Lui : « Oui des lèvres mais non du cœur. » Et ainsi de suite, j’en devenais folle.</p>","<p>« Alors bien sûr, quand c’est fini on n’a pas de grand désespoir. On est presque étonnée de la paix, du silence. Je pensais… je pensais : l’enfant se repose. C’est tout. Il me semblait aussi que je débarquais au petit jour, très loin, je ne sais où, et je ne savais plus quoi faire. Je pensais : « On est arrivé. » Je regardais les seringues, les drogues, je me disais : « Ça n’a plus de sens… on est arrivé. » Et je me suis évanouie.</p>\\n<p>Soudain elle s’étonne :</p>\\n<p>– J’ai été folle de venir.</p>\\n<p>Elle sent que l’aube blanchit là-bas un grand désastre. Les draps froids et défaits. Des serviettes jetées sur les meubles, une chaise tombée. Il faut qu’elle s’oppose en hâte à cette débâcle des choses. Il faut tirer en hâte ce fauteuil à sa place, ce vase, ce livre. Il faut qu’elle s’épuise vainement à refaire l’attitude des choses qui entourent la vie.</p>","<h2>VI</h2>\\n<p>On est venu en visites de condoléances. Quand on parle, on ménage des poses. On laisse s’apaiser en elle les pauvres souvenirs que l’on remue, et c’est un silence si indiscret… Elle se tenait toute droite. Elle prononçait sans faiblir les mots dont on faisait le tour, le mot : mort. Elle ne veut pas que l’on guette en elle l’écho des phrases que l’on tente. Elle fixait droit dans les yeux pour que l’on n’osât pas la regarder, mais, dès qu’elle baissait les siens…</p>\\n<p>Et les autres… Ceux qui jusqu’à l’antichambre marchent avec un calme tranquille, mais, de l’antichambre au salon, font quelques pas précipités et perdent l’équilibre dans ses bras. Pas un mot. Elle ne leur dira pas un mot. Ils étouffent son chagrin. Ils pressent sur leur sein une enfant crispée.</p>\\n<p>Son mari maintenant parle de vendre la maison. Il dit : « Ces pauvres souvenirs nous font du mal ! » Il ment, la souffrance est presque une amie. Mais il s’agite, il aime les grands gestes. Il part ce soir pour Bruxelles. Elle doit le rejoindre : « Si vous saviez dans quel désordre est la maison… ».</p>\\n<p>Tout son passé défait. Ce salon qu’une longue patience a composé. Ces meubles déposés là, non par l’homme, par le marchand, mais par le temps. Ces meubles ne meublaient pas le salon, mais sa vie. On tire loin de la cheminée ce fauteuil et loin du mur cette console. Et voici que tout s’échoue hors du passé, pour la première fois avec un visage nu.</p>\\n<p>« Et vous aussi vous allez repartir ? » Elle ébauche un geste désespéré.</p>","<p>Mille pactes rompus. C’était donc un enfant qui tenait les liens du monde, autour de qui le monde s’ordonnait ? Un enfant dont la mort est une telle défaite pour Geneviève ? Elle se laisse aller :</p>\\n<p>« J’ai du mal… »</p>\\n<p>Bernis lui parle doucement : « Je vous emporte. Je vous enlève. Vous souvenez-vous ? Je vous disais qu’un jour je reviendrais. Je vous disais… » Bernis la serre dans ses bras et Geneviève renverse un peu la tête et ses yeux deviennent brillants de larmes et Bernis ne tient plus dans les bras, prisonnière, que cette petite fille en pleurs.</p>\\n<p>Cap Juby le…</p>\\n<p>Bernis, mon vieux, c'est jour de courrier. L’avion a quitté Cisneros. Bientôt il passera ici et t’emportera ces quelques reproches. J’ai beaucoup pensé à tes lettres et à notre princesse captive. En me promenant sur la plage hier, si vide, si nue, éternellement lavée par la mer, j’ai pensé que nous étions semblables à elle. Je ne sais pas bien si nous existons. Tu as vu, certains soirs, aux couchers de soleil tragiques, tout le fort espagnol, dans la plage luisante, sombrer. Mais ce reflet d’un bleu mystérieux n’est pas du même grain que le fort. Et c'est ton royaume. Pas très réel, pas très sûr… Mais, Geneviève, laisse-la vivre.</p>\\n<p>Oui, je sais, dans son désarroi d’aujourd’hui. Mais les drames sont rares dans la vie. Il y a si peu d’amitiés, de tendresses, d’amours à liquider. Malgré ce que tu dis d’Herlin, un homme ne compte pas beaucoup. Je crois… la vie s’appuie sur autre chose.</p>","<p>Ces coutumes, ces conventions, ces lois, tout ce dont tu ne sens pas la nécessité, tout ce dont tu t’es évadé… C’est cela qui lui donne un cadre. Il faut autour de soi, pour exister, des réalités qui durent. Mais absurde ou injuste, tout ça n'est qu’un langage. Et Geneviève, emportée par toi, sera privée de Geneviève.</p>\\n<p>Et puis sait-elle ce dont elle a besoin ? Cette habitude même de la fortune, qu’elle s’ignore. L’argent, c'est ce qui permet la conquête des biens, l’agitation extérieure – et sa vie est intérieure – mais la fortune : c'est ce qui fait durer les choses. C'est le fleuve invisible, souterrain qui alimente un siècle les murs d’une demeure, les souvenirs : l’âme. Et tu vas lui vider sa vie comme on vide un appartement de mille objets que l’on ne voyait plus mais qui le composent.</p>\\n<p>Mais j’imagine que, pour toi, aimer c'est naître. Tu croiras emporter une Geneviève neuve. L’amour est, pour toi, cette couleur des yeux que tu voyais parfois en elle et qu’il sera facile d’alimenter comme une lampe. Et c'est vrai qu’à certaines minutes les mots les plus simples paraissent chargés d’un tel pouvoir et qu’il est facile de nourrir l’amour…</p>\\n<p>Vivre, sans doute, c'est autre chose.</p>","<h2>VII</h2>\\n<p>Geneviève est gênée de toucher ce rideau, ce fauteuil, doucement, mais comme des bornes que l’on découvre. Jusqu’à présent ces caresses des doigts étaient un jeu. Jusqu’à présent ce décor était si léger d’apparaître et de disparaître aux heures voulues, comme au théâtre. Elle, dont le goût était si sûr, ne s’était jamais demandé ce qu’étaient au juste ce tapis de Perse, cette toile de Jouy. Ils formaient jusqu’à aujourd’hui l’image d’un intérieur – et si doux –, maintenant elle les rencontrait.</p>\\n<p>« Ce n’est rien, pensait Geneviève, je suis encore en étrangère dans une vie qui n’est pas la mienne. » Elle s’enfonçait dans un fauteuil et fermait les yeux. Ainsi dans la cabine de l’express. Chaque seconde que l’on subit jette en arrière maisons, forêts, villages. Pourtant, si l’on ouvre les yeux de sa couchette on ne voit qu’un anneau de cuivre, toujours le même. On est transformée sans le savoir. « Dans huit jours j’ouvrirai les yeux et je serai neuve : il m’emporte. »</p>\\n<p>« Que pensez-vous de notre demeure ? » Pourquoi la réveiller déjà ? Elle regarde. Elle ne sait exprimer ce qu’elle ressent : ce décor manque de durée. Sa charpente n'est pas solide…</p>\\n<p>« Approche-toi, Jacques, toi qui existes… »</p>\\n<p>Ce demi-jour sur des divans, des tentures de garçonnière. Ces étoffes marocaines sur les murs. Tout cela en cinq minutes s’accroche, s’enlève.</p>\\n<p>« Pourquoi cachez-vous les murs, Jacques, pourquoi voulez-vous amortir le contact des doigts et des murs ?… »</p>","<p>Elle aime, de la paume, caresser la pierre, caresser ce qu’il y a dans la maison de plus sûr et de plus durable. Ce qui peut vous porter longtemps comme un navire…</p>\\n<p>Il montre ses richesses : « des souvenirs… » Elle comprend. Elle a connu des officiers de Coloniale qui menaient à Paris des vies de fantôme. Ils se retrouvaient sur les boulevards et s’étonnaient d’être vivants. On reconnaissait tant bien que mal, dans leur maison, cette maison de Saigon, de Marrakech. On y parlait de femmes, de camarades, de promotions ; mais ces draperies, qui étaient peut-être, là-bas, la chair même des murs, ici semblaient mortes.</p>\\n<p>Elle touchait du doigt des cuivres minces.</p>\\n<p>– Vous n’aimez pas mes bibelots ?</p>\\n<p>– Pardonnez-moi Jacques… C’est un peu…</p>\\n<p>Elle n’osait pas dire : « vulgaire. » Mais cette sûreté du goût qui lui venait de n’avoir connu et aimé que les vrais Cézanne, non des copies, ce meuble authentique, non l’imitation, les lui faisait obscurément mépriser. Elle était prête à tout sacrifier, du cœur le plus généreux ; il lui semblait qu’elle aurait supporté la vie dans une cellule peinte à la chaux, mais ici elle sentait un peu d’elle-même se compromettre. Non sa délicatesse d’enfant riche, mais, quelle idée étrange, sa droiture même. Il devina sa gêne sans la comprendre.</p>\\n<p>– Geneviève, je ne puis vous conserver tant de confort, je ne suis…</p>","<p>– Oh ! Jacques ! Vous êtes fou, qu’avez-vous cru ! Cela m’est bien égal – elle se serrait dans ses bras –, simplement je préfère à vos tapis un parquet bien simple, bien ciré… Je vous arrangerai tout ça…</p>\\n<p>Puis elle s’interrompit, elle devinait que la nudité qu’elle souhaitait était un luxe beaucoup plus grand, exigeait beaucoup plus des objets que ces masques sur leur visage. Ce hall où elle jouait enfant, ces parquets de noyer brillant, ces tables massives qui pouvaient traverser les siècles sans se démoder ni vieillir…</p>\\n<p>Elle ressentait une étrange mélancolie. Non le regret de la fortune, de ce qu’elle autorise : elle avait sans doute moins que Jacques connu le superflu, mais elle comprenait précisément que, dans sa vie nouvelle, c’est de superflu qu’elle serait riche. Elle n’en avait pas besoin. Mais cette assurance de durée : elle ne l’aurait plus. Elle pensa : « Les choses duraient plus que moi. J’étais reçue, accompagnée, assurée d’être un jour veillée, et maintenant, je vais durer plus que les choses. »</p>\\n<p>Elle pense encore : « Lorsque j’allais à la campagne… » Elle revoit cette maison à travers les tilleuls épais. C’est ce qu’il y avait de plus stable qui arrivait la surface : ce perron de pierres larges qui se continuait dans la terre.</p>\\n<p>Là-bas… Elle songe à l’hiver. L’hiver qui sarcle tout le bois sec de la forêt et dépouille chaque ligne de la maison. On voit la charpente même du monde.</p>","<p>Geneviève passe et siffle ses chiens. Chacun de ses pas fait craquer les feuilles, mais après ce tri que l’hiver a fait, ce grand sarclage, elle sait qu’un printemps va remplir la trame, monter dans les branches, éclater les bourgeons, refaire neuves ces voûtes vertes qui ont la profondeur de l’eau et son mouvement.</p>\\n<p>Là-bas, son fils n’a pas tout à fait disparu. Quand elle entre dans le cellier tourner les coings à demi mûrs, il vient à peine de s’échapper, mais après avoir tant couru, ô mon petit, tant fait le fou, n’est-il pas sage de dormir ?</p>\\n<p>Elle connaît là-bas le signe des morts et ne le craint pas. Chacun ajoute son silence aux silences de la maison. On lève les yeux de son livre, on retient son souffle, on goûte l’appel qui vient de s’éteindre.</p>\\n<p>Disparus ? Quand parmi ceux qui sont changeants ils sont seuls durables, quand leur dernier visage enfin était si vrai que rien d’eux ne pourra jamais le démentir !</p>\\n<p>« Maintenant je suivrai cet homme et je vais souffrir et douter de lui. » Car cette confusion humaine de tendresse et de rebuffades, elle ne l’a démêlée qu’en eux dont les parts sont faites.</p>\\n<p>Elle ouvre les yeux : Bernis rêve.</p>\\n<p>« Jacques, il faut me protéger, je vais partir pauvre, si pauvre ! »</p>\\n<p>Elle survivra à cette maison de Dakar, à cette foule de Buenos-Ayres, dans un monde où il n’y aura que des spectacles point nécessaires et à peine plus réels, si Bernis n’est pas assez fort, que ceux d’un livre…</p>","<p>Mais il se penche vers elle et parle avec douceur. À cette image qu’il donne de lui, à cette tendresse d’essence divine elle veut bien s’efforcer de croire. Elle veut bien aimer l’image de l’amour : elle n’a que cette faible image pour la défendre…</p>\\n<p>Elle trouvera ce soir dans la volupté cette faible épaule, ce faible refuge, y enfoncera son visage comme une bête pour mourir.</p>","<h2>VIII</h2>\\n<p>– Où me conduisez-vous ? Pourquoi me conduisez-vous là ?</p>\\n<p>– Cet hôtel vous déplaît, Geneviève ? Voulez-vous que nous repartions ?</p>\\n<p>– Oui, repartons… fit-elle avec crainte.</p>\\n<p>Les phares éclairaient mal. On s’enfonçait péniblement dans la nuit comme dans un trou. Bernis jetait parfois un coup d’œil de côté : Geneviève était blanche.</p>\\n<p>– Vous avez froid ?</p>\\n<p>– Un peu, ça ne fait rien. J’ai oublié de prendre ma fourrure.</p>\\n<p>Elle était une petite fille très étourdie. Elle sourit.</p>\\n<p>Maintenant il pleuvait. « Pourriture ! » se dit Jacques, mais il pensait encore qu’ainsi sont les abords du paradis terrestre.</p>\\n<p>Aux environs de Sens il fallut changer une bougie. Il avait oublié la baladeuse : encore un oubli. Il tâtonna sous la pluie avec une clef qui foirait. « Nous aurions dû prendre le train. » Il se le répétait obstinément. Il avait préféré sa voiture à cause de l’image qu’elle donnait de liberté : jolie liberté ! Il n’avait d’ailleurs fait que des sottises depuis cette fuite : et tous ces oublis !</p>\\n<p>« Vous y parvenez ? »</p>\\n<p>Geneviève l’avait rejoint. Elle se sentait soudain prisonnière : un arbre, deux arbres en sentinelle et cette stupide petite cabane de cantonnier. Mon Dieu quelle drôle d’idée… Est-ce qu’elle allait vivre ici toujours ?</p>\\n<p>C’était fini, il lui prit la main :</p>\\n<p>« Vous avez la fièvre ! »</p>\\n<p>Elle sourit…</p>\\n<p>– Oui… je suis un peu fatiguée, j’aimerais dormir.</p>\\n<p>– Mais pourquoi êtes-vous descendue sous la pluie !</p>\\n<p>Le moteur tirait toujours mal avec des à-coups et des claquements.</p>","<p>– Arriverons-nous, mon petit Jacques ? – Elle dormait à demi, enveloppée de fièvre – arriverons-nous ?</p>\\n<p>– Mais oui, mon amour, c’est bientôt Sens.</p>\\n<p>Elle soupira. Ce qu’elle essayait était au-dessus de ses forces. Tout cela à cause de ce moteur qui haletait. Chaque arbre était si lourd à tirer à soi. Chacun. L’un après l’autre. Et c’était à recommencer.</p>\\n<p>« Ce n’est pas possible, pensait Bernis, il faudra s'arrêter encore. » Il envisageait cette panne avec effroi. Il craignait l’immobilité du paysage. Elle délivre certaines pensées qui sont en germes. Il craignait une certaine force qui se faisait jour.</p>\\n<p>« Ma petite Geneviève, ne pensez pas à cette nuit… Pensez à bientôt… Pensez à… à l’Espagne. Aimerez-vous l’Espagne ?</p>","<p>Une petite voix lointaine lui répondit : « Oui Jacques, je suis heureuse, mais… j’ai un peu peur des brigands. » Il la vit doucement sourire. Cette phrase fit mal à Bernis, cette phrase qui ne voulait rien dire sinon : ce voyage en Espagne, ce conte de fées… Sans foi. Une armée sans foi. Une armée sans fois ne peut conquérir. « Geneviève, c’est cette nuit, c’est cette pluie qui abîme notre confiance… » Il connut tout à coup que cette nuit était semblable à une maladie interminable. Ce goût de maladie, il l’avait dans la bouche. C’était une de ces nuits sans espoir d’aube. Il luttait, scandait en lui-même : « L’aube serait une guérison si seulement il ne pleut pas… Si seulement… » Quelque chose était malade en eux, mais il ne le savait pas. Il croyait que c’était la terre qui était pourrie, que c’était la nuit qui était malade. Il souhaitait l’aube, pareil aux condamnés qui disent : « Quand il fera jour je vais respirer » ou « Quand viendra le printemps, je serai jeune… »</p>\\n<p>« Geneviève, pensez à notre maison de là-bas… » Il connut aussitôt qu’il n’aurait jamais dû dire cela. Rien ne pouvait en bâtir l’image en Geneviève. « Oui, notre maison… » Elle essayait le son du mot. Sa chaleur glissait, sa saveur était fugitive.</p>\\n<p>Elle secoua beaucoup de pensées qu’elle ne se connaissait pas et qui allaient former des mots, beaucoup de pensées qui lui faisaient peur.</p>","<p>Ne connaissant pas les hôtels de Sens, il fit halte sous un réverbère pour consulter le guide. Un gaz presque tari remuait les ombres, faisait vivre sur le mur blafard une enseigne délavée et qui avait coulé « Vélos… » Il lui parut que c’était le mot le plus triste et le plus vulgaire qu’il eût jamais lu. Symbole d’une vie médiocre. Il lui apparut que beaucoup de choses dans sa vie là-bas étaient médiocres mais qu’il ne s’en était pas aperçu.</p>\\n<p>« Du feu, bourgeois… » Trois gamins efflanqués le regardaient en rigolant. « Ces Américains, ça cherche sa route… » Puis ils dévisagèrent Geneviève :</p>\\n<p>– Foutez-moi le camp, gronda Bernis.</p>\\n<p>– Ta poule, elle est mariole. Mais si tu voyais la nôtre au vingt-neuf !…</p>\\n<p>Geneviève se pencha vers lui un peu effarée.</p>\\n<p>– Qu’est-ce qu’ils disent ?… Je vous en prie, allons-nous-en.</p>\\n<p>– Mais Geneviève…</p>\\n<p>Il fit un effort et se tut. Il fallait bien lui chercher un hôtel… Ces gamins saouls… quelle importance ? Puis il pensa qu’elle avait la fièvre, qu’elle souffrait, qu’il aurait dû lui épargner cette rencontre. Il se reprocha avec une obstination maladive de l’avoir mêlée à des choses laides. Il…</p>\\n<p>L’hôtel du Globe était fermé. Tous ces petits hôtels avaient, la nuit, des allures de merceries. Il frappa longuement la porte jusqu’à secouer un pas traînard. Le veilleur de nuit entrouvrit :</p>\\n<p>– Complet.</p>\\n<p>– Je vous en prie, ma femme est malade ! insista Bernis. La porte s’était refermée. Le pas s’enfonçait dans le corridor.</p>\\n<p>Tout se liguait donc contre eux ?…</p>","<p>– Qu’a-t-il répondit, fit Geneviève, pourquoi, pourquoi n’a-t-il même pas répondu ?</p>\\n<p>Bernis faillit faire observer qu’ils n’étaient pas ici place Vendôme et qu’une fois leur ventre plein, les petits hôtels s’endormaient. Rien de plus normal. Il s’assit sans un mot. Son visage luisait de sueur. Il ne démarrait pas, mais fixait un pavé brillant, la pluie lui glissait dans le cou ; il lui semblait avoir à remuer l’inertie d’une terre entière. De nouveau cette idée stupide : quand viendra le jour…</p>\\n<p>Il fallait vraiment, à cette minute, qu’un mot humain fût prononcé. Geneviève l’essaya : « Tout cela n’est rien, mon amour. Il faut travailler pour notre bonheur. » Bernis la contempla : « Oui, vous êtes très généreuse. » Il était ému. Il eût désiré l’embrasser : mais cette pluie, cet inconfort, cette fatigue… Il lui prit cependant la main, sentit que la fièvre montait. Chaque seconde minait cette chair. Il se calmait par des images. « Je lui ferai faire un grog bien chaud. Ce ne sera rien. Un grog brûlant. Je l’envelopperai de couvertures. Nous rirons en nous regardant de ce voyage difficile. » Il éprouva une vague impression de bonheur. Mais combien la vie immédiate s’ajustait mal à ces images. Deux autres hôtels restèrent muets. Ces images. Il fallait chaque fois les renouveler. Et chaque fois elles perdaient un peu de leur évidence, ce faible pouvoir, qu’elles contenaient, de prendre corps.</p>","<p>Geneviève s’était tue. Il sentait qu’elle ne se plaindrait pas et ne dirait plus rien. Il pouvait rouler, des heures, des jours : elle ne dirait rien. Jamais plus rien. Il pouvait lui tordre le bras : elle ne dirait rien… « Je divague, je rêve ! »</p>\\n<p>– Geneviève, mon petit enfant, avez-vous mal ?</p>\\n<p>– Mais non, c’est fini, je suis mieux.</p>\\n<p>Elle venait de désespérer de beaucoup de choses. D’y renoncer. Pour qui ? Pour lui. Des choses qu’il ne pouvait pas lui donner. Ce mieux… c’était un ressort qui se cassait. Plus soumise. Elle ira ainsi de mieux en mieux : elle aura renoncé au bonheur. Quand elle ira tout à fait bien… « Bon ! Quel imbécile je fais : je rêve encore. »</p>\\n<p>Hôtel de l’Espérance et d’Angleterre. Prix spéciaux pour les voyageurs de commerce. « Appuyez-vous à mon bras, Geneviève… Mais oui, une chambre. Madame est malade : vite un grog ! Un grog brûlant. » Prix spéciaux pour les voyageurs de commerce. Pourquoi cette phrase est-elle si triste ? « Prenez ce fauteuil, ça ira mieux. » Pourquoi ce grog ne vient-il pas ? Prix spéciaux pour les voyageurs de commerce.</p>","<p>La vieille bonne s’empressait : « Voilà ma petite dame. Pauvre madame. Elle est toute tremblante, toute pâle. Je vais lui faire une bouillotte. C’est au quatorze, une belle grande chambre… Monsieur veut-il remplir les feuilles ? » Un porte-plume sale entre les doigts, il remarqua que leurs noms différaient. Il pensait soumettre Geneviève à la complaisance de valets. « À cause de moi. Faute de goût. » Ce fut encore elle qui l’aida :</p>\\n<p>« Amants, dit-elle, n’est-ce pas tendre ? »</p>\\n<p>Ils songeaient à Paris, au scandale. Ils voyaient s’agiter différents visages. Quelque chose de difficile commençait seulement pour eux, mais ils se gardaient des moindres paroles, de peur de se rencontrer dans leurs pensées.</p>\\n<p>Et Bernis comprit qu’il n’y avait rien eu jusqu’à présent, rien, sinon un moteur un peu mou, quelques gouttes de pluie, dix minutes perdues à chercher un hôtel. Les difficultés épuisantes qu’il leur avait semblé surmonter venaient d’eux-mêmes. C’était contre elle-même que Geneviève
