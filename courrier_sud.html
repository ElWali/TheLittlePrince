peinait et ce qui s’arrachait d’elle tenait si fort qu’elle était déjà déchirée.</p>\\n<p>Il lui prit les mains, mais connut encore que les mots ne le serviraient pas.</p>\\n<p>Elle dormait. Il ne pensait pas à l’amour. Mais il rêvait bizarrement. Des réminiscences. La flamme de la lampe. Il faut se hâter de nourrir la lampe. Mais il faut aussi protéger la flamme du grand vent qu’il fait.</p>","<p>Mais surtout ce détachement. Il l’eût désirée avide de biens. Souffrant des choses, touchée par les choses et criant pour en être nourrie comme un enfant. Alors, malgré son indigence, il aurait eu beaucoup à lui donner. Mais il s’agenouilla pauvre devant cette enfant qui n’avait pas faim.</p>","<h2>IX</h2>\\n<p>« Non. Rien… Laisse-moi… Ah ! déjà ? »</p>\\n<p>Bernis est debout. Ses gestes dans le rêve étaient lourds comme les gestes d’un haleur. Comme les gestes d’un apôtre qui vous tire au jour du fond de vous-même. Chacun de ses pas était plein de sens comme les pas d’un danseur.</p>\\n<p>« Oh ! mon amour… »</p>\\n<p>Il va de long en large : c’est ridicule.</p>\\n<p>Cette fenêtre est salie par l’aube. Cette nuit, elle était bleu sombre. Elle prenait, à la lumière de la lampe, une profondeur de saphir. Cette nuit, elle se creusait jusqu’aux étoiles. On rêve. On imagine. On est à la proue d’un navire.</p>\\n<p>Elle ramène contre elle ses genoux, se sent une chair molle de pain mal cuit. Le cœur bat trop vite et fait mal. Ainsi dans un wagon. Le bruit des essieux scande la fuite. Les essieux battent comme le cœur. On colle son front à la vitre et le paysage s’écoule : des masses noires que l’horizon enfin recueille, cerne peu à peu de sa paix, doux comme la mort.</p>\\n<p>Elle voudrait crier à l’homme : « Retiens-moi ! » Les bras de l’amour vous contiennent avec votre présent, votre passé, votre avenir, les bras de l’amour vous rassemblent…</p>\\n<p>« Non. Laisse-moi. »</p>\\n<p>Elle se lève.</p>","<h2>X</h2>\\n<p>« Cette décision, pensait Bernis, cette décision a été prise en dehors de nous. Tout s’était fait sans échange de mots. » Ce retour était, semblait-il, convenu d’avance. Malade ainsi, il ne s’agissait plus de poursuivre. On verrait plus tard. Une aussi courte absence, Herlin loin, tout s’arrangerait. Bernis s’étonnait de ce que tout apparût comme si facile. Il savait bien que ce n’était pas vrai. C’étaient eux qui pouvaient agir sans effort.</p>\\n<p>D’ailleurs il doutait de lui-même. Il savait bien qu’il avait cédé encore à des images. Mais, les images, de quelle profondeur viennent-elles ? Ce matin en se réveillant il avait tout de suite pensé devant ce plafond bas et terne : « Sa maison était un navire. Elle passait les générations d’un bord à l’autre. Le voyage n’a de sens ni ici ni ailleurs, mais quelle sécurité on tire d’avoir son billet, sa cabine, et ses valises de cuir jaune. D’être embarqué… »</p>\\n<p>Il ne savait pas encore s’il souffrait parce qu’il suivait une pente et que l’avenir venait à lui sans qu’il eût à s’en saisir. Quand on s’abandonne on ne souffre pas. Quand on s’abandonne même à la tristesse on ne souffre plus. Il souffrirait plus tard en confrontant quelques images. Il sut ainsi qu’ils jouaient aisément cette seconde partie de leur rôle parce qu’il était prévu quelque part en eux-mêmes. Il se disait cela en menant un moteur qui ne tournait pas mieux. Mais on arriverait. On suivait une pente. Toujours cette image de pente.</p>","<p>Vers Fontainebleau, elle avait soif. Chaque détail du paysage : on le reconnaissait. Il s’installait tranquillement. Il rassurait. C’était un cadre nécessaire qui montait au jour.</p>\\n<p>Dans cette gargote on leur servit du lait.</p>\\n<p>À quoi bon se presser. Elle le buvait par petites gorgées. À quoi bon se presser ? Tout ce qui se passait venait à eux nécessairement : toujours cette image de nécessité.</p>\\n<p>Elle était douce. Elle lui savait gré de beaucoup de choses. Leurs rapports étaient bien plus libres qu’hier. Elle souriait, désignait un oiseau qui picorait devant la porte. Son visage lui parut nouveau, où avait-il vu ce visage ?</p>\\n<p>Aux voyageurs. Aux voyageurs que la vie dans quelques secondes détachera de votre vie. Sur les quais. Ce visage déjà peut sourire, vivre de ferveurs inconnues.</p>\\n<p>Il leva les yeux de nouveau. De profil, penchée, elle rêvait. Il la perdait si elle tournait à peine la tête.</p>\\n<p>Sans doute l’aimait-elle toujours, mais il ne faut pas trop demander à une faible petite fille. Il ne pouvait évidemment pas dire « je vous rends votre liberté » ni quelque phrase aussi absurde, mais il parla de ce qu’il comptait faire, de son avenir. Et dans la vie qu’il s’inventait, elle n’était pas prisonnière. Pour le remercier, elle posa sa petite main sur son bras : « Vous êtes tout… tout mon amour. » Et c’était vrai, mais il connut aussi à ces mots-là qu’ils n’étaient pas faits l’un pour l’autre.</p>","<p>Têtue et douce. Si près d’être dure, cruelle, injuste, mais sans le savoir. Si près de défendre à tout prix quelque bien obscur. Tranquille et douce.</p>\\n<p>Elle n’était pas faite, non plus, pour Herlin. Il le savait. La vie qu’elle parlait de reprendre ne lui avait jamais causé que du mal. Pourquoi était-elle donc faite ? Elle semblait ne pas souffrir.</p>\\n<p>On se remit en route. Bernis se détournait un peu vers la gauche. Il savait bien ne pas souffrir non plus, mais sans doute quelque bête en lui était blessée dont les larmes étaient inexplicables.</p>\\n<p>À Paris, nul tumulte : on ne dérange pas grand-chose.</p>","<h2>XI</h2>\\n<p>À quoi bon ? La ville faisait autour de lui son remue-ménage inutile. Il savait bien que de cette confusion il ne pouvait plus rien sortir. Il remontait, avec lenteur, le peuple étranger des passants. Il pensait : « C’est comme si je n’étais pas là. » Il devait repartir avant peu : c’était bien. Il savait que son travail l’entourerait de liens si matériels qu’il reprendrait une réalité. Il savait aussi que, dans la vie quotidienne, le moindre pas prend l’importance d’un fait et que le désastre moral y perd un peu de sens. Les plaisanteries de l’escale garderaient même leur saveur. C’était étrange et pourtant certain. Mais il ne s’intéressait pas à lui-même.</p>\\n<p>Comme il passait près de Notre-Dame, il entra, fut surpris de la densité de la foule et se réfugia contre un pilier. Pourquoi donc se trouvait-il là ? Il se le demandait. Après tout, il était venu parce que les minutes menaient ici à quelque chose. Dehors elles ne menaient plus à rien. Voilà : « Dehors les minutes ne mènent plus à rien. » Il éprouvait aussi le besoin de se reconnaître et s’offrait à la foi comme à n’importe quelle discipline de la pensée. Il se disait : « Si je trouve une formule qui m’exprime, qui me rassemble, pour moi ce sera vrai. » Puis il ajoutait avec lassitude : « Et pourtant, je n’y croirais pas. »</p>\\n<p>Et soudain il lui apparut qu’il s’agissait encore d’une croisière et que toute sa vie s’était usée à tenter ainsi de fuir. Et le début du sermon l’inquiéta comme le signal d’un départ.</p>","<p>« Le royaume des Cieux, commença le prédicateur, le royaume des Cieux… »</p>\\n<p>Il s’appuya des mains au rebord large de la chaire… se pencha sur la foule. Foule entassée et qui absorbe tout. Nourrir. Des images lui venaient avec un caractère d’évidence extra-ordinaire. Il pensait aux poissons pris dans la nasse, et sans lien ajouta :</p>\\n<p>« Quand le pêcheur de Galilée… »</p>\\n<p>Il n’employait plus que des mots qui entraînaient un cortège de réminiscences qui duraient. Il lui semblait exercer sur la foule une pesée lente, allonger peu à peu son élan comme la foulée du coureur. « Si vous saviez… Si vous saviez combien d’amour… » Il s’interrompit, haletant un peu : ses sentiments étaient trop pleins pour s’exprimer. Il comprit que les moindres mots, les plus usés, lui paraissaient chargés de trop de sens et qu’il ne distinguait plus les mots qui donnent. La lumière des cierges lui faisait un visage de cire. Il se redressa, les mains appuyées, le front levé, vertical. Quand il se détendit, ce peuple remua un peu, comme la mer.</p>\\n<p>Puis les mots lui vinrent et il parla. Il parlait avec une sûreté étonnante. Il avait l’allégresse du débardeur qui sent sa force. Des idées lui venaient qui se formaient en dehors de lui, pendant qu’il achevait sa phrase, comme un fardeau qu’on lui passait, et d’avance il sentait monter en lui, confusément, l’image où il la poserait, la formule qui l’emporterait dans ce peuple.</p>\\n<p>Bernis maintenant écoutait la péroraison.</p>","<p>« Je suis la source de toute vie. Je suis la marée qui entre en vous et vous anime et se retire. Je suis le mal qui entre ne vous et vous déchire et se retire. Je suis l’amour qui entre en vous et dure pour l’éternité.</p>\\n<p>« Et vous venez m’opposer Marcion et le quatrième évangile. Et vous venez me parler d’interpolations. Et vous venez dresser contre moi votre misérable logique humaine, quand je suis celui qui est au-delà, quand c’est d’elle que je vous délivre !</p>\\n<p>‘O prisonniers comprenez-moi ! Je vous délivre de votre science, de vos formules, de vos lois, de cet esclavage de l’esprit, de ce déterminisme plus dur que la fatalité. Je suis le défaut dans l’armure. Je suis la lucarne dans la prison. Je suis l’erreur dans le calcul : je suis la vie.</p>","<p>« Vous avez intégré la marche de l’étoile, ô génération des laboratoires, et vous ne la connaissez plus. C’est un signe dans votre livre, mais ce n’est plus de la lumière : vous en savez moins qu’un petit enfant. Vous avez découvert jusqu’aux lois qui gouvernent l’amour humain, mais cet amour même échappe à vos signes : vous en savez moins qu’une jeune fille ! Eh bien, venez à moi. Cette douceur de la lumière : vous en savez moins qu’un petit enfant. Vous avez découvert jusqu’aux lois qui gouvernent l’amour humain, mais cet amour même échappe à vos signes : vous en savez moins qu’une jeune fille ! Eh bien, venez à moi. Cette douceur de la lumière, cette lumière de l’amour, je vous les rends. Je ne vous asservis pas : je vous sauve. De l’homme qui le premier calcula la chute d’un fruit et vous enferma dans cet esclavage, je vous libère. Ma demeure est la seule issue, que deviendrez-vous hors de ma demeure ?</p>\\n<p>« Que deviendrez-vous hors de ma demeure, hors de ce navire où l’écoulement des heures prend son plein sens, comme, sur l’étrave luisante, l’écoulement de la mer. L’écoulement de la mer qui ne fait pas de bruit mais porte les Îles. L’écoulement de la mer.</p>\\n<p>« Venez à moi, vous à qui l’action, qui ne mène à rien, fut amère… »</p>\\n<p>Il ouvrit les bras :</p>","<p>« Car je suis celui qui accueille. Je portais les péchés du monde. J’ai porté son mal. J’ai porté vos détresses de bêtes qui perdent leurs petits et vos maladies incurables, et vous en étiez soulagés. Mais ton mal, mon peuple d’aujourd’hui, est une misère plus haute et plus irréparable et pourtant je le porterai comme les autres. Je porterai les chaînes plus lourdes de l’esprit.</p>\\n<p>« Je suis celui qui porte les fardeaux du monde. »</p>\\n<p>L’homme parut à Bernis désespéré parce qu’il ne criait pas pour obtenir un Signe. Parce qu’il ne proclamait pas un Signe. Parce qu’il se répondait à lui-même.</p>\\n<p>« Vous serez des enfants qui jouent.</p>\\n<p>« Vos efforts vains de chaque jour, qui vous épuisent, venez à moi, je leur donnerai un sens, ils bâtiront dans votre cœur, j’en ferai une chose humaine. »</p>\\n<p>La parole entre dans la foule. Bernis n’entend plus la parole, mais quelque chose qui est en elle et qui revient comme un motif.</p>\\n<p>… J’en ferai une chose humaine.</p>\\n<p>Il s’inquiète.</p>\\n<p>« De vos amours, sèches, cruelles et désespérées, amants d’aujourd’hui, venez à moi, je ferai une chose humaine.</p>\\n<p>« De votre hâte vers la chair, de votre retour triste, venez à moi, je ferai une chose humaine…</p>\\n<p>Bernis sent grandir sa détresse.</p>\\n<p>« … Car je suis celui qui s’est émerveillé de l’homme… »</p>\\n<p>Bernis est en déroute.</p>\\n<p>« Je suis le seul qui puisse rendre l’homme à lui-même. »</p>","<p>Le prêtre se tut. Épuisé il se retourna vers l’autel. Il adora ce Dieu qu’il venait d’établir. Il se sentit humble comme s’il avait tout donné, comme si l’épuisement de sa chair était un don. Il s ‘identifiait sans le savoir avec le Christ. Il reprit, tourné vers l’autel, avec une lenteur effrayante :</p>\\n<p>« Mon père, j’ai cru en eux, c’est pourquoi j’ai donné ma vie… »</p>\\n<p>Et se penchant une dernière fois sur la foule :</p>\\n<p>« Car je les aime… » Puis il trembla.</p>\\n<p>Le silence parut à Bernis prodigieux.</p>\\n<p>« Au nom du Père… »</p>\\n<p>Bernis pensait : « Quel désespoir ! Où est l’acte de foi ? Je n’ai pas entendu l’acte de foi, mais un cri parfaitement désespéré. »</p>\\n<p>Il sortit. Les lampes à arc s’allumeraient bientôt. Bernis marchait le long des berges de la Seine. Les arbres demeuraient immobiles, leurs branches en désordre prises dans la glu du crépuscule. Bernis marchait. Un calme s’était fait en lui, donné par la trêve du jour, et que l’on croit donné par la solution d’un problème.</p>\\n<p>Pourtant ce crépuscule… Toile de fond trop théâtrale qui a servi déjà pour les ruines d’Empire, les soirs de défaite et le dénouement de faibles amours, qui servira demain pour d’autres comédies. Toile de fond qui inquiète si le soir est calme, si la vie se traîne, parce que l’on ne sait pas quel drame se joue. Ah ! quelque chose pour le sauver d’une inquiétude si humaine…</p>\\n<p>Les lampes à arc, toutes à la fois, luirent.</p>","<h2>XII</h2>\\n<p>Des taxis. Des autobus. Une agitation sans nom, où il est bon, n’est-ce pas, Bernis, de se perdre ? Un lourdaud planté dans l’asphalte. – Allons, dérange-toi ! – Des femmes que l’on croise une fois dans sa vie : l’unique chance. Là-bas Montmartre d’une lumière plus crue. Déjà des filles qui s’accrochent. – Bon Dieu ! Ouste !… – Là-bas d’autres femmes. Des Hispanos, comme des écrins, qui donnent à des femmes, même sans beauté, une chair précieuse. Cinq cents billets de perles sur le ventre, et quelles bagues ! La chair d’une pâte de luxe. Encore une fille anxieuse : « Lâche-moi. Toi ! je te reconnais, rabatteur, fous le camp. Laissez-moi donc passer, je veux vivre ! »</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Cette femme soupait devant lui, en robe du soir échancrée en triangle sur un dos nu. Il ne voit que cette nuque, ces épaules, ce dos aveugle où courent de rapides tressaillements de chair. Cette matière toujours recomposée, insaisissable. Comme la femme fumait une cigarette et, le menton au poing, courbait la tête, il ne vit plus qu’une étendue déserte.</p>\\n<p>« Un mur », pensait-il.</p>","<p>Les danseuses commencèrent leur jeu. Le pas des danseuses était élastique et l’âme du ballet leur prêtait une âme. Bernis aimait ce rythme qui les suspendait en équilibre. Un équilibre si menacé mais qu’elles retrouvaient toujours avec une sûreté étonnante. Elles inquiétaient les sens de toujours dénouer l’image qui était sur le point de s’établir, et au seuil du repos, de la mort, de la résoudre encore en mouvements. C’était l’expression même du désir.</p>\\n<p>Devant lui ce dos mystérieux, lisse comme la surface d’un lac. Mais un geste ébauché, une pensée ou un frisson y propagèrent une grande ondulation d’ombre. Bernis pensait : « J’ai besoin de tout ce qui se meut, là-dessous, d’obscur. »</p>\\n<p>Les danseuses saluaient, ayant tracé, puis effacé quelques énigmes dans le sable. Bernis fit un signe à la plus légère.</p>\\n<p>« Tu danses bien. » Il devinait le poids de sa chair, comme la pulpe d’un fruit, et c’était pour lui une révélation de la découvrir pesante. Une richesse. Elle s’assit. Elle avait un regard appuyé et quelque chose du bœuf dans la nuque rasée. Et c’était la jointure la moins flexible de ce corps. Elle n’avait point de finesse dans le visage, mais tout le corps en descendait et répandait une grande paix.</p>\\n<p>Puis Bernis remarqua ses cheveux collés par la sueur. Une ride creusée dans le fard. Une parure défraîchie. Retirée de la danse, comme d’un élément, elle semblait défaite et malhabile.</p>\\n<p>« À quoi penses-tu ? » Elle eut un geste gauche.</p>","<p>Toute cette agitation nocturne prenait un sens. L’agitation des grooms, des chauffeurs de taxis, du maître d’hôtel. Ils faisaient leur métier qui est, en fin de compte, de pousser devant lui ce champagne et cette fille lasse. Bernis regardait la vie par les coulisses où tout est métier. Où il n’y a ni vice, ni vertu, ni émotion trouble, mais un labeur aussi routinier, aussi neutre que celui des hommes d’équipe. Cette danse même, qui rassemblait les gestes pour en composer un langage, ne pouvait parler qu’à l’étranger. L’étranger seul découvrait ici une construction mais qu’eux et elles avaient oubliée depuis longtemps. Ainsi le musicien, qui joue pour la millième fois le même air, en perd le sens. Ici, elles faisaient des pas, des mines, dans la lumière des projecteurs, mais Dieu sait avec quelles remarques. Et celle-ci uniquement occupée de sa jambe qui lui faisait mal et celle-là d’un rendez-vous – oh ! si misérable ! – après la danse. Et celle qui pensait : « Je dois cent francs… » Et l’autre peut-être toujours : « J’ai mal. »</p>\\n<p>Déjà s’était dénouée en lui toute sa ferveur. Il se disait : « Tu ne peux rien me donner de ce que je désire. » Et pourtant son isolement était si cruel qu’il eut besoin d’elle.</p>","<h2>XIII</h2>\\n<p>Elle craint cet homme silencieux. Quand elle s’éveille, la nuit, près du dormeur, elle a l’impression d’être oubliée sur une grève déserte.</p>\\n<p>« Prends-moi dans tes bras ! »</p>\\n<p>Elle éprouve pourtant des élans de tendresse… mais cette vie inconnue fermée dans ce corps, ces rêves inconnus sous l’os dur du front ! Couchée en travers de cette poitrine, elle sent la respiration de l’homme monter et descendre comme une vague et c’est l’angoisse d’une traversée. Si, l’oreille collée à la chair, elle écoute le bruit dur du cœur, ce moteur en marche ou cette cognée du démolisseur, elle éprouve le sentiment d’une fuite rapide, insaisissable. Et ce silence, quand elle prononce un mot qui le tire du rêve. Elle compte les secondes entre le mot et la réponse, comme pour l’orage – une … deux… trois… – Il est au-delà des campagnes. S’il ferme les yeux, elle prend et soulève cette tête lourde, comme celle d’un mort, des deux mains, ainsi qu’un pavé. « Mon amant, quelle désolation… »</p>\\n<p>Mystérieux compagnon de voyage.</p>\\n<p>Allongés l’un et l’autre et muets. On sent la vie qui vous traverse comme une rivière. Une fuite vertigineuse. Le corps : cette pirogue lancée…</p>\\n<p>« Quelle heure est-il ? »</p>\\n<p>On fait le point : drôle de voyage. « O mon amant ! » Elle se cramponne à lui, la tête renversée, les cheveux mêlés, tirée des eaux. La femme sort ou du sommeil ou de l’amour, cette mèche de cheveux collée au front, ce visage défait, retirée des mers.</p>\\n<p>« Quelle heure est-il ? »</p>","<p>Eh ! Pourquoi ? Ces heures passent comme de petites gares de province – minuit, une heure, deux heures – rejetées en arrière, perdues. Quelque chose file entre les doigts que l’on ne sait pas retenir. Vieillir, cela n’est rien.</p>\\n<p>« Je t’imagine très bien, les cheveux blancs, et moi sagement ton amie… »</p>\\n<p>Vieillir, cela n’est rien.</p>\\n<p>Mais cette seconde gâtée, ce calme différé, un peu plus loin encore, c’est ceci qui est fatigant.</p>\\n<p>– Parle-moi de ton pays ?</p>\\n<p>– Là-bas…</p>\\n<p>Bernis sait que c’est impossible. Villes, mers, patries : toutes les mêmes. Parfois un aspect fugitif que l’on devine sans comprendre, qui ne se traduit pas.</p>\\n<p>De la main, il touche le flanc de cette femme, là où la chair est sans défense. Femme : la plus nue des chairs vivantes et celle qui luit du plus doux éclat. Il pense à cette vie mystérieuse qui l’anime, qui la réchauffe comme un soleil, comme un climat intérieur. Bernis ne se dit pas qu’elle est tendre ni qu’elle est belle, mais qu’elle est tiède. Tiède comme une bête. Vivante. Et ce cœur toujours qui bat, source différente de la sienne et fermée dans ce corps.</p>\\n<p>Il songe à cette volupté qui a, en lui, quelques secondes battu des ailes : cet oiseau fou qui bat des ailes et meurt. Et maintenant…</p>","<p>Maintenant, dans la fenêtre, tremble le ciel. O femme après l’amour démantelée et découronnée du désir de l’homme. Rejetée parmi les étoiles froides. Les paysages du cœur changent si vite… Traversé le désir, traversée la tendresse, traversé le fleuve de feu. Maintenant pur, froid, dégagé du corps on est à la proue d’un navire, le cap en mer.</p>","<h2>XIV</h2>\\n<p>Ce salon en ordre ressemble à un quai. Bernis, à Paris, franchit avant l’heure du rapide des heures désertes. Le front contre la vitre, il regarde s’écouler la foule. Il est distancé par ce fleuve. Chaque homme forme un projet, se hâte. Des intrigues se nouent qui se dénoueront en dehors de lui. Cette femme passe, fait dix pas à peine et sort du temps. Cette foule était la matière vivante qui vous nourrit de larmes et de rires et maintenant la voici pareille à celle des peuples morts.</p>","<h1>TROISIÈME PARTIE</h1>","<h2>I</h2>\\n<p>L’Europe, l’Afrique se préparèrent à peu d’intervalle pour la nuit, liquidant çà et là les dernières tempêtes du jour. Celle de Grenade s’apaisait, celle de Malaga se résolvait en pluie. En quelques coins les bourrasques se cramponnaient encore aux branches comme à des chevelures.</p>\\n<p>Toulouse, Barcelone, Alicante ayant dépêché le courrier rangeaient leurs accessoires, rentraient les avions, fermaient les hangars. Malaga qui l’attendait de jour n’avait pas à prévoir de feux. D’ailleurs il n’atterrirait pas. Il continuerait, sans doute très bas, sur Tanger. Il faudrait, aujourd’hui encore, passer le détroit à vingt mètres, sans voir la côte d’Afrique, à la boussole. Un vent d’Ouest, puissant, creusait la mer. Les vagues écrasées devenaient blanches. Chaque navire à l’ancre, la proue au vent, travaillait, de tous ses rivets, comme au large. Le rocher anglais creusait à l’Est une dépression où la pluie tombait à pleins seaux. Les nuages à l’Ouest étaient remontés d’un étage. De l’autre côté de la mer, Tanger fumait sous une pluie si drue qu’elle rinçait la ville. À l’horizon, des provisions de cumulus. Pourtant, vers Larache, le ciel était pur.</p>","<p>Casablanca respirait à ciel ouvert. Des voiliers piqués marquaient le port, comme après la bataille. Il n’y avait plus sur la mer, où la tempête avait labouré, que de longues rides régulières qui se déployaient en éventail. Les champs semblaient d’un vert plus vif, profonds comme de l’eau, au soleil couchant. Par-ci, par-là, aux places encore trempées luisait la ville. Dans la baraque du groupe électrogène, les électriciens, oisifs, attendaient. Ceux d’Agadir dînaient en ville, ayant quatre heures devant eux. Ceux de Port-Étienne, Saint-Louis, Dakar, pouvaient dormir.</p>\\n<p>À huit heures du soir, la T.S.F. de Malaga communiqua :</p>\\n<p>« Courrier passé sans atterrir. »</p>\\n<p>Et Casablanca essaya ses feux. La rampe de balisage découpa en rouge un morceau de nuit, un rectangle noir. Çà et là une lampe manquait, comme une dent. Puis un second interrupteur brancha les phares. Ils versèrent la lumière au milieu du champ comme une flaque de lait. Il manquait l’acteur de music-hall.</p>\\n<p>On déplaça un réflecteur. Le faisceau invisible accrocha un arbre mouillé. Il miroita à peine, comme du cristal. Puis une baraque blanche qui prit une importance énorme, dont les ombres tournèrent, puis qui fut détruite. Enfin le halo redescendit, trouva sa place, refit pour l’avion cette litière blanche.</p>\\n<p>« Bon – fit le chef – coupez. »</p>","<p>Il remonta vers le bureau, compulsa les derniers papiers et considéra le téléphone, l’âme vacante. Rabat appellerait bientôt. Tout était prêt. Les mécaniciens s’asseyaient sur des bidons et sur des caisses.</p>\\n<p>Agadir n’y comprenait rien. Le courrier, selon ses calculs, avait déjà quitté Casablanca. On le guettait à tout hasard. L’étoile du berger fut prise dix fois pour le feu de bord de l’appareil, l’étoile polaire aussi, qui justement venait du Nord. On attendait, pour déclencher les projecteurs, de compter une étoile de trop, de la voir errer sans trouver de place parmi les constellations.</p>\\n<p>Le chef d’aéroplace était perplexe. Donnerait-il à son tour le départ ? Il craignait de la brume au Sud peut-être bien jusqu’à l’oued Noun, peut-être même jusqu’à Juby et Juby demeurait muet malgré les appels de la T.S.F. On ne pouvait lancer le « France-Amérique » la nuit, dans du coton ! Et ce poste du Sahara gardait son mystère pour lui.</p>\\n<p>À Juby pourtant, isolés du monde, nous lancions des signaux de détresse comme un navire :</p>\\n<p>« Communiquez nouvelles courrier, communiquez… »</p>\\n<p>Nous ne répondions plus à Cisneros qui nous agaçait des mêmes questions. Ainsi à mille kilomètres les uns des autres nous jetions dans la nuit des plaintes vaines.</p>\\n<p>À vingt heures cinquante tout se détendit. Casablanca et Agadir purent se toucher par téléphone. Quant à nos radios enfin ils s’accrochèrent. Casablanca parlait et chacun de ses mots se répétait jusqu’à Dakar :</p>\\n<p>« Courrier partira à vingt-deux heures pour Agadir. »</p>","<p>« D’Agadir pour Juby : Courrier sera Agadir minuit trente stop. Pourrons-nous faire continuer sur vous ? »</p>\\n<p>« De Juby pour Agadir : Brume. Attendre jour. »</p>\\n<p>« De Juby pour Cisneros, Port-Étienne, Dakar : Courrier couchera Agadir. »</p>\\n<p>Le pilote signait les feuilles de route à Casablanca et clignait de l’œil sous la lampe. Tout à l’heure, chaque coup d’œil ne faisait qu’un faible butin. Parfois Bernis devait s’estimer heureux d’avoir pour le guider la ruine blanche des vagues, à la lisière de la terre et de l’eau. Maintenant, dans ce bureau, sa vue était nourrie de casiers, de papier blanc, de meubles épais. C’était un monde compact et généreux de sa matière. Dans l’embrasure de la porte un monde vidé par la nuit.</p>\\n<p>Il était rouge à cause du vent qui lui avait, dix heures, massé les joues. Des gouttes d’eau coulaient de ses cheveux. Il sortait de la nuit comme un égoutier de sa caverne avec ses bottes lourdes, son cuir et ses cheveux collés au front, s’obstinait à cligner de l’œil. Il s’interrompit :</p>\\n<p>– Et… vous avez l’intention de me faire continuer ?</p>\\n<p>Le chef d’aéroplace brassait les feuilles d’un air bourru.</p>\\n<p>– Vous ferez ce qu’on vous dira.</p>\\n<p>Il savait déjà qu’il n’exigerait pas ce départ et le pilote savait de son côté qu’il demanderait à partir. Mais chacun voulait se prouver qu’il était seul juge.</p>\\n<p>– Enfermez-moi les yeux bandés dans un placard avec une manette des gaz et demandez-moi d’emmener le meuble à Agadir : voilà ce que vous me faites faire.</p>","<p>Il avait bien trop de vie intérieure pour penser une seconde à un accident personnel : ces idées-là viennent aux cœurs vacants, mais cette image de placard le ravissait. Il y a des choses impossibles… mais qu’il réussirait quand même.</p>\\n<p>Le chef d’aéroplace entrouvrit la porte pour jeter dans la nuit sa cigarette.</p>\\n<p>– Tenez ! On en voit…</p>\\n<p>– Quoi ?</p>\\n<p>– Des étoiles.</p>\\n<p>Le pilote en fut irrité :</p>\\n<p>– Je me moque de vos étoiles : on en voit trois. Ce n’est pas dans Mars que vous m’envoyez, c’est à Agadir.</p>\\n<p>– La lune se lève dans une heure.</p>\\n<p>– La lune… la lune…</p>\\n<p>Cette lune le vexait plus encore : avait-il attendu la lune pour voler de nuit ? Était-il encore un élève ?</p>\\n<p>– Bon. C’est entendu. Eh bien ! restez.</p>\\n<p>Le pilote se calma, déplia des sandwiches qui dataient de la veille au soir et mastiqua paisiblement. Il partirait dans vingt minutes. Le chef d’aéroplace souriait. Il tapotait le téléphone, sachant qu’avant longtemps il signalerait ce décollage.</p>","<p>Maintenant que tout était prêt, il y eut un trou. Ainsi parfois le temps s’arrête. Le pilote s’immobilisa penché en avant sur sa chaise, les mains noires de graisse entre les genoux. Ses yeux fixaient un point entre le mur et lui. Le chef d’aéroplace assis de biais, la bouche entrouverte, paraissait attendre un signal secret. La dactylo bâilla, s’accouda le menton au poing et sentit naître le sommeil en elle comme un volume. Un sablier sans doute coulait. Puis un cri lointain fut le coup de pouce qui remit en marche le mécanisme. Le chef d’aéroplace leva un doigt. Le pilote sourit, se redressa, emplit d’un air neuf sa poitrine.</p>\\n<p>« Ah ! Adieu. »</p>\\n<p>Ainsi parfois, un film rompt. L’immobilité saisit, chaque seconde plus grave comme une syncope, puis la vie repart.</p>\\n<p>Et d’abord il eut l’impression non de décoller mais de s’enfermer dans une grotte humide et froide, battue du grondement de son moteur comme de la mer. Puis d’être épaulé par peu de chose. De jour, la croupe ronde d’une colline, la ligne d’un golfe, le ciel bleu bâtissent un monde qui vous contient, mais il se trouvait en dehors de tout, dans un monde en formation, où les éléments sont encore mêlés. La plaine se tirait, emportant les dernières villes, Mazagan, Safi, Mogador, qui l’éclairaient par en dessous comme des verrières. Puis les dernières fermes luirent, les derniers feux de bord de la terre. Soudain il fut aveugle.</p>\\n<p>« Bon ! voilà que je rentre dans la mouscaille. »</p>","<p>Attentif à l’indicateur de pente, à l’altimètre, il se laissa descendre pour se dégager du nuage. La faible rougeur d’une ampoule l’éblouissait : il l’éteignit.</p>\\n<p>« Bon, j’en suis sorti, mais je n’y vois rien. »</p>\\n<p>Les premiers sommets du petit Atlas passaient invisibles, silencieux, entre deux eaux, comme des icebergs à la dérive : il les devinait contre son épaule.</p>\\n<p>« Bon, ça va mal. »</p>\\n<p>Il se retourna. Un mécanicien, seul passager, une lampe de poche sur les genoux, lisait un livre. La tête penchée émergeait seule de la carlingue avec des ombres renversées. Elle lui parut étrange, éclairée par en dedans à la manière d’une lanterne. Il cria « Hep ! » mais sa voix se perdit. Il frappa du poing sur les tôles : l’homme, émergeant de sa lumière, lisait toujours. Quand il tourna la page, son visage parut dévasté. « Hep ! » lança encore Bernis : à deux longueurs de bras cet homme était inaccessible. Renonçant à communiquer il se retourna vers l’avant.</p>\\n<p>« Je dois approcher du cap Guir, mais je veux bien que l’on me pende… ça va très mal. »</p>\\n<p>Il réfléchit :</p>\\n<p>« Je dois être un peu trop en mer. »</p>\\n<p>Il corrigea sa route à la boussole. Il se sentait bizarrement rejeté au large, vers la droite, comme une jument ombrageuse, comme si réellement les montagnes, à sa gauche, pesaient contre lui.</p>\\n<p>« Il doit pleuvoir. »</p>\\n<p>Il étendit sa main qui fut criblée.</p>\\n<p>« Je rejoindrai la côte dans vingt minutes, ce sera la plaine, je risquerai moins… »</p>","<p>Mais tout à coup, quelle éclaircie ! Le ciel balayé de ses nuages, toutes les étoiles lavées, neuves. La lune… la lune, ô la meilleure des lampes ! Le terrain d’Agadir s’éclaira en trois fois comme une affiche lumineuse.</p>\\n<p>« Je me fous bien de sa lumière ! j’ai la lune… ! »</p>","<h2>II</h2>\\n<p>Le jour à Cap Juby soulevait le rideau et la scène m’apparaissait vide. Un décor sans ombre, sans second plan. Cette dune toujours à sa place, ce fort espagnol, ce désert. Il manquait ce faible mouvement qui fait, même par temps calme, la richesse des prairies et de la mer. Les nomades aux lentes caravanes voyaient changer le grain du sable et dans un décor vierge, le soir, dressaient leur tente. J’aurais pu ressentir cette immensité du désert au plus faible déplacement, mais ce paysage immuable bornait la pensée comme une chromo.</p>\\n<p>À ce puits répondait un puits trois cents kilomètres plus loin. Le même puits, le même sable en apparence et les plis du sol disposés de même. Mais, là-bas, c’était le tissu des choses qui était neuf. Renouvelé, comme de seconde en seconde, la même écume sur la mer. C’est au second puits que j’aurais senti ma solitude, c’est au puits suivant que la dissidence eût été vraiment mystérieuse.</p>\\n<p>Le jour s’écoulait nu et non meublé d’événements. C’était le mouvement solaire des astronomes. C’était, pour quelques heures, le ventre de la terre au soleil. Ici les mots perdaient peu à peu la caution que leur assurait notre humanité. Ils n’enfermaient plus que du sable. Les mots les plus lourds comme « tendresse », « amour » ne posaient dans nos cœurs aucun lest.</p>\\n<p>« Parti à cinq heures d’Agadir, tu devrais avoir atterri. »</p>\\n<p>– Parti à cinq heures d’Agadir, il devrait avoir atterri.</p>\\n<p>– Oui mon vieux, oui… mais c’est du vent Sud-Est.</p>","<p>Le ciel est jaune. Le vent dans quelques heures bousculera un désert modelé, pendant des mois, par le vent Nord. Jours de désordre : les dunes, prises de biais, filent leur sable en longues mèches, et chacune se débobine pour se refaire un peu plus loin.</p>\\n<p>On écoute. Non. C’est la mer.</p>\\n<p>Un courrier en route, ce n’est rien. Entre Agadir et Cap Juby, sur cette dissidence inexplorée c’est un camarade qui n’est nulle part. Tout à l’heure, dans notre ciel, un signe immobile semblera naître.</p>\\n<p>« Parti à cinq heures d’Agadir… »</p>\\n<p>On pense vaguement au drame. Un courrier en panne, ce n’est rien qu’une attente qui se prolonge, une discussion qui s’énerve un peu, qui dégénère. Puis le temps qui devient trop large et que l’on remplit mal par de petits gestes, des mots sans suite…</p>\\n<p>Et soudain, c’est un coup de poing sur la table. Un « Bon Dieu ! Dix heures… » qui dresse des hommes, c’est un camarade chez les Maures.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>L’opérateur de T.S.F. communique avec Las Palmas. Le Diesel souffle bruyamment. L’alternateur ronfle comme une turbine. Lui, fixe des yeux l’ampèremètre où chaque décharge s’accuse.</p>\\n<p>J’attends debout. L’homme de biais me tend sa main gauche et de la main droite manipule toujours. Puis il me crie :</p>\\n<p>« Quoi ? »</p>\\n<p>Je n’ai rien dit. Vingt secondes se passent. Il crie encore, je n’entends pas, je fais « Ah oui ? » Autour de moi tout luit, des volets entrouverts filtrent un rai de soleil. Les bielles du Diesel font des éclairs humides, barattent ce jet de lumière.</p>","<p>L’opérateur se tourne enfin d’un bloc vers moi, quitte son casque. Le moteur éternue et stoppe. J’entends les derniers mots : surpris par le silence, il me les crie comme si j’étais à cent mètres :</p>\\n<p>– … S’en foutent complètement !</p>\\n<p>– Qui ?</p>\\n<p>– Eux.</p>\\n<p>– Ah ! oui ? Pouvez-vous avoir Agadir ?</p>\\n<p>– Ce n’est pas l’heure de la reprise.</p>\\n<p>– Essayez quand même.</p>\\n<p>Je griffonne sur un bloc-notes :</p>\\n<p>« Courrier non arrivé. Est-ce faux départ ? stop. Confirmez heure décollage. »</p>\\n<p>– Passez-leur ça.</p>\\n<p>– Bien. Je vais appeler.</p>\\n<p>Et le tumulte recommence.</p>\\n<p>– Alors ?</p>\\n<p>– … tendez.</p>\\n<p>Je suis distrait, je rêve : il a voulu dire : attendez. Qui pilote le courrier ? Est-ce bien toi, Jacques Bernis, qui est ainsi hors de l’espace, hors du temps ?</p>\\n<p>L’opérateur fait taire le groupe, branche un connecteur, revêt son casque. Il tapote la table de son crayon, regarde l’heure et aussitôt bâille.</p>\\n<p>– En panne, pourquoi ?</p>\\n<p>– Comment voulez-vous que je le sache !</p>\\n<p>– C’est vrai. Ah… rien. Agadir n’a pas entendu.</p>\\n<p>– Vous recommencez ?</p>\\n<p>– Je recommence.</p>\\n<p>Le moteur s’ébranle.</p>\\n<p>Agadir est toujours muet. Nous guettons maintenant sa voix. S’il cause avec un autre poste, nous nous mêlerons au discours.</p>\\n<p>Je m’assieds. Par désœuvrement, je m’empare d’un écouteur et tombe dans une volière pleine d’un tumulte d’oiseaux.</p>\\n<p>Longues, brèves, trilles trop rapides, je déchiffre mal ce langage, mais combien de voix révélées dans un ciel que je croyais désert.</p>\\n<p>Trois postes parlaient. L’un se tait, un autre entre en danse.</p>\\n<p>– Ça ? Bordeaux sur l’automatique.</p>","<p>Roulade aiguë, pressée, lointaine. Une voix plus grave, plus lente :</p>\\n<p>– Et ça ?</p>\\n<p>– Dakar.</p>\\n<p>Un timbre désolé. La voix se tait, reprend, se tait encore et recommence.</p>\\n<p>… Barcelone qui appelle Londres et Londres qui ne répond pas.</p>\\n<p>Sainte-Assise, quelque part, très loin, conte en sourdine quelque chose.</p>\\n<p>Quel rendez-vous au Sahara ! Toute l’Europe rassemblée, capitales aux voix d’oiseaux qui échangent des confidences.</p>\\n<p>Un roulement proche vient de retentir. L’interrupteur plonge les voix dans le silence.</p>\\n<p>– C’était Agadir ?</p>\\n<p>– Agadir.</p>\\n<p>L’opérateur, les yeux toujours fixés, j’ignore pourquoi, sur la pendule, lance des appels.</p>\\n<p>– Il a entendu ?</p>\\n<p>– Non. Mais il parle à Casablanca, on va savoir.</p>\\n<p>Nous captons en fraude des secrets d’ange. Le crayon hésite, s’abat, cloue une lettre, puis deux, puis dix avec rapidité. Des mots se forment, semblent éclore.</p>\\n<p>« Note pour Casablanca… »</p>\\n<p>Salaud ! Ténériffe nous brouille Agadir ! Sa voix énorme remplit les écouteurs. Elle s’interrompt net.</p>\\n<p>« … terri six heures trente. Reparti à… »</p>\\n<p>Ténériffe l’intrus nous bouscule encore.</p>\\n<p>Mais j’en sais assez long. À six heures trente le courrier est retourné sur Agadir. – Et n’a dû repartir qu’à sept heures… Pas en retard.</p>\\n<p>– Merci !</p>","<h2>III</h2>\\n<p>Jacques Bernis, cette fois-ci, avant ton arrivée, je dévoilerai qui tu es. Toi que, depuis hier, les radios situent exactement, qui vas passer ici les vingt minutes réglementaires, pour qui je vais ouvrir une boîte de conserves, déboucher une bouteille de vin, qui ne nous parleras ni de l’amour ni de la mort, d’aucun des vrais problèmes, mais de la direction du vent, de l’état du ciel, de ton moteur. Toi qui vas rire du bon mot d’un mécanicien, gémir sur la chaleur, ressembler à n’importe lequel d’entre nous…</p>\\n<p>Je dirai quel voyage tu accomplis. Comment tu soulèves les apparences, pourquoi les pas que tu fais à côté des nôtres ne sont pas les mêmes.</p>\\n<p>Nous sommes sortis de la même enfance, et voici que se dresse dans mon souvenir, brusquement, ce vieux mur croulant et chargé de lierre. Nous étions des enfants hardis : « Pourquoi as-tu peur ? Pousse la porte… »</p>","<p>Un vieux mur croulant et chargé de lierre. Séché, pénétré, pétri de soleil, pétri d’évidence. Des lézards bruissaient entre les feuilles, que nous appelions des serpents, aimant déjà jusqu’à l’image de cette fuite qui est la mort. Chaque pierre de ce côté-ci était chaude, couvée comme un œuf, ronde comme un œuf. Chaque parcelle de terre, chaque brindille était dégagée par ce soleil de tout mystère. De ce côté du mur, régnait, dans sa richesse, dans sa plénitude, l’été à la campagne. Nous apercevions un clocher. Nous entendions une batteuse. Le bleu du ciel comblait tous les vides. Les paysans fauchaient les blés, le curé sulfatait sa vigne, des parents, au salon, jouaient au bridge. Nous nommions ceux qui usaient soixante années de ce coin de terre, qui, de la naissance à la mort, prenaient ce soleil en consigne, ces blés, cette demeure, nous nommions ces générations présentes « l’équipe de garde ». Car nous aimions nous découvrir sur l’îlot le plus menacé, entre deux océans redoutables, entre le passé et l’avenir.</p>\\n<p>« Tourne la clef… »</p>\\n<p>Il était interdit aux enfants de pousser cette petite porte verte, d’un vert usé de vieille barque, de toucher cette serrure énorme, sortie rouillée du temps, comme une vieille ancre de la mer.</p>","<p>Sans doute craignait-on pour nous cette citerne à ciel ouvert, l’horreur d’un enfant noyé dans la mare. Derrière la porte dormait une eau que nous disions immobile depuis mille ans, à laquelle nous pensions chaque fois que nous entendions parler d’eau morte. De minuscules feuilles rondes la revêtaient d’un tissu vert : nous lancions des pierres qui faisaient des trous.</p>\\n<p>Quelle fraîcheur sous des branchages si vieux, si lourds, qui portaient le poids du soleil. Jamais un rayon n’avait jauni la pelouse tendre du remblai ni touché l’étoffe précieuse. Le caillou que nous avions lancé commençait son cours, comme un astre, car, pour nous, cette eau n’avait pas de fond.</p>\\n<p>« Asseyons-nous… » Aucun bruit ne nous parvenait. Nous goûtions la fraîcheur, l’odeur, l’humidité qui renouvelaient notre chair. Nous étions perdus aux confins du monde car nous savions déjà que voyager c’est avant tout changer de chair.</p>\\n<p>« Ici c’est l’envers des choses… »</p>\\n<p>L’envers de cet été si sûr de lui, de cette campagne, de ces visages qui nous retenaient prisonniers. Et nous haïssions ce monde imposé. À l’heure du dîner, nous remontions vers la maison, lourds de secrets, comme ces plongeurs des Indes qui touchèrent des perles. À la minute où le soleil chavire, où la nappe est rose, nous entendions prononcer les mots qui nous faisaient mal :</p>\\n<p>« Les jours allongent… »</p>","<p>Nous nous sentions repris par cette vieille ritournelle, par cette vie faite de saisons, de vacances, de mariages, et de morts. Tout ce tumulte vain de la surface.</p>","<p>Fuir, voilà l’important. À dix ans, nous trouvions refuge dans la charpente du grenier. Des oiseaux morts, de vieilles malles éventrées, des vêtements extraordinaires : un peu les coulisses de la vie. Et ce trésor que nous disions caché, ce trésor des vieilles demeures, exactement décrit dans les contes de fées : saphirs, opales, diamants. Ce trésor qui luisait faiblement. Qui était la raison d’être de chaque mur, de chaque poutre. Ces poutres énormes qui défendaient contre Dieu sait quoi la maison. Si. Contre le temps. Car c’était chez nous le grand ennemi. On s’en protégeait par les traditions. Le culte du passé. Les poutres énormes. Mais nous seuls savions cette maison lancée comme un navire. Nous seuls qui visitions les soutes, la cale, savions par où elle faisait eau. Nous connaissions les trous de la toiture où se glissaient les oiseaux pour mourir. Nous connaissions chaque lézarde de la charpente. En bas, dans les salons, les invités causaient, de jolies femmes dansaient. Quelle sécurité trompeuse ! On servait sans doute des liqueurs. Valets noirs, gants blancs. O passagers ! Et nous, là-haut, regardions filtrer la nuit bleue par les failles de la toiture. Ce trou minuscule : juste une seule étoile tombait sur nous. Décantée pour nous d’un ciel entier. Et c’était l’étoile qui rend malade. Là nous nous détournions : c’était celle qui fait mourir.</p>","<p>Nous sursautions. Travail obscur des choses. Poutres éclatées par le trésor. À chaque craquement nous sondions le bois. Tout n’était qu’une cosse prête à livrer son grain. Vieille écorce des choses sous laquelle se trouvait, nous n’en doutions pas, autre chose. Ne serait-ce que cette étoile, ce petit diamant dur. Un jour nous marcherons vers le Nord ou le Sud, ou bien en nous-même, à sa recherche. Fuir.</p>\\n<p>L’étoile qui fait dormir tournait l’ardoise qui la masquait, nette comme un signe. Et nous descendions vers notre chambre, emportant pour le grand voyage du demi-sommeil cette connaissance d’un monde où la pierre mystérieuse coule sans fin parmi les eaux comme dans l’espace ces tentacules de lumière qui plongent mille ans pour nous parvenir ; où la maison qui craque au vent est menacée comme un navire, où les choses, une à une, éclatent, sous l’obscure poussée du trésor.</p>\\n<p>– Assieds-toi là. Je t’ai cru en panne. Bois. Je t’ai cru en panne et j’allais partir à ta recherche. L’avion est déjà en piste : regarde. Les Aït-Toussa ont attaqué les Izarguïn. Je te croyais tombé dans ce grabuge, j’ai eu peur. Bois. Que veux-tu manger ?</p>\\n<p>– Laisse-moi partir.</p>\\n<p>– Tu as cinq minutes. Regarde-moi. Que s’est-il passé avec Geneviève ? Pourquoi souris-tu ?</p>\\n<p>– Ah ! rien. Tout à l’heure, dans la carlingue, je me suis souvenu d’une vieille chanson. Je me suis senti tout à coup si jeune…</p>\\n<p>– Et Geneviève ?</p>\\n<p>– Je ne sais plus. Laisse-moi partir.</p>\\n<p>– Jacques… réponds-moi… L’as-tu revue ?</p>","<p>– Oui… – Il hésitait. – En redescendant sur Toulouse, j’ai fait ce détour pour la voir encore…</p>\\n<p>Et Jacques Bernis me raconta son aventure.</p>","<h2>IV</h2>\\n<p>Ce n’était pas une petite gare de province, mais une porte dérobée. Elle donnait en apparence sur la campagne. Sous l’œil d’un contrôleur paisible on gagnait une route blanche sans mystère, un ruisseau, des églantines. Le chef de gare soignait des roses, l’homme d’équipe feignait de pousser un chariot vide. Sous ces déguisements veillaient trois gardiens d’un monde secret.</p>\\n<p>Le contrôleur tapotait le billet :</p>\\n<p>– Vous allez de Paris à Toulouse, pourquoi descendez-vous ici ?</p>\\n<p>– Je continuerai par le train suivant.</p>\\n<p>Le contrôleur le dévisageait. Il hésitait à lui livrer non une route, un ruisseau, des églantines, mais ce royaume que depuis Merlin on sait pénétrer sous les apparences. Il dut lire enfin en Bernis les trois vertus requises depuis Orphée pour ces voyages : le courage, la jeunesse, l’amour…</p>\\n<p>« Passez », dit-il.</p>\\n<p>Les rapides brûlaient cette gare qui n’était là qu’en trompe-l’œil comme ces petits bars occultes ornés de faux garçons, de faux musiciens, d’un faux barman. Déjà dans l’omnibus Bernis avait senti sa vie se ralentir, changer de sens. Maintenant sur cette carriole, près de ce paysan, il s’éloignait de nous plus encore. Il s’enfonçait dans le mystère. L’homme, dès trente ans, portait toutes ses rides pour ne plus vieillir. Il désignait un champ :</p>\\n<p>« Ça pousse vite ! »</p>\\n<p>Quelle hâte invisible pour nous, cette course des blés vers le soleil !</p>\\n<p>Bernis nous découvrit plus lointains encore, plus agités, plus misérables, quand le paysan désignant un mur :</p>","<p>– C’est le grand-père de mon grand-père qui l’a bâti.</p>\\n<p>Il touchait déjà un mur éternel, un arbre éternel : il devina qu’il arrivait.</p>\\n<p>– Voilà le domaine. Faut-il vous attendre ?</p>\\n<p>Royaume de légende endormi sous les eaux, c’est là que Bernis passera cent ans en ne vieillissant que d’une heure.</p>\\n<p>Ce soir même, la carriole, l’omnibus, le rapide lui permettront cette fuite en chicane qui nous ramène vers le monde depuis Orphée, depuis la belle au bois dormant. Il paraîtra un voyageur semblable aux autres, en route vers Toulouse, appuyant sa joue blanche aux vitres. Mais il portera dans le fond du cœur un souvenir qui ne peut pas se raconter, « couleur de lune », « couleur du temps ».</p>\\n<p>Visite étrange : nul éclat de voix, nulle surprise. La route rendait un son mat. Il sauta la haie comme jadis : l’herbe montait dans les allées… ah ! c’est la seule différence. La maison lui apparut blanche entre les arbres mais comme en rêve, à une distance infranchissable. Au moment d’atteindre le but, est-ce un mirage ? Il gravit le perron de larges pierres. Il était né de la nécessité avec une aisance sûre de lignes.</p>","<p>« Rien ici n’est truqué… » Le vestibule était obscur : un chapeau blanc sur une chaise : le sien ? Quel désordre aimable : on un désordre d’abandon, mais le désordre intelligent qui marque une présence. Il garde encore l’empreinte du mouvement. Une chaise à peine reculée d’où l’on s’était levé la main appuyée à la table : il vit le geste. Un livre ouvert : qui vient de le quitter ? Pourquoi ? La dernière phrase chantait peut-être encore dans une conscience.</p>\\n<p>Bernis sourit, pensant aux mille petits travaux, aux mille petits tracas de la maison. On y marchait le long du jour en parant aux mêmes besoins, en rangeant le même désordre. Les drames y étaient de si peu d’importance : il suffisait d’être un voyageur, un étranger pour en sourire…</p>\\n<p>« Tout de même, pensait-il, le soir tombait ici comme ailleurs une année entière, c’était un cycle révolu. Le lendemain… c’était recommencer la vie. On marchait vers le soir. On n’avait plus, alors, aucun souci : les persiennes étaient closes, les livres rangés et les garde-feux bien en place. Ce repos gagné eût pu être éternel, il en avait le goût. Mes nuits, elles, sont moins que des trêves… »</p>\\n<p>Il s’assit sans faire de bruit. Il n’osait pas se révéler : tout semblait si calme, si égal. D’un store soigneusement baissé, un rayon de soleil filtra. « Une déchirure, pensa Bernis, ici l’on vieillit sans savoir… »</p>","<p>« Que vais-je apprendre ?… » Un pas dans la pièce voisine enchanta la maison. Un pas tranquille. Un pas de nonne qui range les fleurs de l’Autel. « Quelle besogne minuscule achève-t-on ? Ma vie est serrée comme un drame. Ici que d’espace, que d’air, entre chacun des mouvements, entre chacune des pensées… » Par la fenêtre il se pencha vers la campagne. Elle était tendue sous le soleil, avec des lieues de route blanche à parcourir pour aller prier, pour aller chasser, pour aller porter une lettre. Une batteuse au loin ronflait : on faisait un effort pour l’entendre : la voix trop faible d’un acteur oppresse la salle.</p>\\n<p>Le pas de nouveau résonna : « On range les bibelots, ils ont encombré les vitrines peu à peu. Chaque siècle en se retirant laisse derrière lui ces coquillages… »</p>\\n<p>On parlait, Bernis écouta :</p>\\n<p>– Crois-tu qu’elle passe la semaine ? Le médecin…</p>\\n<p>Les pas s’éloignèrent. Stupéfait, il se tut. Qui allait mourir ? Son cœur se serra. Il appela à l’aide toute preuve de vie, le chapeau blanc, le livre ouvert…</p>\\n<p>Les voix reprirent. C’étaient des voix pleines d’amour mais si calmes. On savait la mort installée sous le toit, on l’y accueillait en intime sans en détourner le visage. Il n’y avait rien de déclamatoire : « Comme tout est simple, pensa Bernis, vivre, ranger les bibelots, mourir… »</p>\\n<p>– Tu as cueilli des fleurs pour le salon ?</p>\\n<p>– Oui.</p>","<p>On parlait bas, sur un ton voilé mais égal. On parlait de mille petites choses et la mort prochaine les teignait simplement de grisaille. Un rire jaillit qui mourut de lui-même. Un rire sans racine profonde, mais que ne réprimait pas une dignité théâtrale.</p>\\n<p>– Ne monte pas, dit la voix, elle dort.</p>\\n<p>Bernis était assis au cœur même de la douleur dans une intimité dérobée. Il eut peur d’être découvert. L’étranger fait naître, du besoin de tout exprimer, une douleur moins humble. On lui crie : « Vous qui l’avez connue, aimée… » Il dresse la mourante dans toute sa grâce et c’est intolérable.</p>\\n<p>Il avait droit pourtant à cette intimité « …car je l’aimais ».</p>\\n<p>Il eut besoin de la revoir, monta en fraude l’escalier, ouvrit la porte de la chambre. Elle contenait tout l’été. Les murs étaient clairs et le lit blanc. La fenêtre ouverte s’emplissait de jour. L’horloge d’un clocher lointain, paisible, lente, donna la cadence juste du cœur, du cœur sans fièvre qu’il faut avoir. Elle dormait. Quel sommeil glorieux au centre de l’été !</p>\\n<p>« Elle va mourir… » Il s’avança sur le parquet ciré, plein de lumière. Il ne comprenait pas sa propre paix. Mais elle gémit : Bernis n’osa pénétrer plus avant.</p>\\n<p>Il devinait une présence immense : l’âme des malades s’étale, remplit la chambre et la chambre est comme une plaie. On n’ose heurter un meuble, marcher.</p>","<p>Pas un bruit. Des mouches seules grésillaient. Un appel lointain posa un problème. Une bouffée de vent frais roula, molle, dans la chambre. « Le soir déjà », pensa Bernis. Il songeait aux volets que l’on allait tirer, à la lumière de la lampe. C’était bientôt la nuit qui obséderait la malade ainsi qu’une étape à franchir. La lampe en veilleuse fascine alors comme un mirage, et les choses dont les ombres ne tournent pas et que l’on regarde douze heures sous le même angle finissent par s’imprimer dans le cerveau, peser d’un poids insupportable.</p>\\n<p>« Qui est là ? » dit-elle.</p>\\n<p>Bernis s’approcha. La tendresse, la pitié montèrent vers ses lèvres. Il s’inclina. La secourir. La prendre dans les bras. Être sa force.</p>\\n<p>« Jacques… » Elle le fixait. « Jacques… » Elle le halait du fond de sa pensée. Elle ne cherchait pas son épaule mais fouillait dans ses souvenirs. Elle s’accrochait à sa manche comme un naufragé qui se hisse, non pour se saisir d’une présence, d’un appui, mais d’une image… Elle regarde…</p>\\n<p>Et voici que peu à peu il lui semble étranger. Elle ne reconnaît pas cette ride, ce regard. Elle lui serre les doigts pour l’appeler : il ne peut lui être d’aucun secours. Il n’est pas d’ami qu’elle porte en elle. Déjà lasse de cette présence, elle le repousse, détourne la tête.</p>\\n<p>Il est à une distance infranchissable.</p>","<p>Il s’évada sans bruit, traversa de nouveau le vestibule. Il revenait d’un voyage immense, d’un voyage confus, dont on se souvient mal. Est-ce qu’il souffrait ? Est-ce qu’il était triste ? Il s’arrêta. Le soir s’insinuait comme la mer dans une cale qui fait eau, les bibelots allaient s’éteindre. Le front contre la vitre, il vit les ombres des tilleuls s’allonger, se joindre, remplir le gazon de nuit. Un village lointain s’éclaira : à peine une poignée de lumières : elle aurait tenu dans ses mains. Il n’y avait plus de distance : il eût pu toucher du doigt la colline. Les voix de la maison se turent : on avait achevé de la mettre en ordre. Il ne bougeait pas. Il se souvenait de soirs pareils. On se levait pesant comme un scaphandrier. Le visage lisse de la femme se fermait et tout à coup on avait peur de l’avenir, de la mort.</p>\\n<p>Il sortit. Il se retourna avec le désir aigu d’être surpris, d’être appelé : son cœur aurait fondu de tristesse et de joie. Mais rien. Rien ne le retenait. Il glissait sans résistance entre les arbres. Il sauta la haie : la route était dure. C’était fini, il ne reviendrait plus jamais.</p>","<h2>V</h2>\\n<p>Et Bernis, avant de partir, me résumait toute l’aventure :</p>\\n<p>« J’ai essayé, vois-tu, d’entraîner Geneviève dans un monde à moi. Tout ce que je lui montrais devenait terne, gris. La première nuit était d’une épaisseur sans nom : nous n’avons pas pu la franchir. J’ai dû lui rendre sa maison, sa vie, son âme. Un à un tous les peupliers de la route. À mesure que nous remontions Paris, diminuait entre le monde et nous une épaisseur. Comme si j’avais voulu l’entraîner sous la mer. Quand, plus tard, j’ai cherché encore à la joindre, j’ai pu l’approcher, la toucher : il n’y avait pas d’espace entre nous. Il y avait plus. Je ne sais te dire quoi : mille années. On est si loin d’une autre vie. Elle était cramponnée à ses draps blancs, à son été, à ses évidences, et je n’ai pas pu l’emporter. Laisse-moi partir. »</p>\\n<p>Où vas-tu maintenant chercher le trésor, plongeur des Indes qui touche les perles, mais ne sait pas les ramener au jour ? Ce désert sur lequel je marche, moi qui suis retenu, comme un plomb, au sol, je n’y saurais rien découvrir. Mais il n’est pour toi, magicien, qu’une voile de sable, qu’une apparence…</p>\\n<p>– Jacques, c’est l’heure.</p>","<h2>VI</h2>\\n<p>Maintenant, engourdi, il rêve. Le sol de si haut paraît immobile. Le Sahara de sable jaune mord sur une mer bleue comme un trottoir interminable. Bernis bon ouvrier ramène cette côte qui dérive à droite, glisse en travers, dans l’alignement du moteur. À chaque virage de l’Afrique, il incline doucement l’avion. Encore deux mille kilomètres avant Dakar.</p>\\n<p>Devant lui, l’éclatante blancheur de ce territoire insoumis. Parfois le roc est nu. Le vent a balayé le sable, çà et là, en dunes régulières. L’air immobile a pris l’avion comme une gangue. Nul tangage, nul roulis et, de si haut, nul déplacement du paysage. Serré dans le vent l’avion dure. Port-Étienne, première escale, n’est pas inscrite dans l’espace mais dans le temps, et Bernis regarde sa montre. Six heures encore d’immobilité et de silence, puis on sort de l’avion comme d’une chrysalide. Le monde est neuf.</p>\\n<p>Bernis regarde cette montre par quoi s’opère un tel miracle. Puis le compte-tours immobile. Si cette aiguille lâche son chiffre, si la panne livre l’homme au sable, le temps et les distances prendront un sens nouveau et qu’il ne conçoit même pas. Il voyage dans une quatrième dimension.</p>","<p>Il connaît pourtant cet étouffement. Nous l’avons tous connu. Tant d’images coulaient dans nos yeux : nous sommes prisonniers d’une seule, qui pèse le poids vrai de ses dunes, de son soleil, de son silence. Un monde sur nous s’est échoué. Nous sommes faibles, armés de gestes qui feront tout juste, la nuit venue, fuir des gazelles. Armés de voix qui porteraient pas à trois cents mètres et ne sauraient toucher des hommes. Nous sommes tous tombés un jour dans cette planète inconnue.</p>\\n<p>Le temps y devenait trop large pour le rythme de notre vie. À Casablanca, nous comptions par heures à cause de nos rendez-vous : chacun d’eux nous changeait le cœur. En avion, chaque demi-heure, nous changions de climat : changions de chair. Ici, nous comptons par semaines.</p>\\n<p>Les camarades nous ont tirés de là. Et, si nous étions faibles, nous ont hissés dans la carlingue : poignet de fer des camarades qui nous tiraient hors de ce monde dans leur monde.</p>\\n<p>En équilibre sur tant d’inconnu, Bernis songe qu’il se connaît mal. Qu’appelleraient en lui la soif, l’abandon, ou la cruauté des tribus Maures ? Et l’escale de Port-Étienne rejetée, soudain, à plus d’un mois ? Il pense encore :</p>\\n<p>« Je n’ai besoin d’aucun courage. »</p>\\n<p>Tout reste abstrait. Quand un jeune pilote se hasarde aux loopings, il verse au-dessus de sa tête, si proches soient-ils, non des obstacles durs dont le moindre l’écraserait, mais des arbres, des murs aussi fluides que dans les rêves. Du courage, Bernis ?</p>","<p>Pourtant, contre son cœur, car le moteur a tressailli, cet inconnu qui peut surgir prendra sa place.</p>\\n<p>Ce Cap, ce Golfe ont rejoint enfin après une heure les terres neutres, désarmées, dont l’hélice est venue à bout. Mais chaque point du sol en avant porte sa menace mystérieuse.</p>\\n<p>Mille kilomètres encore : il faut tirer à soi cette nappe immense.</p>\\n<p>« De Port-Étienne pour Cap Juby : courrier bien arrivé 16 h 30. »</p>\\n<p>« De Port-Étienne pour Saint-Louis : courrier reparti 16 h.45. »</p>\\n<p>« De Saint-Louis pour Dakar : courrier quitte Port-Étienne 16 h. 45, ferons continuer de nuit. »</p>\\n<p>Vent d’Est. Il souffle de l’intérieur du Sahara et le sable monte en tourbillons jaunes. De l’horizon s’est détaché à l’aube un soleil élastique et pâle, déformé par la brume chaude. Une bulle de savon pâle. Mais en montant vers le zénith, peu à peu contracté, mis au point, il est devenu cette flèche brûlante, ce poinçon brûlant dans la nuque.</p>\\n<p>Vent d’Est. On décolle de Port-Étienne dans un air calme, presque frais, mais à cent mètres d’altitude on trouve cette coulée de lave. Et tout de suite :</p>\\n<p>Température de l’huile : 120.</p>\\n<p>Température de l’eau : 110.</p>\\n<p>Gagner deux mille, trois mille mètres : évidemment ! Dominer cette tempête de sable : évidemment ! Mais, avant cinq minutes de cabré : auto-allumage et soupapes grillées. Et puis monter : facile à dire. L’avion s’enfonce dans cet air sans ressort, l’avion s’enlise.</p>","<p>Vent d’Est. On est aveugle. Le soleil est roulé dans ces volutes jaunes. Sa face pâle parfois émerge et brûle. La terre n’apparaît qu’à la verticale, et encore ! Je cabre ? je pique ? je penche ? Va-t’en voir ! On plafonne à cent mètres. Tant pis ! cherchons plus bas.</p>\\n<p>Au ras du sol une rivière de vent Nord. Ça va. On laisse pendre un bras hors de la carlingue. Ainsi dans un canot rapide on joue des doigts à flétrir l’eau fraîche.</p>\\n<p>Température de l’huile : 110.</p>\\n<p>Température de l’eau : 95.</p>\\n<p>Frais comme une rivière ? En comparaison. Ça danse un peu, chaque pli du sol décoche sa gifle. C’est embêtant de ne rien voir.</p>\\n<p>Mais au cap Timéris le vent d’Est épouse le sol même. Plus de refuge nulle part. Odeur de caoutchouc brûlé : Magnéto ? Joints ? L’aiguille du compte-tours hésite, cède dix tours. « Alors toi si tu t’en mêles… »</p>\\n<p>Température de l’eau : 115.</p>\\n<p>Impossible de gagner dix mètres. Un coup d’œil sur la dune qui vous arrive comme un tremplin. Un coup d’œil sur les manomètres. Hop ! c’est le remous de la dune. On pilote manche sur le ventre : plus pour longtemps. On porte dans les mains l’avion en équilibre comme un bol trop plein.</p>\\n<p>À dix mètres des roues, la Mauritanie dépêche ses sables, ses salines, ses plages ; torrent du ballast.</p>\\n<p>1.520 tours.</p>\\n<p>Le premier passage à vide frappe le pilote comme un coup de poing. Un poste français à vingt kilomètres : le seul. L’atteindre.</p>\\n<p>Température de l’eau : 120.</p>","<p>Dunes, rochers, salines sont absorbés. Tout passe au laminoir. Et allez donc ! Des contours s’élargissent, s’ouvrent, se ferment. Au ras des roues : débâcle. Ces rochers noirs là-bas, groupés, serrés, qui semblent venir avec lenteur, tout à coup s’emballent. On leur tombe dessus, on les éparpille.</p>\\n<p>1.430 tours.</p>\\n<p>« Si je me casse la gueule… » Une tôle qu’il frôle du doigt le brûle. Le radiateur vaporise par saccades. L’avion, péniche trop chargée, pèse.</p>\\n<p>1.400 tours.</p>\\n<p>Les derniers sables jetés en hâte à vingt centimètres des roues. Pelletées rapides. Pelletées d’or. Une dune sautée démasque le poste. Ah ! Bernis coupe. Il était temps.</p>\\n<p>L’élan du paysage se freine et meurt. Ce monde en poussière se recompose.</p>\\n<p>Un fortin français dans le Sahara. Un vieux sergent reçut Bernis et riait de joie à la vue d’un frère. Vingt Sénégalais présentaient les armes : un blanc, c’est au moins un sergent ; c’est un lieutenant s’il est jeune.</p>\\n<p>– Bonjour, sergent !</p>\\n<p>– Ah ! venez chez moi, je suis si heureux ! Je suis de Tunis…</p>\\n<p>Son enfance, ses souvenirs, son âme : il livrait tout ça, d’un coup, à Bernis.</p>\\n<p>Une petite table, des photographies piquées au mur :</p>\\n<p>– Oui, c’est des photos de parents. Je ne les connais pas encore tous, mais j’irai à Tunis, l’année prochaine. Là ? C’est l’amoureuse de mon copain. Je l’ai toujours vue sur sa table. Il parlait toujours d’elle. Quand il est mort, j’ai pris la photo, j’ai continué, moi je n’avais pas d’amoureuse.</p>\\n<p>– J’ai soif, sergent.</p>","<p>– Ah buvez ! Ça me fait plaisir d’offrir du vin. Je n’en avais plus pour le capitaine. Il est passé voilà cinq mois. Ensuite, bien sûr, pendant longtemps, je me suis fait des idées noires. J’écrivais pour qu’on me relève : j’avais trop honte.</p>\\n<p>– Ce que je fais ? J’écris des lettres toutes les nuits : je ne dors pas, j’ai des bougies. Mais lorsque le courrier m’arrive, tous les six mois, ça ne va plus comme réponse : je recommence.</p>\\n<p>Bernis monte fumer avec le vieux sergent sur la terrasse du fortin. Quel désert vide au clair de lune. Que surveille-t-il de ce poste ? Sans doute les étoiles. Sans doute la lune…</p>\\n<p>– C’est vous le sergent des étoiles ?</p>\\n<p>– Ne me refusez pas, fumez, j’ai du tabac. Je n’en avais plus pour le capitaine.</p>\\n<p>Bernis apprenait tout de ce lieutenant, de ce capitaine. Il eût pu redire leur unique défaut, leur unique vertu : l’un jouait, l’autre était trop bon. Il apprenait aussi que la dernière visite d’un jeune lieutenant à un vieux sergent perdu dans les sables est presque un souvenir d’amour.</p>\\n<p>– Il m’a expliqué les étoiles…</p>\\n<p>– Oui, fit Bernis, il vous les passait en consigne.</p>\\n<p>Et maintenant, il les expliquait à son tour. Et le sergent, apprenant les distances, pensait à Tunis aussi qui est loin. Apprenant l’étoile polaire, il jurait de la reconnaître à son visage, il n’aurait qu’à la maintenir un peu à gauche. Il pensait à Tunis qui est si proche.</p>\\n<p>« Et nous tombons vers celle-ci avec une vitesse vertigineuse… » Et le sergent se retenait à temps au mur.</p>","<p>– Vous savez donc tout !</p>\\n<p>– Non, sergent. J’ai eu un sergent qui me disait même : Vous n’avez pas honte, vous, un fils de famille si instruit, si bien élevé, de faire si mal les demi-tours ?</p>\\n<p>– Eh ! N’ayez pas honte, c’est si difficile…</p>\\n<p>On le consolait.</p>\\n<p>– Sergent, sergent ! Ton falot de ronde…</p>\\n<p>Il montrait la lune.</p>\\n<p>– Connais-tu ça, sergent, cette chanson :</p>\\n<p>Il pleut, il pleut, bergère…</p>\\n<p>Il fredonna l’air.</p>\\n<p>– Ah ! oui, je la connais : c’est une chanson de Tunis…</p>\\n<p>– Dis-moi la suite, sergent. J’ai besoin de m’en souvenir.</p>\\n<p>– Attendez voir :</p>\\n<p align=\\"center\\">Rentre tes blancs moutons</p>\\n<p align=\\"center\\">Là-bas dans la chaumière…</p>\\n<p>– Sergent, sergent, ça me revient :</p>\\n<p align=\\"center\\">Entends sous le feuillage</p>\\n<p align=\\"center\\">L’eau qui coule à grand bruit,</p>\\n<p align=\\"center\\">Déjà voici l’orage…</p>\\n<p>– Ah comme c’est vrai ! fit le sergent.</p>\\n<p>Ils comprenaient les mêmes choses…</p>\\n<p>– Voici le jour, sergent, allons travailler.</p>\\n<p>– Travaillons.</p>\\n<p>– Passe-moi la clef à bougies.</p>\\n<p>– Ah ! Bien sûr.</p>\\n<p>– Appuie ici avec la pince.</p>\\n<p>– Ah ! commandez… je ferai tout.</p>\\n<p>– Tu vois, ce n’était rien, sergent, je vais partir.</p>\\n<p>Le sergent contemple un jeune dieu, venu de nulle part, pour s’envoler.</p>\\n<p>… Venu lui rappeler une chanson, Tunis, lui-même. De quel paradis, au-delà des sables, descendent sans bruit ces beaux messagers ?</p>\\n<p>– Adieu, sergent !</p>\\n<p>– Adieu…</p>\\n<p>Le sergent remuait les lèvres, ne se devinant pas lui-même. Le sergent n’aurait pas su dire qu’il gardait au cœur pour six mois d’amour.</p>","<h2>VII</h2>\\n<p>« De Saint-Louis du Sénégal pour Port-Étienne : Courrier pas arrivé Saint-Louis stop. Urgence nous communiquer nouvelles. »</p>\\n<p>« De Port-Étienne pour Saint-Louis : Ne savons rien depuis départ hier 16 h. 45 stop. Effectuerons immédiatement recherches. »</p>\\n<p>« De Saint-Louis du Sénégal pour Port-Étienne : Avion 632 quitte Saint-Louis 7 h. 25 stop. Suspendez votre départ jusqu’à son arrivée Port-Étienne. »</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>« De Port-Étienne pour Saint-Louis : Avion 632 bien arrivé 13 h. 40 stop. Pilote signale rien vu malgré visibilité suffisante stop. Pilote estime aurait trouvé si courrier sur trajet normal stop. Troisième pilote nécessaire pour recherches échelonnées en profondeur. »</p>\\n<p>« De Saint-Louis pour Port-Étienne : D’accord. Donnons des ordres. »</p>\\n<p>« De Saint-Louis pour Juby : Sans nouvelles France-Amérique stop. Descendez urgence Port-Étienne. »</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Juby.</p>\\n<p>Un mécanicien revient à moi :</p>\\n<p>– Je vous mets l’eau dans le coffre avant gauche, les vivres dans le coffre droit, à l’arrière une roue de secours et la boîte de pharmacie. Dix minutes. Ça va ?</p>\\n<p>– Ça va.</p>\\n<p>Bloc-notes. Consignes :</p>\\n<p>« En mon absence rédiger les comptes rendus journaliers. Payer les Maures lundi. Embarquer sur le voilier les bidons vides. »</p>\\n<p>Et je m’accoude à la fenêtre. Le voilier qui nous ravitaille une fois par mois en eau douce se balance léger sur la mer. Il est charmant. Il habille d’un peu de vie tremblante, de linge frais tout mon désert. Je suis Noé visité dans l’arche par la colombe.</p>\\n<p>L’avions est prêt.</p>\\n<p align=\\"center\\">* * * * *</p>","<p>« De Juby pour Port-Étienne : Avion 236 quitte Juby 14 h. 20 pour Port-Étienne. »</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>La route des caravanes est marquée d’ossements, quelques avions marquent la nôtre : « Encore une heure jusqu’à l’avion de Bojador… » Squelettes pillés par les Maures. Repères.</p>\\n<p>Mille kilomètres de sable puis Port-Étienne : quatre bâtisses dans le désert.</p>\\n<p>– Nous t’attendions. Nous repartons tout de suite pour profiter du jour. L’un sur la côte, l’autre à vingt kilomètres, l’autre à cinquante. Nous faisons escale au fortin à cause de la nuit : tu changes d’appareil ?</p>\\n<p>– Oui. Soupape en prise.</p>\\n<p>Transbordement.</p>\\n<p>Départ.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Rien. Ce n’était qu’un rocher sombre. Je continue à passer ce désert au laminoir. Chaque point noir est une faute qui me tourmente. Mais le sable ne roule à moi qu’un rocher sombre.</p>\\n<p>Je ne vois plus mes camarades. Ils sont installés dans leur part de ciel. Patience d’éperviers. Je ne vois plus la mer. En suspens sur un brasier blanc, je ne vois rien qui vive. Mon cœur bat : cette épave au loin…</p>\\n<p>Un rocher sombre.</p>\\n<p>Mon moteur : un grondement de fleuve en marche. Ce fleuve en marche m’enveloppe et m’use.</p>\\n<p>Souvent je t’ai vu replié, Bernis, sur ton espérance inexplicable. Je ne sais pas traduire. Il me revient ce mot de Nietzsche que tu aimais :</p>\\n<p>« Mon été chaud, court, mélancolique et bienheureux. »</p>\\n<p>J’ai les yeux fatigués de tant chercher. Des points noirs dansent. Je ne sais plus bien où je vais.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>– Alors, sergent, vous l’avez donc vu ?</p>\\n<p>– Il a décollé au petit jour…</p>","<p>Nous nous asseyons au pied du fortin. Les Sénégalais rient, le sergent rêve : un crépuscule lumineux mais inutile.</p>\\n<p>L’un de nous hasarde :</p>\\n<p>– Si l’avion est détruit… tu sais… presque introuvable !</p>\\n<p>– Évidemment.</p>\\n<p>L’un de nous se lève, fait quelques pas :</p>\\n<p>– Ça va mal. Cigarette ?</p>\\n<p>Nous entrons dans la nuit : bêtes, hommes et choses.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Nous entrons dans la nuit, sous le feu du bord d’une cigarette, et le monde reprend ses vraies dimensions. À gagner Port-Étienne vieillissent les caravanes. Saint-Louis du Sénégal est aux confins du rêve. Ce désert, tout à l’heure n’était qu’un sable sans mystère. Les villes à trois pas s’offraient et le sergent armé pour la patience, le silence et la solitude sentait vaine une telle vertu. Mais une hyène crie et le sable vit, mais un appel recompose le mystère, mais quelque chose naît, fuit, recommence…</p>\\n<p>Mais les étoiles mesurent pour nous les vraies distances. La vie paisible, l’amour fidèle, l’amie que nous croyons chérir, c’est de nouveau l’étoile polaire qui les balise…</p>\\n<p>Mais la Croix du Sud balise un trésor.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Vers trois heures du matin, nos couvertures de laine deviennent minces, transparentes : c’est un maléfice de la lune. Je me réveille glacé. Je monte fumer sur la terrasse du fortin. Cigarette… cigarette… Ainsi j’atteindrai l’aube.</p>\\n<p>Ce petit poste au clair de lune : un port aux eaux tranquilles. Bien au complet tout ce jeu d’étoiles pour navigateurs. Les boussoles de nos trois avions tirées sagement vers le Nord. Et cependant…</p>","<p>Ton dernier pas réel, l’as-tu posé ici ? Ici finit le monde sensible. Ce petit fortin : un embarcadère. Un seuil ouvert sur ce clair de lune où rien n’est bien vrai.</p>\\n<p>La nuit est merveilleuse. Où es-tu, Jacques Bernis ? Ici peut-être, peut-être là ? Quelle présence déjà légère ! Autour de moi ce Sahara si peu chargé qui reçoit à peine, çà et là, un bond d’antilope, qui supporte à peine, au pli le plus lourd, un enfant léger.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Le sergent m’a rejoint :</p>\\n<p>– Bonsoir, monsieur.</p>\\n<p>– Bonsoir, sergent.</p>\\n<p>Il écoute. Rien. Un silence, Bernis, fait de ton silence.</p>\\n<p>– Cigarette ?</p>\\n<p>– Oui.</p>\\n<p>Le sergent mâche sa cigarette.</p>\\n<p>– Sergent, demain je trouverai mon camarade : où crois-tu qu’il soit ?</p>\\n<p>Le sergent, sûr de lui, me signale tout l’horizon…</p>\\n<p>Un enfant perdu remplit le désert.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Bernis, tu m’avouais un jour : « J’ai aimé une vie que je n’ai pas très bien comprise, une vie pas tout à fait fidèle. Je ne sais même pas très bien ce dont j’ai eu besoin : c’était une fringale légère… »</p>\\n<p>Bernis, tu m’avouais un jour : « Ce que je devinais se cachait derrière toute chose. Il me semblait qu’avec un effort, j’allais comprendre, j’allais le connaître enfin et l’emporter. Et je m’en vais troublé par cette présence d’ami que je n’ai jamais pu tirer au jour… »</p>\\n<p>Il me semble qu’un vaisseau chavire. Il me semble qu’un enfant s’apaise. Il me semble que ce frémissement de voiles, de mâts et d’espérances entre dans la mer.</p>\\n<p align=\\"center\\">* * * * *</p>","<p>L’aube. Cris rauques des Maures. Leurs chameaux à terre crevés de fatigue. Un rezzou de trois cents fusils, descendu en secret du Nord, aurait surgi à l’Est et massacré une caravane.</p>\\n<p>Si nous cherchions du côté du rezzou ?</p>\\n<p>– Alors en éventail, d’accord ? Celui du centre fonce plein Est…</p>\\n<p>Simoun : dès cinquante mètres d’altitude ce vent nous sèche comme un aspirateur.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>Mon Camarade…</p>\\n<p>C’était donc ici le trésor : l’as-tu cherché !</p>\\n<p>Sur cette dune, les bras en croix et face à ce golfe bleu sombre et face aux villages d’étoiles, cette nuit, tu pesais peu de chose…</p>\\n<p>À ta descente vers le Sud combien d’amarres dénouées, Bernis aérien déjà de n’avoir plus qu’un seul ami : un fil de la vierge te liait à peine…</p>\\n<p>Cette nuit tu pesais moins encore. Un vertige t’a pris. Dans l’étoile la plus verticale a lui le trésor, ô fugitif !</p>\\n<p>Le fil de la vierge de mon amitié te liait à peine : Berger infidèle j’ai dû m’endormir.</p>\\n<p align=\\"center\\">* * * * *</p>\\n<p>« De Saint-Louis du Sénégal pour Toulouse : France-Amérique retrouvé Est Timéris stop. Parti ennemi à proximité stop. Pilote tué avion brisé courrier intact stop. Continue sur Dakar. »</p>","<h2>VIII</h2>\\n<p>« De Dakar pour Toulouse : courrier bien arrivé Dakar.</p>\\n<p>Stop. »</p>\\n<p align=\\"center\\">FIN.</p>"]`);/**
