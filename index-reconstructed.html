<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Prince</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
        }

        /* ====== ANIMATION KEYFRAMES ====== */

        /* Rotation animations */
        @keyframes rotate-4deg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(4deg); }
        }

        @keyframes rotate-180deg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(180deg); }
        }

        @keyframes rotate-minus-180deg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-180deg); }
        }

        @keyframes rotate-minus-90deg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-90deg); }
        }

        /* Translation animations */
        @keyframes translate-x-rotate {
            0% { transform: translateX(0px) rotate(0deg); }
            100% { transform: translateX(2px) rotate(2deg); }
        }

        @keyframes translate-x-y {
            0% { transform: translateX(0px) translateY(0px); }
            100% { transform: translateX(4px) translateY(1px); }
        }

        /* Fade-in animations */
        @keyframes fade-in {
            0% { opacity: 0; }
            1% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ====== ANIMATION CLASSES ====== */

        .anim-active {
            animation-play-state: running !important;
        }

        /* Rotate 4deg - infinite */
        .anim-rotate-4deg {
            animation: rotate-4deg 2s infinite linear alternate;
            backface-visibility: hidden;
        }

        /* Rotate 180deg - forward */
        .anim-rotate-180deg {
            animation: rotate-180deg 10s linear forwards;
            backface-visibility: hidden;
        }

        /* Rotate -180deg - forward */
        .anim-rotate-minus-180deg {
            animation: rotate-minus-180deg 10s linear forwards;
            backface-visibility: hidden;
        }

        /* Rotate -90deg - forward */
        .anim-rotate-minus-90deg {
            animation: rotate-minus-90deg 10s linear forwards;
            backface-visibility: hidden;
        }

        /* Translate X + Rotate - infinite */
        .anim-translate-x-rotate {
            animation: translate-x-rotate 2s infinite linear alternate;
            backface-visibility: hidden;
        }

        /* Translate X + Y - infinite */
        .anim-translate-x-y {
            animation: translate-x-y 2s infinite linear alternate;
            backface-visibility: hidden;
        }

        /* Fade-in animation */
        .anim-fade-in {
            animation: fade-in 0.1s linear forwards;
            backface-visibility: hidden;
        }

        /* ====== POPUP/MODAL STYLES ====== */

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100005;
            background: rgba(0, 0, 0, 0.5);
            display: none;
        }

        .popup-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-content {
            position: relative;
            background: white;
            border-radius: 8px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            animation: fade-in 0.3s ease-out forwards;
        }

        .popup-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #666;
            transition: color 0.2s;
        }

        .popup-close:hover {
            color: #000;
        }

        /* Background element - full viewport background */
        .background-element {
            pointer-events: none;
            z-index: 99999999 !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .background-element .atom {
            background-size: auto !important;
            background-repeat: repeat !important;
            pointer-events: none;
        }

        /* ====== MAIN CONTENT ====== */

        main {
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-wrapper {
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 15px;
        }

        .animated-element {
            display: inline-block;
            margin: 20px 10px;
        }

        /* ====== UTILITY CLASSES ====== */

        .overflow-hidden {
            overflow: hidden;
        }

        .fade-out {
            animation: fade-in 0.3s ease-out reverse forwards;
        }
    </style>
</head>
<body>
    <!-- Background Element -->
    <div class="background-element">
        <div class="atom"></div>
    </div>

    <!-- Popup 1 - Auto-fade after 3 seconds -->
    <div id="popup1" class="popup-overlay">
        <div class="popup-content">
            <button class="popup-close" onclick="closePopup('popup1')">&times;</button>
            <h2>Welcome</h2>
            <p>This popup will auto-fade in 3 seconds...</p>
            <div class="animated-element anim-rotate-4deg">
                <span>✨</span>
            </div>
        </div>
    </div>

    <!-- Popup 2 - Auto-fade after 2 seconds -->
    <div id="popup2" class="popup-overlay">
        <div class="popup-content">
            <button class="popup-close" onclick="closePopup('popup2')">&times;</button>
            <h2>Animated Popup</h2>
            <p>Watch the animations...</p>
            <div class="animated-element anim-translate-x-rotate">
                <span>🌟</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <div class="content-wrapper">
            <h1>The Little Prince</h1>
            
            <div class="animated-element anim-rotate-180deg">
                <span style="font-size: 4rem;">👑</span>
            </div>

            <p>Experience the journey with animated effects and smooth transitions.</p>

            <div style="display: flex; justify-content: center; gap: 30px; margin: 40px 0;">
                <div class="animated-element anim-rotate-minus-180deg">
                    <span style="font-size: 3rem;">🌍</span>
                </div>
                <div class="animated-element anim-translate-x-y">
                    <span style="font-size: 3rem;">⭐</span>
                </div>
                <div class="animated-element anim-rotate-minus-90deg">
                    <span style="font-size: 3rem;">🚀</span>
                </div>
            </div>

            <button onclick="showPopup('popup1')" style="padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 4px; transition: background 0.3s;">
                Show Popup 1
            </button>
            <button onclick="showPopup('popup2')" style="padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none; background: #28a745; color: white; border-radius: 4px; margin-left: 10px; transition: background 0.3s;">
                Show Popup 2
            </button>
        </div>
    </main>

    <!-- jQuery for animations and effects -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // ====== POPUP MANAGEMENT ======

        function showPopup(popupId) {
            const popup = document.getElementById(popupId);
            popup.classList.add('active');
            $('body').css('overflow', 'hidden');

            // Auto-fade based on popup
            const fadeDelay = popupId === 'popup1' ? 3000 : 2000;
            
            setTimeout(() => {
                $('#' + popupId).delay(fadeDelay).fadeOut('slow', function() {
                    $(this).removeClass('active');
                    $('body').css('overflow', 'auto');
                    window.dispatchEvent(new Event('resize'));
                });
            }, fadeDelay);
        }

        function closePopup(popupId) {
            const popup = document.getElementById(popupId);
            $('#' + popupId).fadeOut('slow', function() {
                $(this).removeClass('active');
                $('body').css('overflow', 'auto');
                window.dispatchEvent(new Event('resize'));
            });
        }

        // ====== AUTO-TRIGGER POPUPS ON PAGE LOAD ======

        $(document).ready(function() {
            // Show first popup after page load
            setTimeout(function() {
                showPopup('popup1');
            }, 500);
        });

        $(window).on('load', function() {
            // Ensure popups fade out properly on full page load
            setTimeout(function() {
                $('#popup1').fadeOut('slow', function() {
                    $(this).removeClass('active');
                    $('body').css('overflow', 'auto');
                    window.dispatchEvent(new Event('resize'));
                });
            }, 3000);
        });

        // ====== FUNCTION LOADER (For advanced initialization) ======

        function onFuncLoad(funcName, callback, delay = 100) {
            if (typeof window[funcName] === 'function') {
                callback();
            } else {
                setTimeout(function() {
                    onFuncLoad(funcName, callback, delay);
                }, delay);
            }
        }

        function onReady(callback) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', callback);
            } else {
                callback();
            }
        }

        // ====== VISIBILITY TRACKING ======

        function setVisibilityRecords() {
            // Track which elements are visible in viewport
            const elements = document.querySelectorAll('[data-animate-style]');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('anim-active');
                    } else {
                        entry.target.classList.remove('anim-active');
                    }
                });
            });

            elements.forEach(el => observer.observe(el));
        }

        onReady(setVisibilityRecords);
    </script>
</body>
</html>
