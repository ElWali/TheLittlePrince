        function ArtistesSection() {
            const [selectedArtist, setSelectedArtist] = useState(BAUHAUS_ARTISTS_DB[0]);
            
            // Paul Klee Canvas variables
            const [activePresetColor, setActivePresetColor] = useState('#E11D48');
            const [sandboxPoints, setSandboxPoints] = useState([]);
            const [isAutoWalkActive, setIsAutoWalkActive] = useState(false);
            const walkIntervalRef = useRef(null);
            
            // Masterpiece Zoom Lightbox logic
            const [lightboxArtwork, setLightboxArtwork] = useState(null);
            const [isGridOverlay, setIsGridOverlay] = useState(false);
            const [zoomLevel, setZoomLevel] = useState(1);
            const [imageRotation, setImageRotation] = useState(0);
            const [isColorInverted, setIsColorInverted] = useState(false);

            // Dynamic Drawing walker generator for "A line is a point on a walk" Klee Engine
            const addPointToWalk = (xVal, yVal) => {
                setSandboxPoints(prev => {
                    const clean = [...prev];
                    if (clean.length > 30) clean.shift(); // keep length optimized
                    return [...clean, { x: xVal, y: yVal, color: activePresetColor }];
                });
            };

            const triggerManualGridClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const xPct = ((e.clientX - rect.left) / rect.width) * 100;
                const yPct = ((e.clientY - rect.top) / rect.height) * 100;
                addPointToWalk(xPct.toFixed(1), yPct.toFixed(1));
            };

            // START AUTO WALK SYSTEM (Zero sounds, purely dynamic vector graphic plotting)
            const toggleAutoWalk = () => {
                if (isAutoWalkActive) {
                    clearInterval(walkIntervalRef.current);
                    setIsAutoWalkActive(false);
                } else {
                    setIsAutoWalkActive(true);
                    let lastX = 50;
                    let lastY = 50;
                    walkIntervalRef.current = setInterval(() => {
                        const stepX = (Math.random() - 0.5) * 16;
                        const stepY = (Math.random() - 0.5) * 16;
                        lastX = Math.min(Math.max(lastX + stepX, 5), 95);
                        lastY = Math.min(Math.max(lastY + stepY, 5), 95);
                        addPointToWalk(lastX.toFixed(1), lastY.toFixed(1));
                    }, 140);
                }
            };

            useEffect(() => {
                return () => clearInterval(walkIntervalRef.current);
            }, []);

            return (
                <section id="artistes" className="py-24 px-6 md:px-12 lg:px-16 border-b border-bauhaus-grid bg-white relative">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex justify-between items-center border-b border-bauhaus-dark pb-6 mb-12">
