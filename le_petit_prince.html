    <style>
      /* BESPOKE TYPOGRAPHY & LAYOUT - STRICTLY ISOLATED & PROTECTED */
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap");

      :root {
        --font-body: "Cormorant Garamond", serif;
        --font-display: "Cinzel", serif;
        --font-playfair: "Playfair Display", serif;
      }

      body {
        color: #1a1a1a;
        font-family: var(--font-body);
        background-color: #fdfcf8;
        overflow-x: hidden;
      }

      .cs-hero {
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        display: flex;
        position: relative;
      }

      .cs-hero:before {
        content: "";
        z-index: -1;
        background: radial-gradient(circle, #0000, #fdfcf8 80%), url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.04"/></svg>');
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }

      .cs-hero-title {
        font-family: var(--font-display);
        letter-spacing: .05em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        font-size: 5rem;
      }

      .cs-hero-subtitle {
        font-family: var(--font-playfair);
        color: #555;
        margin-bottom: 3rem;
        font-size: 1.5rem;
        font-style: italic;
      }

      .cs-tarfaya-tribute {
        letter-spacing: .05em;
        text-transform: uppercase;
        color: #888;
        text-align: center;
        font-size: .9rem;
        position: absolute;
        bottom: 2rem;
      }

      .cs-novel-container {
        background-color: #fdfcf8;
        flex-direction: column;
        align-items: center;
        padding: 4rem 1rem;
        display: flex;
      }

      .t-chapter-node {
        box-sizing: border-box;
        background-color: #fdfcf8;
        border: 1px solid #e8e6da;
        width: 100%;
        max-width: 800px;
        min-height: 80vh;
        margin-bottom: 4rem;
        padding: 4rem 5rem;
        box-shadow: 0 10px 30px #00000008;
      }

      .t-chapter-node p {
        font-family: var(--font-body);
        text-indent: 1.5em;
        text-align: justify;
        color: #1a1a1a;
        margin-bottom: 0;
        font-size: 1.35rem;
        line-height: 1.8;
      }

      .t-chapter-node p:first-of-type {
        text-indent: 0;
      }

      .t-chapter-node p:has(+h1), .t-chapter-node p:has(+h2), .t-chapter-node p:has(+h3) {
        margin-bottom: 2rem;
      }

      .t-chapter-node h1 {
        font-family: var(--font-display);
        letter-spacing: .1em;
        text-transform: uppercase;
        text-align: center;
        break-before: page;
        margin-top: 4rem;
        margin-bottom: 2rem;
        font-size: 3rem;
      }

      .t-chapter-node h2 {
        font-family: var(--font-playfair);
        color: #333;
        text-align: center;
        margin-top: 3rem;
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
        font-style: italic;
      }

      .t-chapter-node h3 {
        font-family: var(--font-playfair);
        color: #555;
        text-align: center;
        margin-top: 2rem;
        margin-bottom: 1.5rem;
        font-size: 1.4rem;
        font-weight: 600;
      }

      .scroll-track {
        width: 100%;
      }

      @media(max-width:1024px) {
        .cs-hero-title {
          font-size: 4rem;
        }
      }

      @media(max-width:768px) {
        .cs-hero-title {
          text-align: center;
          padding: 0 1rem;
          font-size: 3rem;
        }
        .cs-hero-subtitle {
          text-align: center;
          padding: 0 1rem;
          font-size: 1.25rem;
        }
        .cs-novel-container {
          padding: 2rem 1rem;
        }
        .t-chapter-node {
          margin-bottom: 2rem;
          padding: 3rem 2rem;
        }
        .t-chapter-node p {
          font-size: 1.2rem;
          line-height: 1.7;
        }
        .t-chapter-node h1 {
          margin-top: 2.5rem;
          font-size: 2.25rem;
        }
        .t-chapter-node h2 {
          font-size: 1.5rem;
        }
      }

      @media(max-width:480px) {
        .cs-hero-title {
          font-size: 2.2rem;
        }
        .cs-hero-subtitle {
          font-size: 1.1rem;
        }
        .t-chapter-node {
          margin-bottom: 1.5rem;
          padding: 2rem 1.25rem;
        }
        .t-chapter-node p {
          text-align: left;
          font-size: 1.1rem;
          line-height: 1.6;
        }
        .t-chapter-node h1 {
          margin-top: 2rem;
          font-size: 1.8rem;
        }
        .t-chapter-node h2 {
          font-size: 1.3rem;
        }
      }

      .cs-footer {
        background-color: #fdfcf8;
        border-top: 1px solid #e8e6da;
        margin-top: 4rem;
      }

      .cs-btn {
        font-family: var(--font-body);
        color: #1a1a1a;
        cursor: pointer;
        background: #fff;
        border: 1px solid #e8e6da;
        border-radius: 9999px;
        align-items: center;
        gap: .5rem;
        padding: .75rem 1.5rem;
        font-size: 1.1rem;
        transition: all .2s;
        display: inline-flex;
        box-shadow: 0 2px 5px #00000005;
      }

      .cs-btn:hover {
        background: #f8f7f1;
        transform: translateY(-1px);
        box-shadow: 0 4px 10px #0000000d;
      }

        color: #fff;
        background: #1a1a1a;
        border-color: #1a1a1a;
      }

      .cs-btn-crypto:hover {
        background: #333;
      }

        justify-content: center;
        align-items: center;
        width: 100%;
        margin: 3rem 0;
        display: flex;
        flex-direction: column;
      }

      .lpp-illustration-svg {
        max-width: 100%;
        height: auto;
        max-height: 380px;
        transition: transform .3s;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.04));
      }

      .lpp-illustration-svg:hover {
        transform: scale(1.02);
      }
      
      .illustration-caption {
        font-family: var(--font-body);
        font-size: 0.95rem;
        color: #666;
        margin-top: 1rem;
        font-style: italic;
        text-align: center;
      }

      /* HIGH-PERFORMANCE CHIP ANIMATION INSTEAD OF FRAMER MOTION */
      .fade-in-backdrop {
        animation: fadeInBg 0.3s forwards ease-out;
      }
      
      .slide-calc-modal {
        animation: slideUpContent 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fadeInBg {
        from { background-color: rgba(0, 0, 0, 0); -webkit-backdrop-filter: blur(0px); backdrop-filter: blur(0px); }
        to { background-color: rgba(0, 0, 0, 0.6); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
      }

      @keyframes slideUpContent {
        from { transform: scale(0.95) translateY(20px); opacity: 0; }
        to { transform: scale(1) translateY(0); opacity: 1; }
      }
    </style>
  </head>

        `<h1>CHAPITRE IV</h1>

        drawingS_Astronomer,

        `<p>Heureusement pour la réputation de l’astéroïde B 612 un dictateur turc imposa à son peuple, sous peine de mort, de s’habiller à l’Européenne. L’astronome refit sa démonstration en 1920, dans un habit très élégant. Et cette fois-ci tout le monde fut de son avis.</p>

         <p>Mais, bien sûr, nous qui comprenons la vie, nous nous moquons bien des numéros ! J’aurais aimé commencer cette histoire à la façon des contes de fées. J’aurais aimé dire :<br>« Il était une fois un petit prince qui habitait une planète à peine plus grande que lui, et qui avait besoin d’un ami… » Pour ceux qui comprennent la vie, ça aurait eu l’air beaucoup plus vrai.</p>

        `<h1>CHAPITRE V</h1>

         <p>Cette fois-ci encore ce fut grâce au mouton, car brusquement le petit prince m’interrogea, comme pris d’un doute grave :<br>– C’est bien vrai, n’est-ce pas, que les moutons mangent les arbustes ?<br>– Oui. C’est vrai.<br>– Ah ! Je suis content.</p>

        drawingS_Sunset,

        `<h1>CHAPITRE VII</h1>

         <p>Je ne le savais pas. J’étais alors très occupé à essayer de dévisser un boulon trop serré de mon moteur. J’étais très soucieux car ma panne commençait de m’apparaître comme très grave, et l’eau à boire qui s’épuisait me faisait craindre le pire.</p>
         <p>– Les épines, à quoi servent-elles ?<br>Le petit prince ne renonçait jamais à une question, une fois qu’il l’avait posée. J’étais irrité par mon boulon et je répondis n’importe quoi :<br>– Les épines, ça ne sert à rien, c’est de la pure méchanceté de la part des fleurs !<br>– Oh !<br>Mais après un silence il me lança, avec une sorte de rancune :<br>– Je ne te crois pas ! Les fleurs sont faibles. Elles sont naïves. Elles se rassurent comme elles peuvent. Elles se croient terribles avec leurs épines…</p>`,

        `<p>Je ne répondis rien. À cet instant-là je me disais : « Si ce boulon résiste encore, je le ferai sauter d’un coup de marteau. » Le petit prince dérangea de nouveau mes réflexions :<br>– Et tu crois, toi, que les fleurs…<br>– Mais non ! Mais non ! Je ne crois rien ! J’ai répondu n’importe quoi. Je m’occupe, moi, de choses sérieuses !<br>Il me regarda stupéfait.<br>– De choses sérieuses !</p>
         <p>Il me voyait, mon marteau à la main, et les doigts noirs de cambouis, penché sur un objet qui lui semblait très laid.<br>– Tu parles comme les grandes personnes !<br>Ça me fit un peu honte. Mais, impitoyable, il ajouta :<br>– Tu confonds tout… tu mélanges tout !<br>Il était vraiment très irrité. Il secouait au vent des cheveux tout dorés :<br>– Je connais une planète où il y a un Monsieur cramoisi. Il n’a jamais respiré une fleur. Il n’a jamais regardé une étoile. Il n’a jamais aimé personne. Il n’a jamais rien fait d’autre que des additions. Et toute la journée il répète comme toi : « Je suis un homme sérieux ! Je suis un homme sérieux ! » et ça le fait gonfler d’orgueil. Mais ce n’est pas un homme, c’est un champignon !<br>– Un quoi ?<br>– Un champignon !<br>Le petit prince était maintenant tout pâle de colère.</p>`,

        `<p>– Il y a des millions d’années que les fleurs fabriquent des épines. Il y a des millions d’années que les moutons mangent quand même les fleurs. Et ce n’est pas sérieux de chercher à comprendre pourquoi elles se donnent tant de mal pour se fabriquer des épines qui ne servent jamais à rien ? Ce n’est pas important la guerre des moutons et des fleurs ? Ce n’est pas plus sérieux et plus important que les additions d’un gros Monsieur rouge ? Et si je connais, moi, une fleur unique au monde, qui n’existe nulle part, sauf dans ma planète, et qu’un petit mouton peut anéantir d’un seul coup, comme ça, un matin, sans se rendre compte de ce qu’il fait, ce n’est pas important ça !</p>
         <p>Il rougit, puis reprit :<br>– Si quelqu’un aime une fleur qui n’existe qu’à un exemplaire dans les millions et les millions d'étoiles, ça suffit pour qu'il soit heureux quand il les regarde. Il se dit : « Ma fleur est là quelque part… » Mais si le mouton mange la fleur, c’est pour lui comme si, brusquement, toutes les étoiles s’éteignaient ! Et ce n’est pas important ça !</p>`,

        `<p>Il ne put rien dire de plus. Il éclata brusquement en sanglots. La nuit était tombée. J’avais lâché mes outils. Je me moquais bien de mon marteau, de mon boulon, de la soif et de la mort. Il y avait, sur une étoile, une planète, la mienne, la Terre, un petit prince à consoler ! Je le pris dans les bras. Je le berçai. Je lui disais : « La fleur que tu aimes n’est pas en danger… Je lui dessinerai une muselière, à ton mouton… Je te dessinerai une armure pour ta fleur… Je… » Je ne savais pas trop quoi dire. Je me sentais très maladroit. Je ne savais comment l’atteindre, où le rejoindre… C’est tellement mystérieux, le pays des larmes.</p>`,

        drawingS_CryingPrince,

        `<h1>CHAPITRE VIII</h1>
         <p>J’appris bien vite à mieux connaître cette fleur. Il y avait toujours eu, sur la planète du petit prince, des fleurs très simples, ornées d’un seul rang de pétales, et qui ne tenaient point de place, et qui ne dérangeaient personne. Elles apparaissaient un matin dans l’herbe, et puis elles s’éteignaient le soir. Mais celle-là avait germé un jour, d’une graine apportée d’on ne sait où, et le petit prince avait surveillé de très près cette brindille qui ne ressemblait pas aux autres brindilles. Ça pouvait être un nouveau genre de baobab. Mais l’arbuste cessa vite de croître, et commença de préparer une fleur. Le petit prince, qui assistait à l’installation d’un bouton énorme, sentait bien qu’il en sortirait une apparition miraculeuse, mais la fleur n’en finissait pas de se préparer à être belle, à l'abri de sa chambre verte. Elle choisissait avec soin ses couleurs. Elle s’habillait lentement, elle ajustait un à un ses pétales. Elle ne voulait pas sortir toute fripée comme les coquelicots. Elle ne voulait apparaître que dans le plein rayonnement de sa beauté. Eh ! oui. Elle était très coquette ! Sa toilette mystérieuse avait donc duré des jours et des jours. Et puis voici qu’un matin, justement à l’heure du lever du soleil, elle s’était montrée.</p>
         <p>Et elle, qui avait travaillé avec tant de précision, dit en bâillant :<br>– Ah ! Je me réveille à peine… Je vous demande pardon… Je suis encore toute décoiffée…<br>Le petit prince, alors, ne put contenir son admiration :<br>– Que vous êtes belle !<br>– N’est-ce pas, répondit doucement la fleur. Et je suis née en même temps que le soleil…</p>`,

        drawingS_Rose,

        `<p>Le petit prince devina bien qu’elle n’était pas trop modeste, mais elle était si émouvante !<br>– C’est l’heure, je crois, du petit déjeuner, avait-elle bientôt ajouté, auriez-vous la bonté de penser à moi…<br>Et le petit prince, tout confus, ayant été chercher un arrosoir d’eau fraîche, avait servi la fleur.</p>`,

        drawingS_Screen,

        `<p>Ainsi l’avait-elle bien vite tourmenté par sa vanité un peu ombrageuse. Un jour, par exemple, parlant de ses quatre épines, elle avait dit au petit prince :<br>– Ils peuvent venir, les tigres, avec leurs griffes !<br>– Il n’y a pas de tigres sur ma planète, avait objecté le petit prince, et puis les tigres ne mangent pas l’herbe.<br>– Je ne suis pas une herbe, avait doucement répondu la fleur.<br>– Pardonnez-moi…<br>– Je ne crains rien des tigres, mais j’ai horreur des courants d'air. Vous n'auriez pas un paravent ?<br>« Horreur des courants d’air… ce n’est pas de chance, pour une plante, avait remarqué le petit prince. Cette fleur est bien compliquée… »</p>`,

        `<p>– Le soir vous me mettrez sous globe. Il fait très froid chez vous. C’est mal installé. Là d’où je viens…<br>Mais elle s’était interrompue. Elle était venue sous forme de graine. Elle n’avait rien pu connaître des autres mondes. Humiliée de s’être laissé surprendre à préparer un de ces mensonges naïfs, elle avait toussé deux ou trois fois, pour mettre le petit prince dans son tort :<br>– Ce paravent ?…<br>– J’allais le chercher mais vous me parliez !<br>Alors elle avait forcé sa toux pour lui infliger quand même des remords.</p>`,

        `<p>Ainsi le petit prince, malgré la bonne volonté de son amour, avait vite douté d’elle. Il avait pris au sérieux des mots sans importance, et était devenu très malheureux.<br>« J’aurais dû ne pas l’écouter, me confia-t-il un jour, il ne faut jamais écouter les fleurs. Il faut les regarder et les respirer. La mienne embaumait ma planète, mais je ne savais pas m’en réjouir. Cette histoire de griffes, qui m’avait tellement agacé, eût dû m’attendrir… »<br>Il me confia encore :<br>« Je n’ai alors rien su comprendre ! J’aurais dû la juger sur les actes et non sur les mots. Elle m’embaumait et m’éclairait. Je n’aurais jamais dû m’enfuir ! J’aurais dû deviner sa tendresse derrière ses pauvres ruses. Les fleurs sont si contradictoires ! Mais j’étais trop jeune pour savoir l’aimer. »</p>`,

        `<h1>CHAPITRE X</h1>
         <p>Il se trouvait dans la région des astéroïdes 325, 326, 327, 328, 329 et 330. Il commença donc par les visiter pour y chercher une occupation et pour s’instruire.<br>La première était habitée par un roi. Le roi siégeait, habillé de pourpre et d’hermine, sur un trône très simple et cependant majestueux.</p>`,

        drawingS_King,

        `<p>– Ah ! Voilà un sujet, s’écria le roi quand il aperçut le petit prince.<br>Et le petit prince se demanda :<br>« Comment peut-il me reconnaître puisqu’il ne m’a encore jamais vu ! »<br>Il ne savait pas que, pour les rois, le monde est très simplifié. Tous les hommes sont des sujets.<br>– Approche-toi que je te voie mieux, lui dit le roi qui était tout fier d’être roi pour quelqu’un.<br>Le petit prince chercha des yeux où s’asseoir, mais la planète était toute encombrée par le magnifique manteau d’hermine. Il resta donc debout, et, comme il était fatigué, il bâilla.</p>`,

        `<p>– Il est contraire à l’étiquette de bâiller en présence d’un roi, lui dit le monarque. Je te l’interdis.<br>– Je ne peux pas m’en empêcher, répondit le petit prince tout confus. J’ai fait un long voyage et je n’ai pas dormi…<br>– Alors, lui dit le roi, je t’ordonne de bâiller. Je n’ai vu personne bâiller depuis des années. Les bâillements sont pour moi des curiosités. Allons ! bâille encore. C’est un ordre.<br>– Ça m’intimide… je ne peux plus… fit le petit prince tout rougissant.<br>– Hum ! Hum ! répondit le roi. Alors je… je t’ordonne tantôt de bâiller et tantôt de…<br>Il bredouillait un peu et paraissait vexé.</p>`,

        `<p>Car le roi tenait essentiellement à ce que son autorité fût respectée. Il ne tolérait pas la désobéissance. C’était un monarque absolu. Mais, comme il était très bon, il donnait des ordres raisonnables.<br>« Si j’ordonnais, disait-il couramment, si j’ordonnais à un général de se changer en oiseau de mer, et si le général n’obéissait pas, ce ne serait pas la faute du général. Ce serait ma faute. »<br>– Puis-je m’asseoir ? s’enquit timidement le petit prince.<br>– Je t’ordonne de t’asseoir, lui répondit le roi, qui ramena majestueusement un pan de son manteau d’hermine.</p>`,

        `<p>Mais le petit prince s’étonnait. La planète était minuscule. Sur quoi le roi pouvait-il bien régner ?<br>– Sire, lui dit-il… je vous demande pardon de vous interroger…<br>– Je t’ordonne de m’interroger, se hâta de dire le roi.<br>– Sire… sur quoi régnez-vous ?<br>– Sur tout, répondit le roi, avec une grande simplicité.<br>– Sur tout ?<br>Le roi d’un geste discret désigna sa planète, les autres planètes et les étoiles.<br>– Sur tout ça ? dit le petit prince.<br>– Sur tout ça… répondit le roi.<br>Car non seulement c’était un monarque absolu mais c’était un monarque universel.</p>`,

        `<p>– Et les étoiles vous obéissent ?<br>– Bien sûr, lui dit le roi. Elles obéissent aussitôt. Je ne tolère pas l’indiscipline.<br>Un tel pouvoir émerveilla le petit prince. S’il l’avait détenu lui-même, il aurait pu assister, non pas à quarante-quatre, mais à soixante-douze, ou même à cent, ou même à deux cents couchers de soleil dans la même journée, sans avoir jamais à tirer sa chaise ! Et comme il se sentait un peu triste à cause du souvenir de sa petite planète abandonnée, il s’enhardit à solliciter une grâce du roi :<br>– Je voudrais voir un coucher de soleil… Faites-moi plaisir… Ordonnez au soleil de se coucher…</p>`,

        `<p>– Si j’ordonnais à un général de voler d’une fleur à l’autre à la façon d’un papillon, ou d’écrire une tragédie, ou de se changer en oiseau de mer, et si le général n’exécutait pas l’ordre reçu, qui, de lui ou de moi, serait dans son tort ?<br>– Ce serait vous, dit fermement le petit prince.<br>– Exact. Il faut exiger de chacun ce que chacun peut donner, reprit le roi. L’autorité repose d’abord sur la raison. Si tu ordonnes à ton peuple d’aller se jeter à la mer, il fera la révolution. J’ai le droit d’exiger l’obéissance parce que mes ordres sont raisonnables.</p>`,

        `<p>– Alors mon coucher de soleil ? rappela le petit prince qui jamais n’oubliait une question une fois qu’il l’avait posée.<br>– Ton coucher de soleil, tu l’auras. Je l’exigerai. Mais j’attendrai, dans ma science du gouvernement, que les conditions soient favorables.<br>– Quand ça sera-t-il ? s’informa le petit prince.<br>– Hem ! hem ! lui répondit le roi, qui consulta d’abord un gros calendrier, hem ! hem ! ce sera, vers… vers… ce sera ce soir vers sept heures quarante ! Et tu verras comme je suis bien obéi.</p>`,

        `<p>Le petit prince bâilla. Il regrettait son coucher de soleil manqué. Et puis il s’ennuyait déjà un peu :<br>– Je n’ai plus rien à faire ici, dit-il au roi. Je vais repartir !<br>– Ne pars pas, répondit le roi qui était si fier d’avoir un sujet. Ne pars pas, je te fais ministre !<br>– Ministre de quoi ?<br>– De… de la justice !<br>– Mais il n’y a personne à juger !<br>– On ne sait pas, lui dit le roi. Je n’ai pas fait encore le tour de mon royaume. Je suis très vieux, je n’ai pas de place pour un carrosse, et ça me fatigue de marcher.</p>`,

        `<p>– Oh ! Mais j’ai déjà vu, dit le petit prince qui se pencha pour jeter encore un coup d’œil sur l’autre côté de la planète. Il n’y a personne là-bas non plus…<br>– Tu te jugeras donc toi-même, lui répondit le roi. C’est le plus difficile. Il est bien plus difficile de se juger soi-même que de juger autrui. Si tu réussis à bien te juger, c’est que tu es un véritable sage.<br>– Moi, dit le petit prince, je puis me juger moi-même n’importe où. Je n’ai pas besoin d’habiter ici.</p>`,

        `<p>– Hem ! Hem ! dit le roi, je crois bien que sur ma planète il y a quelque part un vieux rat. Je l’entends la nuit. Tu pourras juger ce vieux rat. Tu le condamneras à mort de temps en temps. Ainsi sa vie dépendra de ta justice. Mais tu le gracieras chaque fois pour l’économiser. Il n’y en a qu’un.<br>– Moi, répondit le petit prince, je n’aime pas condamner à mort, et je crois bien que je m’en vais.</p>`,

        `<p>– Non, dit le roi.<br>Mais le petit prince, ayant achevé ses préparatifs, ne voulut point peiner le vieux monarque :<br>– Si Votre Majesté désirait être obéie ponctuellement, elle pourrait me donner un ordre raisonnable. Elle pourrait m’ordonner, par exemple, de partir avant une minute. Il me semble que les conditions sont favorables…<br>Le roi n’ayant rien répondu, le petit prince hésita d’abord, puis, avec un soupir, prit le départ.<br>– Je te fais mon ambassadeur, se hâta alors de crier le roi.</p>
         <p>Il avait un grand air d’autorité.<br>« Les grandes personnes sont bien étranges », se dit le petit prince, en lui-même, durant son voyage.</p>`,

        `<h1>CHAPITRE XI</h1>
         <p>La seconde planète était habitée par un vaniteux :<br>– Ah ! Ah ! Voilà la visite d'un admirateur ! s’écria de loin le vaniteux dès qu’il aperçut le petit prince.<br>Car, pour les vaniteux, les autres hommes sont des admirateurs.</p>
         <p>– Bonjour, dit le petit prince. Vous avez un drôle de chapeau.<br>– C’est pour saluer, lui répondit le vaniteux. C’est pour saluer quand on m’acclame. Malheureusement il ne passe jamais personne par ici.</p>`,

        `<p>– Ah oui ? dit le petit prince qui ne comprit pas.<br>– Frappe tes mains l’une contre l’autre, conseilla donc le vaniteux.<br>Le petit prince frappa ses mains l’une contre l’autre. Le vaniteux salua modestement en soulevant son chapeau.<br>« Ça c’est plus amusant que la visite au roi », se dit en lui-même le petit prince. Et il recommença de frapper ses mains l’une contre l’autre. Le vaniteux recommença de saluer en soulevant son chapeau.</p>
         <p>Après de cinq minutes d’exercice le petit prince se fatigua de la monotonie du jeu :<br>– Et, pour que le chapeau tombe, demanda-t-il, que faut-il faire ?<br>Mais le vaniteux ne l’entendit pas. Les vaniteux n’entendent jamais que les louanges.<br>– Est-ce que tu m’admires vraiment beaucoup ? demanda-t-il au petit prince.</p>`,

        `<p>– Qu’est-ce que signifie admirer ?<br>– Admirer signifie reconnaître que je suis l’homme le plus beau, le mieux habillé, le plus riche et le plus intelligent de la planète.<br>– Mais tu es seul sur ta planète !<br>– Fais-moi ce plaisir. Admire-moi quand même !<br>– Je t’admire, dit le petit prince, en haussant un peu les épaules, mais en quoi cela peut-il bien t’intéresser ?<br>Et le petit prince s’en fut.<br>« Les grandes personnes sont décidément bien bizarres », se dit-il simplement en lui-même durant son voyage.</p>`,

        `<h1>CHAPITRE XII</h1>
         <p>La planète suivante était habitée par un buveur. Cette visite fut très courte, mais elle plongea le petit prince dans une grande mélancolie :</p>`,

        drawingS_Drunkard,

        `<p>– Que fais-tu là ? dit-il au buveur, qu’il trouva installé en silence devant une collection de bouteilles vides et une collection de bouteilles pleines.<br>– Je bois, répondit le buveur, d’un air lugubre.<br>– Pourquoi bois-tu ? lui demanda le petit prince.<br>– Pour oublier, répondit le buveur.<br>– Pour oublier quoi ? s’enquit le petit prince qui déjà le plaignait.<br>– Pour oublier que j’ai honte, avoua le buveur en baissant la tête.<br>– Honte de quoi ? s’informa le petit prince qui désirait le secourir.<br>– Honte de boire ! acheva le buveur qui s’enferma définitivement dans le silence.<br>Et le petit prince s’en fut, perplexe.<br>« Les grandes personnes sont décidément très très bizarres », se disait-il en lui-même durant le voyage.</p>`,

        `<h1>CHAPITRE XIII</h1>
         <p>La quatrième planète était celle du businessman. Cet homme était si occupé qu’il ne leva même pas la tête à l’arrivée du petit prince.</p>`,

        drawingS_Businessman,

        `<p>– Bonjour, dit-il à celui-ci. Votre cigarette est éteinte.<br>– Trois et deux font cinq. Cinq et sept douze. Douze et trois quinze. Bonjour. Quinze et sept vingt-deux. Vingt-deux et six vingt-huit. Pas le temps de la rallumer. Vingt-six et cinq trente et un. Ouf ! Ça fait donc cinq cent un millions six cent vingt-deux mille sept cent trente et un.<br>– Cinq cents millions de quoi ?<br>– Hein ? Tu es toujours là ? Cinq cent un millions de… je ne sais plus… J’ai tellement de travail ! Je suis sérieux, moi, je ne m’amuse pas à des balivernes ! Deux et cinq sept…<br>– Cinq cent un millions de quoi ? répéta le petit prince qui jamais de sa vie, n’avait renoncé a une question, une fois qu'il l'avait posée.</p>`,

        `<p>Le businessman leva la tête :<br>– Depuis cinquante-quatre ans que j’habite cette planète-ci, je n’ai été dérangé que trois fois. La première fois ç’a été, il y a vingt-deux ans, par un hanneton qui était tombé Dieu sait d’où. Il répandait un bruit épouvantable, et j’ai fait quatre erreurs dans une addition. La seconde fois ç’a été, il y a onze ans, par une crise de rhumatisme. Je manque d’exercice. Je n’ai pas le temps de flâner. Je suis sérieux, moi. La troisième fois… la voici ! Je disais donc cinq cent un millions…<br>– Millions de quoi ?<br>Le businessman comprit qu’il n’était point d’espoir de paix :\n– Millions de ces petites choses que l’on voit quelquefois dans le ciel.</p>`,

        `<p>– Des mouches ?<br>– Mais non, des petites choses qui brillent.<br>– Des abeilles ?<br>– Mais non. Des petites choses dorées qui font rêvasser les fainéants. Mais je suis sérieux, moi ! Je n’ai pas le temps de rêvasser.<br>– Ah ! des étoiles ?<br>– C’est bien ça. Des étoiles.<br>– Et que fais-tu de cinq cents millions d’étoiles ?<br>– Cinq cent un millions six cent vingt-deux mille sept cent trente et un. Je suis sérieux, moi, je suis précis.<br>– Et que fais-tu de ces étoiles ?<br>– Ce que j’en fais ?<br>– Oui.<br>– Rien. Je les possède.</p>`,

        `<p>– Tu possèdes les étoiles ?<br>– Oui.<br>– Mais j’ai déjà vu un roi qui…<br>– Les rois ne possèdent pas. Ils « règnent » sur. C’est très différent.<br>– Et à quoi cela te sert-il de posséder les étoiles ?<br>– Ça me sert à être riche.<br>– Et à quoi cela te sert-il d’être riche ?<br>– À acheter d’autres étoiles, si quelqu’un en trouve.<br>« Celui-là, se dit en lui-même le petit prince, il raisonne un peu comme mon ivrogne. »</p>`,

        `<p>Cependant il posa encore des questions :<br>– Comment peut-on posséder les étoiles ?<br>– À qui sont-elles ? riposta, grincheux, le businessman.<br>– Je ne sais pas. À personne.<br>– Alors elles sont à moi, car j’y ai pensé le premier.<br>– Ça suffit ?<br>– Bien sûr. Quand tu trouves un diamant qui n’est à personne, il est à toi. Quand tu trouves une île qui n’est à personne, elle est à toi. Quand tu as une idée le premier, tu la fais breveter : elle est à toi. Et moi je possède les étoiles, puisque jamais personne avant moi n'a songé à les posséder.</p>`,

        `<p>– Ça c’est vrai, dit le petit prince. Et qu’en fais-tu ?<br>– Je les gère. Je les compte et je les recompte, dit le businessman. C’est difficile. Mais je suis un homme sérieux !<br>Le petit prince n’était pas satisfait encore.<br>– Moi, si je possède un foulard, je puis le mettre autour de mon cou et l’emporter. Moi, si je possède une fleur, je puis cueillir ma fleur et l’emporter. Mais tu ne peux pas cueillir les étoiles !<br>– Non, mais je puis les placer en banque.</p>`,

        `<p>– Qu’est-ce que ça veut dire ?<br>– Ça veut dire que j’écris sur un petit papier le nombre de mes étoiles. Et puis j’enferme à clef ce papier-là dans un tiroir.<br>– Et c’est tout ?<br>– Ça suffit !<br>« C’est amusant, pensa le petit prince. C’est assez poétique. Mais ce n’est pas très sérieux. »<br>Le petit prince avait sur les choses sérieuses des idées très différentes des idées des grandes personnes.<br>– Moi, dit-il encore, je possède une fleur que j’arrose tous les jours. Je possède trois volcans que je ramone toutes les semaines. Car je ramone aussi celui qui est éteint. On ne sait jamais. C’est utile à mes volcans, et c’est utile à ma fleur, que je les possède. Mais tu n'es pas utile aux étoiles…<br>Le businessman ouvrit la bouche mais ne trouva rien à répondre, et le petit prince s’en fut.<br>« Les grandes personnes sont décidément tout à fait extraordinaires », se disait-il simplement en lui-même durant le voyage.</p>`,

        `<h1>CHAPITRE XIV</h1>
         <p>La cinquième planète était très curieuse. C’était la plus petite de toutes. Il y avait là juste assez de place pour loger un réverbère et un allumeur de réverbères. Le petit prince ne parvenait pas à s’expliquer à quoi pouvaient servir, quelque part dans le ciel, sur une planète sans maison, ni population, un réverbère et un allumeur de réverbères. Cependant il se dit en lui-même :</p>`,

        drawingS_Lamplighter,

        `<p>– Peut-être bien que cet homme est absurde. Cependant il est moins absurde que le roi, que le vaniteux, que le businessman et que le buveur. Au moins son travail a-t-il un sens. Quand il allume son réverbère, c’est comme s’il faisait naître une étoile de plus, ou une fleur. Quand il éteint son réverbère, ça endort la fleur ou l’étoile. C’est une occupation très jolie. C’est véritablement utile puisque c’est joli.<br>Lorsqu’il aborda la planète il salua respectueusement l’allumeur :<br>– Bonjour. Pourquoi viens-tu d’éteindre ton réverbère ?<br>– C’est la consigne, répondit l’allumeur. Bonjour.<br>– Qu’est-ce que la consigne ?<br>– C’est d’éteindre mon réverbère. Bonsoir.<br>Et il le ralluma.<br>– Mais pourquoi viens-tu de le rallumer ?<br>– C’est la consigne, répondit l’allumeur.</p>`,

        `<p>– Je ne comprends pas, dit le petit prince.<br>– Il n’y a rien à comprendre, dit l’allumeur. La consigne c’est la consigne. Bonjour.<br>Et il éteignit son réverbère.<br>Puis il s’épongea le front avec un mouchoir à carreaux rouges.<br>– Je fais là un métier terrible. C’était raisonnable autrefois. J’éteignais le matin et j’allumais le soir. J’avais le reste du jour pour me reposer, et le reste de la nuit pour dormir…<br>– Et, depuis cette époque, la consigne a changé ?<br>– La consigne n’a pas changé, dit l’allumeur. C’est bien là le drame ! La planète d’année en année a tourné de plus en plus vite, et la consigne n’a pas changé !</p>`,

        `<p>– Alors ? dit le petit prince.<br>– Alors maintenant qu’elle fait un tour par minute, je n’ai plus une seconde de repos. J’allume et j’éteins une fois par minute !<br>– Ça c’est drôle ! Les jours chez toi durent une minute !<br>– Ce n’est pas drôle du tout, dit l’allumeur. Ça fait déjà un mois que nous parlons ensemble.<br>– Un mois ?<br>– Oui. Trente minutes. Trente jours ! Bonsoir.<br>Et il ralluma son réverbère.</p>
         <p>Le petit prince le regarda et il aima cet allumeur qui était tellement fidèle à la consigne. Il se souvint des couchers de soleil que lui-même allait autrefois chercher, en tirant sa chaise. Il voulut aider son ami :<br>– Tu sais… je connais un moyen de te reposer quand tu voudras…<br>– Je veux toujours, dit l’allumeur.<br>Car on peut être, à la fois, fidèle et paresseux.</p>`,

        `<p>Le petit prince poursuivit :<br>– Ta planète est tellement petite que tu en fais le tour en trois enjambées. Tu n’as qu’à marcher assez lentement pour rester toujours au soleil. Quand tu voudras te reposer tu marcheras… et le jour durera aussi longtemps que tu voudras.<br>– Ça ne m’avance pas à grand’chose, dit l’allumeur. Ce que j’aime dans la vie, c’est dormir.<br>– Ce n’est pas de chance, dit le petit prince.<br>– Ce n’est pas de chance, dit l’allumeur. Bonjour.<br>Et il éteignit son réverbère.</p>`,

        `<p>« Celui-là, se dit le petit prince, tandis qu’il poursuivait plus loin son voyage, celui-là serait méprisé par tous les autres, par le roi, par le vaniteux, par le buveur, par le businessman. Cependant c’est le seul qui ne me paraisse pas ridicule. C’est, peut-être, parce qu’il s’occupe d’autre chose que de soi-même. »<br>Il eut un soupir de regret et se dit encore :<br>« Celui-là est le seul dont j’eusse pu faire mon ami. Mais sa planète est vraiment trop petite. Il n’y a pas de place pour deux… »<br>Ce que le petit prince n’osait pas s’avouer, c’est qu’il regrettait cette planète bénie à cause, surtout, des mille quatre cent quarante couchers de soleil par vingt-quatre heures !</p>`,

        `<h1>CHAPITRE XV</h1>
         <p>La sixième planète était une planète dix fois plus vaste. Elle était habitée par un vieux Monsieur qui écrivait d’énormes livres.</p>`,

        drawingS_Geographer,

        `<p>– Tiens ! voilà un explorateur ! s’écria-t-il, quand il aperçut le petit prince.<br>Le petit prince s’assit sur la table et souffla un peu. Il avait déjà tant voyagé !<br>– D’où viens-tu ? lui dit le vieux Monsieur.<br>– Quel est ce gros livre ? dit le petit prince. Que faites-vous ici ?<br>– Je suis géographe, dit le vieux Monsieur.<br>– Qu’est-ce qu’un géographe ?<br>– C’est un savant qui connaît où se trouvent les mers, les fleuves, les villes, les montagnes et les déserts.<br>– Ça c’est bien intéressant, dit le petit prince. Ça c’est enfin un véritable métier ! Et il jeta un coup d’œil autour de lui sur la planète du géographe. Il n’avait jamais vu encore une planète aussi majestueuse.<br>– Elle est bien belle, votre planète. Est-ce qu'il y a des océans ?<br>– Je ne puis pas le savoir, dit le géographe.</p>`,

        `<p>– Ah ! (Le petit prince était déçu.) Et des montagnes ?<br>– Je ne puis pas le savoir, dit le géographe.<br>– Et des villes et des fleuves et des déserts ?<br>– Je ne puis pas le savoir non plus, dit le géographe.<br>– Mais vous êtes géographe !<br>– C’est exact, dit le géographe, mais je ne suis pas explorateur. Je manque absolument d’explorateurs. Ce n’est pas le géographe qui va faire le compte des villes, des fleuves, des montagnes, des mers, des océans et des déserts. Le géographe est trop important pour flâner. Il ne quitte pas son bureau. Mais il y reçoit les explorateurs. Il les interroge, et il prend en note leurs souvenirs. Et si les souvenirs de l’un d’entre eux lui paraissent intéressants, le géographe fait faire une enquête sur la moralité de l’explorateur.</p>`,

        `<p>– Pourquoi ça ?<br>– Parce qu’un explorateur qui mentirait entraînerait des catastrophes dans les livres de géographie. Et aussi un explorateur qui boirait trop.<br>– Pourquoi ça ? fit le petit prince.<br>– Parce que les ivrognes voient double. Alors le géographe noterait deux montagnes, là où il n’y en a qu’une seule.<br>– Je connais quelqu’un, dit le petit prince, qui serait mauvais explorateur.<br>– C’est possible. Donc, quand la moralité de l’explorateur paraît bonne, on fait une enquête sur sa découverte.<br>– On va voir ?<br>– Non. C’est trop compliqué. Mais on exige de l’explorateur qu’il fournisse des preuves. S’il s’agit par exemple de la découverte d’une grosse montagne, on exige qu’il en rapporte de grosses pierres.</p>`,

        `<p>Le géographe soudain s’émut.<br>– Mais toi, tu viens de loin ! Tu es explorateur ! Tu vas me décrire ta planète !<br>Et le géographe, ayant ouvert son registre, tailla son crayon. On note d’abord au crayon les récits des explorateurs. On attend, pour noter à l’encre, que l’explorateur ait fourni des preuves.<br>– Alors ? interrogea le géographe.<br>– Oh ! chez moi, dit le petit prince, ce n’est pas très intéressant, c’est tout petit. J’ai trois volcans. Deux volcans en activité, et un volcan éteint. Mais on ne sait jamais.<br>– On ne sait jamais, dit le géographe.<br>– J’ai aussi une fleur.<br>– Nous ne notons pas les fleurs, dit le géographe.<br>– Pourquoi ça ! c’est le plus joli !<br>– Parce que les fleurs sont éphémères.</p>`,

        `<p>– Qu’est-ce que signifie : « éphémère » ?<br>– Les géographies, dit le géographe, sont les livres les plus précieux de tous les livres. Elles ne se démodent jamais. Il est très rare qu’une montagne change de place. Il est très rare qu’un océan se vide de son eau. Nous écrivons des choses éternelles.<br>– Mais les volcans éteints peuvent se réveiller, interrompit le petit prince. Qu’est-ce que signifie « éphémère » ?<br>– Que les volcans soient éteints ou soient éveillés, ça revient au même pour nous autres, dit le géographe. Ce qui compte pour nous, c’est la montagne. Elle ne change pas.</p>`,

        `<p>– Mais qu’est-ce que signifie « éphémère » ? répéta le petit prince qui, de sa vie, n’avait renoncé à une question, une fois qu’il l’avait posée.<br>– Ça signifie « qui est menacé de disparition prochaine ».<br>– Ma fleur est menacée de disparition prochaine ?<br>– Bien sûr.<br>Ma fleur est éphémère, se dit le petit prince, et elle n’a que quatre épines pour se défendre contre le monde ! Et je l’ai laissée toute seule chez moi !<br>Ce fut là son premier mouvement de regret. Mais il reprit courage :<br>– Que me conseillez-vous d’aller visiter ? demanda-t-il.<br>– La planète Terre, lui répondit le géographe. Elle a une bonne réputation…<br>Et le petit prince s’en fut, songeant à sa fleur.</p>`,

        `<h1>CHAPITRE XVI</h1>
         <p>La septième planète fut donc la Terre.<br>La Terre n’est pas une planète quelconque ! On y compte cent onze rois (en n’oubliant pas, bien sûr, les rois nègres), sept mille géographes, neuf cent mille businessmen, sept millions et demi d’ivrognes, trois cent onze millions de vaniteux, c’est-à-dire environ deux milliards de grandes personnes.</p>
         <p>Pour vous donner une idée des dimensions de la Terre je vous dirai qu’avant l’invention de l’électricité on y devait entretenir, sur l’ensemble des six continents, une véritable armée de quatre cent soixante-deux mille cinq cent onze allumeurs de réverbères.</p>`,

        `<p>Vu d’un peu loin ça faisait un effet splendide. Les mouvements de cette armée étaient réglés comme ceux d’un ballet d’opéra. D’abord venait le tour des allumeurs de réverbères de Nouvelle-Zélande et d’Australie. Puis ceux-ci, ayant allumé leurs lampions, s’en allaient dormir. Alors entraient à leur tour dans la danse les allumeurs de réverbères de Chine et de Sibérie. Puis eux aussi s’escamotaient dans les coulisses. Alors venait le tour des allumeurs de réverbères de Russie et des Indes. Puis de ceux d’Afrique et d’Europe. Puis de ceux d’Amérique du Sud. Puis de ceux d’Amérique du Nord. Et jamais ils ne se trompaient dans leur ordre d’entrée en scène. C’était grandiose.</p>
         <p>Seuls, l’allumeur de l’unique réverbère du pôle Nord, et son confrère de l’unique réverbère du pôle Sud, menaient des vies d’oisiveté et de nonchalance : ils travaillaient deux fois par an.</p>`,

        `<h1>CHAPITRE XVII</h1>
         <p>Quand on veut faire de l’esprit, il arrive que l’on mente un peu. Je n’ai pas été très honnête en vous parlant des allumeurs de réverbères. Je risque de donner une fausse idée de notre planète à ceux qui ne la connaissent pas. Les hommes occupent très peu de place sur la terre. Si les deux milliards d’habitants qui peuplent la terre se tenaient debout et un peu serrés, comme pour un meeting, ils logeraient aisément sur une place publique de vingt milles de long sur vingt milles de large. On pourrait entasser l’humanité sur le moindre petit îlot du Pacifique.</p>
         <p>Les grandes personnes, bien sûr, ne vous croiront pas. Elles s’imaginent tenir beaucoup de place. Elles se voient importantes comme des baobabs. Vous leur conseillerez donc de faire le calcul. Elles adorent les chiffres : ça leur plaira. Mais ne perdez pas votre temps à ce pensum. C’est inutile. Vous avez confiance en moi.</p>
         <p>Le petit prince, une fois sur terre, fut donc bien surpris de ne voir personne. Il avait déjà peur de s’être trompé de planète, quand un anneau couleur de lune remua dans le sable.</p>
         <p>– Bonne nuit, fit le petit prince à tout hasard.<br>– Bonne nuit, fit le serpent.</p>`,

        `<p>– Sur quelle planète suis-je tombé ? demanda le petit prince.<br>– Sur la Terre, en Afrique, répondit le serpent.</p>`,

        drawingS_SnakeOnEarth,

        `<p>– Tu comprends. C’est trop loin. Je ne peux pas emporter ce corps-là. C’est trop lourd.<br>Moi je me taisais.<br>– Mais ce sera comme une vieille écorce abandonnée. Ce n’est pas triste les vieilles écorces…<br>Moi je me taisais.<br>Il se découragea un peu. Mais il fit encore un effort :<br>– Ce sera gentil, tu sais. Moi aussi je regarderai les étoiles. Toutes les étoiles seront des puits avec une poulie rouillée. Toutes les étoiles me verseront à boire…<br>Moi je me taisais.<br>– Ce sera tellement amusant ! Tu auras cinq cents millions de grelots, j’aurai cinq cents millions de fontaines…<br>Et il se tut aussi, parce qu’il pleurait…<br>– C’est là. Laisse-moi faire un pas tout seul.<br>Et il s’assit parce qu’il avait peur.</p>`,

        `<p>Il dit encore :<br>– Tu sais… ma fleur… j’en suis responsable ! Et elle est tellement faible ! Et elle est tellement naïve. Elle a quatre épines de rien du tout pour la protéger contre le monde…<br>Moi je m’assis parce que je ne pouvais plus me tenir debout. Il dit :<br>– Voilà… C’est tout…<br>Il hésita encore un peu, puis il se releva. Il fit un pas. Moi je ne pouvais pas bouger.<br>Il n'y eut rien qu'un éclair jaune près de sa cheville. Il demeura un instant immobile. Il ne cria pas. Il tomba doucement comme tombe un arbre. Ça ne fit même pas de bruit, à cause du sable.</p>`,

        `<h1>CHAPITRE XXVII</h1>
         <p>Et maintenant, bien sûr, ça fait six ans déjà… Je n’ai jamais encore raconté cette histoire. Les camarades qui m’ont revu ont été bien de me revoir vivant. J’étais triste mais je leur disais : « C’est la fatigue… »<br>Maintenant je me suis un peu consolé. C’est-à-dire… pas tout à fait. Mais je sais bien qu’il est revenu à sa planète, car, au lever du jour, je n’ai pas retrouvé son corps. Ce n'était pas un corps tellement lourd… Et j'aime la nuit écouter les étoiles. C'est comme cinq cent millions de grelots…<br>Mais voilà qu'il se passe quelque chose d'extraordinaire. La muselière que j'ai dessinée pour le petit prince, j'y ai oublié d'ajouter la courroie de cuir ! Il n'aura jamais pu l'attacher au mouton. Alors je me demande : « Que s'est-il passé sur sa planète ? Peut-être bien que le mouton a mangé la fleur… »</p>
         <p>Tantôt je me dis : « Sûrement non ! Le petit prince enferme sa fleur toutes les nuits sous son globe de verre, et il surveille bien son mouton… » Alors je suis heureux. Et toutes les étoiles rient doucement.</p>
         <p>Tantôt je me dis : « On est distrait une fois ou l'autre, et ça suffit ! Il a oublié, un soir, le globe de verre, ou bien le mouton est sorti sans bruit pendant la nuit… » Alors les grelots se changent tous en larmes !…<br>C’est là un bien grand mystère. Pour vous qui aimez aussi le petit prince, comme pour moi, rien de l’univers n’est semblable si quelque part, on ne sait où, un mouton que nous ne connaissons pas a, oui ou non, mangé une rose…<br>Regardez le ciel. Demandez-vous : le mouton oui ou non a-t-il mangé la fleur ? Et vous verrez comme tout change…<br>Et aucune grande personne ne comprendra jamais que ça a tellement d'importance !</p>`,

        `<p>Ça c’est, pour moi, le plus beau et le plus triste paysage du monde. C’est le même paysage que celui de la page précédente, mais je l’ai dessiné une fois encore pour bien vous le montrer. C’est ici que le petit prince a apparu sur terre, puis disparu.</p>`,

        `<p>Regardez attentivement ce paysage afin d’être sûrs de le reconnaître, si vous voyagez un jour en Afrique, dans le désert. Et, s’il vous arrive de passer par là, je vous en supplie, ne vous pressez pas, attendez un peu juste sous l’étoile ! Si alors un enfant vient à vous, s’il rit, s’il a des cheveux d’or, s’il ne répond pas quand on l’interroge, vous devinerez bien qui il est. Alors soyez gentils ! Ne me laissez pas tellement triste : écrivez-moi vite qu’il est revenu…</p>`
      ];

      // App Core Module
      function App() {
        // Safe lazy loading and async decoding of illustrations during text render
        const processedMx = ee.useMemo(() => {

            React.createElement('h2', { className: "cs-hero-subtitle" }, "Antoine de Saint-Exupéry"),
            React.createElement('div', { className: "cs-tarfaya-tribute", style: { textTransform: "none", fontStyle: "italic", fontSize: "1rem", lineHeight: "1.6" } },
              "« À Léon Werth, quand il était petit garçon. »",

      // Initialize optimized React Root with zero execution latency
      ReactDOM.createRoot(document.getElementById("root")).render(
        React.createElement(React.StrictMode, null,

      // PERFECT PWA COMPLIANCE THROUGH SERVICE WORKER GENERATED AS DYNAMIC BLOB
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const serviceWorkerCode = `
            const CACHE_NAME = 'petit-prince-cache-v3';
            const OFFLINE_URL = '/';

            self.addEventListener('install', (event) => {
              event.waitUntil(
                caches.open(CACHE_NAME).then((cache) => {
                  return cache.addAll([OFFLINE_URL]).catch(() => {});
                })
              );
              self.skipWaiting();
            });

            self.addEventListener('activate', (event) => {
              event.waitUntil(
                caches.keys().then((keys) => {
                  return Promise.all(
                    keys.map((key) => {
                      if (key !== CACHE_NAME) {
                        return caches.delete(key);
                      }
                    })
                  );
                })
              );
              self.clients.claim();
            });

            self.addEventListener('fetch', (event) => {
              if (!event.request.url.startsWith('http')) return;
              
              event.respondWith(
                caches.match(event.request).then((cachedResponse) => {
                  if (cachedResponse) {
                    fetch(event.request).then((networkResponse) => {
                      if (networkResponse.status === 200) {
                        caches.open(CACHE_NAME).then((cache) => cache.put(event.request, networkResponse));
                      }
                    }).catch(() => {});
                    return cachedResponse;
                  }
                  return fetch(event.request).then((networkResponse) => {
                    if (networkResponse.status === 200) {
                      const cacheCopy = networkResponse.clone();
                      caches.open(CACHE_NAME).then((cache) => cache.put(event.request, cacheCopy));
                    }
                    return networkResponse;
                  }).catch(() => {
                    return caches.match(OFFLINE_URL);
                  });
                })
              );
            });
          `;

          try {
            const blob = new Blob([serviceWorkerCode], { type: 'application/javascript' });
            const blobURL = URL.createObjectURL(blob);
            navigator.serviceWorker.register(blobURL).then((registration) => {
              console.log('PWA Service Worker registered successfully with scope:', registration.scope);
            }).catch((err) => {
              console.error('Service Worker registration failed:', err);
            });
          } catch (e) {
            console.error('Error creating Dynamic Blob Service worker:', e);
          }
        });
      }
    </script>
