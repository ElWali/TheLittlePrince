        // --- COMPONENT: SECTION 03 (GEOMETRICS SANDBOX) ---
        function InteractiveShapesSection() {
            const [activeTab, setActiveTab] = useState('square');

            // --- RED SQUARE SUBDIVISION STATES ---
            const [gridSize, setGridSize] = useState(3);
            const [rotatedCells, setRotatedCells] = useState({});
            const [coloredCells, setColoredCells] = useState({});

            const handleCellClick = (row, col) => {
                const key = `${row}-${col}`;
                
                // Rotations in increments of 90 degrees
                setRotatedCells(prev => ({
                    ...prev,
                    [key]: (prev[key] || 0) + 90
                }));

                // Cycle color states
                const colors = ['red', 'dark', 'yellow', 'blue'];
                const currentColor = coloredCells[key] || 'red';
                const nextIdx = (colors.indexOf(currentColor) + 1) % colors.length;
                setColoredCells(prev => ({
                    ...prev,
                    [key]: colors[nextIdx]
                }));
            };

            const handleResetSquare = () => {
                setRotatedCells({});
                setColoredCells({});
            };

            // --- BLUE CIRCLE AUDIO SYNTHESIZER STATES ---
            const [isSynthEnabled, setIsSynthEnabled] = useState(false);
            const [ripples, setRipples] = useState([]);
            const [frequency, setFrequency] = useState(220);
            const [volume, setVolume] = useState(0.5);

            const audioCtxRef = useRef(null);
            const oscRef = useRef(null);
            const gainRef = useRef(null);
            const padRef = useRef(null);

            // Cleanup music soundwaves
            useEffect(() => {
                return () => stopOscillator();
            }, []);

            const startOscillator = () => {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new AudioContextClass();
                    }
                    if (audioCtxRef.current.state === 'suspended') {
                        audioCtxRef.current.resume();
                    }
                    if (!oscRef.current) {
                        const ctx = audioCtxRef.current;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();

                        osc.type = 'sine'; // pure Bauhaus wave
                        osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                        
                        gain.gain.setValueAtTime(isSynthEnabled ? volume * 0.15 : 0, ctx.currentTime);

                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();

                        oscRef.current = osc;
                        gainRef.current = gain;
                    }
                } catch (e) {
                    console.warn('Web Audio synthesis not accessible:', e);
                }
            };

            const updateOscillator = (freq, vol) => {
                if (oscRef.current && gainRef.current && audioCtxRef.current) {
                    const ctx = audioCtxRef.current;
                    oscRef.current.frequency.setValueAtTime(freq, ctx.currentTime);
                    gainRef.current.gain.setValueAtTime(isSynthEnabled ? vol * 0.12 : 0, ctx.currentTime);
                }
            };

            const stopOscillator = () => {
                if (oscRef.current) {
                    try {
                        oscRef.current.stop();
                        oscRef.current.disconnect();
                    } catch (e) {}
                    oscRef.current = null;
                }
                gainRef.current = null;
            };

            const handlePadInteraction = (e) => {
                if (!padRef.current) return;
                const { left, top, width, height } = padRef.current.getBoundingClientRect();
                const clickX = e.clientX - left;
                const clickY = e.clientY - top;

                const ratioX = clickX / width;
                const ratioY = 1 - (clickY / height);

                const freqVal = Math.round(110 + ratioX * 550); // frequency 110Hz to 660Hz
                const volVal = parseFloat(ratioY.toFixed(2));

                setFrequency(freqVal);
                setVolume(volVal);

                // Add active visual ripple
                const rippleId = Date.now();
                setRipples(prev => [...prev, { id: rippleId, x: clickX, y: clickY, r: 8 }]);

                if (isSynthEnabled) {
                    if (!oscRef.current) {
                        startOscillator();
                    } else {
                        updateOscillator(freqVal, volVal);
                    }
                }
            };

            const handlePadLeave = () => {
                if (gainRef.current && audioCtxRef.current) {
                    gainRef.current.gain.setValueAtTime(0, audioCtxRef.current.currentTime);
                }
            };

            const handleToggleSynth = () => {
                const nextState = !isSynthEnabled;
                setIsSynthEnabled(nextState);
                if (nextState) {
                    startOscillator();
                } else {
                    stopOscillator();
                }
            };

            // Animate ripples coordinates expansion loops
            useEffect(() => {
                if (ripples.length === 0) return;
                const timer = setInterval(() => {
                    setRipples(prev => 
                        prev
                            .map(r => ({ ...r, r: r.r + 4 }))
                            .filter(r => r.r < 180)
                    );
                }, 16);
                return () => clearInterval(timer);
            }, [ripples]);

            const [triRot, setTriRot] = useState(0);
            const [triSkew, setTriSkew] = useState(0);
            const [triScale, setTriScale] = useState(1);

                    id="shapes"

                            <span className="font-mono text-xs font-black text-bauhaus-cream bg-bauhaus-blue px-1.5 py-0.5 tracking-widest shadow-bauhaus-sm">03 // INTERACTIONS</span>
                            <div className="h-[1px] w-12 bg-bauhaus-dark/45" />
                            <span className="font-mono text-xs tracking-widest text-bauhaus-dark/70 uppercase font-bold">Interactive Geometries Laboratory</span>
                        </div>

                        <div className="font-mono text-[11px] text-bauhaus-dark/60 bg-bauhaus-sand border border-bauhaus-grid px-3 py-1 font-bold">
                            * PRESS OBJECTS DIRECTLY TO STIMULATE SOUNDS AND FORMS
                        </div>
                    </div>

                    {/* Section headers */}
                    <div className="relative z-10 mb-8 max-w-3xl">
                        <h2 className="font-sans text-4xl md:text-5xl lg:text-6xl font-black text-bauhaus-dark tracking-tighter uppercase leading-none">
                            GEOMETRIC PLAYFIELD
                        </h2>
                        <p className="font-mono text-xs text-bauhaus-dark/80 mt-3 max-w-xl font-semibold">
                            Select a shape component node inside the tab rail below to load its dedicated tactile sandbox. Explore the psychological weights of the pure red square, resonant blue circle, and unstable yellow triangle.
                        </p>
                    </div>

                    {/* Tab Selection Row */}
                    <div className="relative z-10 flex gap-4 w-full justify-start border-b border-bauhaus-dark pb-6 mb-12 flex-wrap">
                        <button
                            onClick={() => { setActiveTab('square'); stopOscillator(); }}
                            className={`flex items-center gap-3 px-5 py-3 border font-mono text-xs font-black uppercase transition-all duration-200 cursor-pointer shadow-bauhaus-sm focus:outline-none ${
                                activeTab === 'square'
                                    ? 'bg-bauhaus-red text-bauhaus-cream border-bauhaus-dark translate-y-[2px]'
                                    : 'bg-bauhaus-cream text-bauhaus-dark border-bauhaus-grid hover:bg-bauhaus-sand'
                            }`}
                        >
                            <svg className="w-4 h-4 fill-current opacity-90" viewBox="0 0 100 100">
                                <rect width="100" height="100" />
                            </svg>
                            <span>I. RED SQUARE</span>
                        </button>

                        <button
                            onClick={() => setActiveTab('circle')}
                            className={`flex items-center gap-3 px-5 py-3 border font-mono text-xs font-black uppercase transition-all duration-200 cursor-pointer shadow-bauhaus-sm focus:outline-none ${
                                activeTab === 'circle'
                                    ? 'bg-bauhaus-blue text-bauhaus-cream border-bauhaus-dark translate-y-[2px]'
                                    : 'bg-bauhaus-cream text-bauhaus-dark border-bauhaus-grid hover:bg-bauhaus-sand'
                            }`}
                        >
                            <svg className="w-4 h-4 fill-current opacity-90" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50" />
                            </svg>
                            <span>II. BLUE CIRCLE</span>
                        </button>

                        <button

                                activeTab === 'triangle'

                                    : 'bg-bauhaus-cream text-bauhaus-dark border-bauhaus-grid hover:bg-bauhaus-sand'

                                <polygon points="50,0 100,100 0,100" />

                            <span>III. YELLOW TRIANGLE</span>
                        </button>

                    {/* Canvas Frame Structure */}
                    <div className="relative z-10 w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-stretch min-h-[460px]">
                        
                        {/* Playfield sandbox canvas area */}

                            <div className="absolute inset-0 bauhaus-grid-fine opacity-70 pointer-events-none" />
                            
                            <div className="absolute top-4 left-4 font-mono text-[9px] text-bauhaus-dark/40 font-bold">
                                PLAYGROUND_CANVAS_03
                            </div>

                            {/* SUBDIVISION RED SQUARE */}
                            {activeTab === 'square' && (
                                <div

                                    style={{
                                        gridTemplateColumns: `repeat(${gridSize}, 1fr)`,
                                        gridTemplateRows: `repeat(${gridSize}, 1fr)`,

                                    {Array.from({ length: gridSize * gridSize }).map((_, idx) => {
                                        const row = Math.floor(idx / gridSize);
                                        const col = idx % gridSize;
                                        const key = `${row}-${col}`;
                                        const coreColor = coloredCells[key] || 'red';

                                        const colorMap = {

                                            dark: 'bg-bauhaus-dark text-white',

                                            blue: 'bg-bauhaus-blue text-white'

                                        return (

                            {activeTab === 'circle' && (

                                                    }}

                                        <div className="absolute left-0 right-0 top-1/2 h-[1px] border-t border-dashed border-white/20 pointer-events-none" />

        function WorkshopSection() {
            const [shapes, setShapes] = useState(INITIAL_WORKSHOP_SHAPES);
            const [selectedId, setSelectedId] = useState('shape-1');
            const canvasRef = useRef(null);

            // Form registry variables
            const [designerName, setDesignerName] = useState('');
            const [designerEmail, setDesignerEmail] = useState('');
            const [discipline, setDiscipline] = useState('typography');
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [submitError, setSubmitError] = useState('');

            // Shape Spawner Nodes
            const handleAddShape = (type) => {
                const uniqueId = `shape-${Date.now()}`;
                const defaultColors = {
                    circle: 'blue',
                    square: 'red',
                    triangle: 'yellow'
                };

                const spawnedShape = {
                    id: uniqueId,
                    type,
                    x: Math.round(35 + Math.random() * 30),
                    y: Math.round(35 + Math.random() * 30),
                    scale: 0.8,
                    rotation: 0,
                    color: defaultColors[type]
                };

                setShapes([...shapes, spawnedShape]);
                setSelectedId(uniqueId);
            };

            const selectedShape = shapes.find(s => s.id === selectedId);

            // Adjust values of selected elements
            const updateSelectedShape = (fields) => {
                if (!selectedId) return;
                setShapes(prev => 
                    prev.map(s => s.id === selectedId ? { ...s, ...fields } : s)
                );
            };

            // Layers stacking handlers
            const handleBringToFront = () => {
                if (!selectedId) return;
                const active = shapes.find(s => s.id === selectedId);
                if (!active) return;
                const rest = shapes.filter(s => s.id !== selectedId);
                setShapes([...rest, active]);
            };

            const handleSendToBack = () => {
                if (!selectedId) return;
                const active = shapes.find(s => s.id === selectedId);
                if (!active) return;
                const rest = shapes.filter(s => s.id !== selectedId);
                setShapes([active, ...rest]);
            };

            const handleDeleteShape = () => {
                if (!selectedId) return;
                setShapes(prev => prev.filter(s => s.id !== selectedId));
                setSelectedId(null);
            };

            const handleClearAll = () => {
                setShapes([]);
                setSelectedId(null);
            };

            // Touch and Mouse Manual Drag and Drop Handler (Buttery-smooth UMD custom mechanic!)
            const handleStartDrag = (e, shapeId, isTouch = false) => {
                e.preventDefault();
                setSelectedId(shapeId);
                
                const canvas = canvasRef.current;
                if (!canvas) return;

                const getCoordinates = (evt) => {
                    const clientX = isTouch ? evt.touches[0].clientX : evt.clientX;
                    const clientY = isTouch ? evt.touches[0].clientY : evt.clientY;
                    return { clientX, clientY };
                };

                const handleDragMove = (evt) => {
                    const rect = canvas.getBoundingClientRect();
                    const { clientX, clientY } = getCoordinates(evt);

                    const xRatio = Math.round(Math.min(Math.max(((clientX - rect.left) / rect.width) * 100, 0), 100));
                    const yRatio = Math.round(Math.min(Math.max(((clientY - rect.top) / rect.height) * 100, 0), 100));

                    setShapes(prev => 
                        prev.map(s => s.id === shapeId ? { ...s, x: xRatio, y: yRatio } : s)
                    );
                };

                const handleDragEnd = () => {
                    if (isTouch) {
                        window.removeEventListener('touchmove', handleDragMove);
                        window.removeEventListener('touchend', handleDragEnd);
                    } else {
                        window.removeEventListener('mousemove', handleDragMove);
                        window.removeEventListener('mouseup', handleDragEnd);
                    }
                };

                if (isTouch) {
                    window.addEventListener('touchmove', handleDragMove, { passive: false });
                    window.addEventListener('touchend', handleDragEnd);
                } else {
                    window.addEventListener('mousemove', handleDragMove);
                    window.addEventListener('mouseup', handleDragEnd);
                }
            };

            // Validation Form Submission Handler
            const handleRegisterArchive = (e) => {
                e.preventDefault();
                if (!designerName.trim() || !designerEmail.trim()) {
                    setSubmitError('PLEASE SUPPLY BOTH SYSTEM MONIKER AND STAMP EMAIL');
                    return;

                            <span className="font-mono text-xs font-black text-bauhaus-cream bg-bauhaus-red px-1.5 py-0.5 tracking-widest shadow-bauhaus-sm">05 // WORKSHOP</span>
                            <div className="h-[1px] w-12 bg-bauhaus-dark/45" />
                            <span className="font-mono text-xs tracking-widest text-bauhaus-dark/70 uppercase font-bold">WEIMAR DESIGN LAB</span>
                        </div>

                        <div className="font-mono text-[11px] text-bauhaus-dark/60 flex items-center gap-2">
                            <IconRuler />
                            <span>COMPOSITION ENGINE V5.1</span>
                        </div>
                    </div>

                    {/* Content text block headers */}
                    <div className="relative z-10 mb-12 max-w-2xl">
                        <h2 className="font-sans text-4xl md:text-5xl lg:text-6xl font-black text-bauhaus-dark tracking-tighter uppercase leading-none">
                            POSTER WORKSHOP
                        </h2>
                        <p className="font-mono text-xs text-bauhaus-dark/80 mt-3 font-semibold leading-relaxed">
                            Unlock your inner Gropius. Drag geometric elements, configure their active rotation, stack priorities, and paint primary hues to build a unique modernist exhibition sheet.
                        </p>
                    </div>

                    {/* Playfield sandbox wrapper split */}
                    <div className="relative z-10 grid grid-cols-1 lg:grid-cols-12 gap-12 items-stretch mb-16">
                        
                        {/* LEFT SIDE: Drafting Canvas Board Sketchboard */}
                        <div className="lg:col-span-6 xl:col-span-7 flex flex-col gap-4">
                            
                            {/* Drafting blueprint scale indices */}
                            <div className="flex items-center justify-between font-mono text-[9px] text-bauhaus-dark/40 font-bold px-2 relative leading-none">
                                <span>0CM [ANCR]</span>
                                <span>10CM</span>
                                <span>20CM</span>
                                <span>30CM</span>
                                <span>40CM [END]</span>
                                <div className="h-2 w-[1px] bg-bauhaus-dark/20 absolute left-2 bottom-[-10px]" />
                                <div className="h-2 w-[1px] bg-bauhaus-dark/20 absolute right-2 bottom-[-10px]" />
                            </div>

                            <div 
                                ref={canvasRef}
                                className="w-full aspect-[4/5] border-3 border-bauhaus-dark bg-bauhaus-cream shadow-bauhaus p-4 relative overflow-hidden select-none"
                            >
                                {/* Drafting Grid background covers */}
                                <div className="absolute inset-0 bauhaus-grid-fine opacity-90 pointer-events-none" />
                                <div className="absolute inset-4 border border-dashed border-bauhaus-dark/15 pointer-events-none" />

                                {/* Empty placeholder container */}
                                {shapes.length === 0 && (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center font-mono text-xs text-bauhaus-dark/40">
                                        <span className="mb-2 uppercase font-bold">Canvas Cleared</span>
                                        <span>Sprout primary geometries from side buttons to compose!</span>
                                    </div>
                                )}

                                {/* Renders active shape elements */}
                                {shapes.map((sh) => {
                                    const isSelected = sh.id === selectedId;
                                    const colorMap = {
                                        red: 'bg-bauhaus-red',
                                        blue: 'bg-bauhaus-blue',
                                        yellow: 'bg-bauhaus-yellow text-bauhaus-dark',
                                        dark: 'bg-bauhaus-dark text-bauhaus-cream',
                                        beige: 'bg-bauhaus-sand'
                                    };

                                    const selectionBorders = isSelected 
                                        ? 'ring-2 ring-bauhaus-dark ring-offset-2 scale-102 z-40' 
                                        : 'hover:scale-[1.01] hover:shadow-md';

                                    return (
                                        <div
                                            key={sh.id}
                                            onMouseDown={(e) => handleStartDrag(e, sh.id, false)}
                                            onTouchStart={(e) => handleStartDrag(e, sh.id, true)}
                                            className={`absolute cursor-grab active:cursor-grabbing origin-center shadow-lg transition-transform duration-75 ${colorMap[sh.color]} ${selectionBorders}`}
                                            style={{
                                                left: `${sh.x}%`,
                                                top: `${sh.y}%`,
                                                transform: `translate(-50%, -50%) scale(${sh.scale}) rotate(${sh.rotation}deg)`,
                                                width: sh.type === 'triangle' ? '0' : '82px',
                                                height: sh.type === 'triangle' ? '0' : '82px',
                                            }}
                                        >
                                            {/* Square shape inner frames */}
                                            {sh.type === 'square' && (
                                                <div className="w-full h-full border border-white/20 flex items-center justify-center relative">
                                                    <div className="w-4 h-4 border border-white/40" />
                                                </div>
                                            )}

                                            {/* Circle shape inner frames */}
                                            {sh.type === 'circle' && (
                                                <div className="w-full h-full rounded-full border border-white/20 flex items-center justify-center relative">
                                                    <div className="w-4 h-4 rounded-full border border-white/40" />
                                                </div>
                                            )}

                                            {/* Triangle custom geometries inside bounding SVG box */}
                                            {sh.type === 'triangle' && (
                                                <div className="relative -left-10 -top-10 w-20 h-20 flex items-center justify-center text-current fill-current">
                                                    <svg viewBox="0 0 100 100" className="w-full h-full">
                                                        <polygon points="50,15 88,80 12,80" />
                                                    </svg>
                                                </div>
                                            )}

                                            {/* Label flag identifier */}
                                            {isSelected && (
                                                <div className="absolute -top-6 -left-2 bg-bauhaus-dark text-[8px] text-white px-1 leading-none font-mono py-0.5 rounded-none uppercase z-50 pointer-events-none">
                                                    EDITING
                                                </div>
                                            )}

                                        </div>
                                    );
                                })}

                            </div>

                            {/* Scale feedback information panels */}
                            <div className="flex gap-4 items-center justify-between font-mono text-[10px] text-bauhaus-dark/70 font-black">
                                <span>DRAG_NODE_OBJECT_TO_SHAPE</span>
                                <span className="text-bauhaus-red">TOTAL BLOCKS: {shapes.length}</span>
                            </div>

                        </div>

                        {/* RIGHT SIDE: Shape spawner dials controller config area */}
                        <div className="lg:col-span-6 xl:col-span-5 flex flex-col gap-6">
                            
                            {/* BLOCK CONTROLLER CONSOLE */}
                            <div className="border-2 border-bauhaus-dark p-6 bg-bauhaus-sand shadow-bauhaus-sm">
                                <h3 className="font-sans text-sm font-black text-bauhaus-dark uppercase border-b border-bauhaus-dark pb-3 mb-4 flex items-center gap-2">
                                    <IconPlus />
                                    SPAWN SHAPES
                                </h3>

                                {/* Quick addition action matrices */}
                                <div className="grid grid-cols-3 gap-3 mb-6">
                                    <button
                                        onClick={() => handleAddShape('square')}
                                        className="border border-bauhaus-dark bg-bauhaus-cream hover:bg-bauhaus-red hover:text-white p-3 font-mono text-xs font-black uppercase flex flex-col items-center gap-2 transition-all cursor-pointer shadow-bauhaus-sm focus:outline-none"
                                    >
                                        <div className="w-6 h-6 bg-current text-bauhaus-red" />
                                        <span>+ SQUARE</span>
                                    </button>

                                    <button
                                        onClick={() => handleAddShape('circle')}
                                        className="border border-bauhaus-dark bg-bauhaus-cream hover:bg-bauhaus-blue hover:text-white p-3 font-mono text-xs font-black uppercase flex flex-col items-center gap-2 transition-all cursor-pointer shadow-bauhaus-sm focus:outline-none"
                                    >
                                        <div className="w-6 h-6 bg-current text-bauhaus-blue rounded-full" />
                                        <span>+ CIRCLE</span>
                                    </button>

                                    <button
                                        onClick={() => handleAddShape('triangle')}
                                        className="border border-bauhaus-dark bg-bauhaus-cream hover:bg-bauhaus-yellow hover:text-bauhaus-dark p-3 font-mono text-xs font-black uppercase flex flex-col items-center gap-2 transition-all cursor-pointer shadow-bauhaus-sm focus:outline-none"
                                    >
                                        <div className="w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-b-[20px] border-b-current text-bauhaus-yellow" />
                                        <span>+ TRIANGLE</span>
                                    </button>
                                </div>

                                {/* ACTIVE CHOSEN SHAPE PARAMETER DIALS */}
                                {selectedShape ? (
                                    <div className="flex flex-col gap-4 border-t border-dashed border-bauhaus-dark/20 pt-4">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="font-mono text-xs font-black text-bauhaus-dark uppercase">
                                                ACTIVE GEOMETRY: {selectedShape.type}
                                            </span>
                                            <button
                                                onClick={handleDeleteShape}
                                                className="p-1 px-2 border border-transparent hover:border-bauhaus-red hover:bg-bauhaus-red/5 text-bauhaus-red font-semibold text-xs flex items-center gap-1 transition-all focus:outline-none cursor-pointer"
                                            >
                                                <IconTrash2 />
                                                <span>DISCARD</span>
                                            </button>
                                        </div>

                                        {/* Color state button selector row */}
                                        <div>
                                            <label className="font-mono text-[9px] font-black tracking-wider text-bauhaus-dark/60 uppercase block mb-1.5">
                                                1. Palette Hue Accent:
                                            </label>
                                            <div className="flex gap-2">
                                                {['red', 'blue', 'yellow', 'dark', 'beige'].map((c) => {
                                                    let colClass = 'bg-bauhaus-red';
                                                    if (c === 'blue') colClass = 'bg-bauhaus-blue';
                                                    if (c === 'yellow') colClass = 'bg-bauhaus-yellow';
                                                    if (c === 'dark') colClass = 'bg-bauhaus-dark';
                                                    if (c === 'beige') colClass = 'bg-bauhaus-sand';

                                                    return (
                                                        <button
                                                            key={c}
                                                            onClick={() => updateSelectedShape({ color: c })}
                                                            className={`w-6 h-6 border ${colClass} cursor-pointer focus:outline-none focus:ring-1 focus:ring-black ${
                                                                selectedShape.color === c ? 'ring-2 ring-bauhaus-dark' : 'opacity-80'
                                                            }`}
                                                        />
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* Slider: Scale configurations */}
                                        <div>
                                            <div className="flex justify-between font-mono text-[10px] font-black text-bauhaus-dark/70 mb-1">
                                                <span>2. SCALE COEFFICIENT:</span>
                                                <span>{selectedShape.scale.toFixed(1)}x</span>
                                            </div>
                                            <input
                                                type="range"
                                                min="0.3"
                                                max="2.0"
                                                step="0.1"
                                                value={selectedShape.scale}
                                                onChange={(e) => updateSelectedShape({ scale: parseFloat(e.target.value) })}
                                                className="w-full accent-bauhaus-dark h-1 bg-bauhaus-grid rounded-none cursor-pointer"
                                            />
                                        </div>

                                        {/* Slider: Rotations configurations */}
                                        <div>
                                            <div className="flex justify-between font-mono text-[10px] font-black text-bauhaus-dark/70 mb-1">
                                                <span>3. VECTOR ANGLE GRID:</span>
                                                <span>{selectedShape.rotation}°</span>
                                            </div>
                                            <input
                                                type="range"
                                                min="0"
                                                max="360"
                                                value={selectedShape.rotation}
                                                onChange={(e) => updateSelectedShape({ rotation: parseInt(e.target.value) })}
                                                className="w-full accent-bauhaus-dark h-1 bg-bauhaus-grid rounded-none cursor-pointer"
                                            />
                                        </div>

                                        {/* Layer prioritizing actions buttons */}
                                        <div className="flex gap-2 text-center mt-2">
                                            <button
                                                onClick={handleBringToFront}
                                                className="flex-1 border border-bauhaus-dark bg-bauhaus-cream hover:bg-bauhaus-dark hover:text-white p-2 font-mono text-[10px] font-black uppercase flex items-center justify-center gap-1.5 transition-all cursor-pointer focus:outline-none"
                                            >
                                                UP FLOOR
                                            </button>
                                            <button
                                                onClick={handleSendToBack}
                                                className="flex-1 border border-bauhaus-dark bg-bauhaus-cream hover:bg-bauhaus-dark hover:text-white p-2 font-mono text-[10px] font-black uppercase flex items-center justify-center gap-1.5 transition-all cursor-pointer focus:outline-none"
                                            >
                                                DOWN FLOOR
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center font-mono text-[10px] text-bauhaus-dark/50 border-t border-dashed border-bauhaus-dark/20 pt-6">
                                        * CHOOSE AN OBJECT ON THE BLUEPRINT SKETCHBOARD TO UNLOCK MODIFIER DIALS
                                    </div>
                                )}

                                {/* Clear all actions buttons */}
                                {shapes.length > 0 && (
                                    <div className="border-t border-bauhaus-dark/20 mt-6 pt-4">
                                        <button
                                            onClick={handleClearAll}
                                            className="w-full bg-bauhaus-dark text-bauhaus-cream hover:bg-bauhaus-red py-2 font-mono text-[10px] font-black transition-all uppercase cursor-pointer"
                                        >
                                            DESTRUCT ACTIVE SKETCHBOARD
                                        </button>
                                    </div>
                                )}
                            </div>

                            {/* SIGNATURE ARCHIVE REGISTER FORM CARD */}
                            <div className="border-2 border-bauhaus-dark p-6 bg-bauhaus-cream shadow-bauhaus">
                                <h3 className="font-sans text-sm font-black text-bauhaus-dark uppercase border-b border-bauhaus-dark pb-3 mb-4 flex items-center gap-2">
                                    <IconUserCheck />
                                    ARCHIVE REGISTER
                                </h3>

                                {isSubmitted ? (
                                    <div className="bg-bauhaus-blue p-5 border border-bauhaus-dark text-bauhaus-cream text-center">
                                        <div className="animate-bounce mb-3">
                                            <IconSparkles />
                                        </div>
                                        <h4 className="font-sans text-lg font-black tracking-tight mb-2 uppercase">LOCKED SECURELY IN CACHE</h4>
                                        <p className="font-mono text-[10px] leading-relaxed">
                                            Your profile and custom design layouts have been locked securely in the Bauhaus Modern Art catalog repository of year 2026.
                                        </p>
                                        <div className="font-mono text-[9px] bg-black/30 p-2 mt-4 inline-block font-black uppercase">
                                            STREAM: {discipline}
                                        </div>
                                    </div>
                                ) : (
                                    <form onSubmit={handleRegisterArchive} className="flex flex-col gap-4">
                                        {submitError && (
                                            <div className="p-3 bg-bauhaus-red text-white font-mono text-[10px] font-black flex items-center gap-1.5 border border-bauhaus-dark">
                                                <IconShieldAlert />
                                                <span>{submitError}</span>
                                            </div>
                                        )}

                                        <div>
                                            <label className="font-mono text-[10px] font-black block mb-1 text-bauhaus-dark/80 uppercase">
                                                1. DESIGNER NAME OR MONIKER:
                                            </label>
                                            <input
                                                type="text"
                                                required
                                                placeholder="e.g. Bauhaus Apprentice"
                                                value={designerName}
                                                onChange={(e) => setDesignerName(e.target.value)}
                                                className="w-full border border-bauhaus-dark bg-bauhaus-sand p-2 font-mono text-xs focus:ring-1 focus:ring-bauhaus-blue focus:outline-none placeholder-bauhaus-dark/45 font-bold"
                                            />
                                        </div>

                                        <div>
                                            <label className="font-mono text-[10px] font-black block mb-1 text-bauhaus-dark/80 uppercase">
                                                2. SECURE EMAIL ADDRESS:
                                            </label>
                                            <input
                                                type="email"
                                                required
                                                placeholder="apprentice@staatliches.de"
                                                value={designerEmail}
                                                onChange={(e) => setDesignerEmail(e.target.value)}
                                                className="w-full border border-bauhaus-dark bg-bauhaus-sand p-2 font-mono text-xs focus:ring-1 focus:ring-bauhaus-blue focus:outline-none placeholder-bauhaus-dark/45 font-bold"
                                            />
                                        </div>

                                        <div>
                                            <label className="font-mono text-[10px] font-black block mb-1 text-bauhaus-dark/80 uppercase">
                                                3. WORKSHOP DISCIPLINE PATHWARD:
                                            </label>
                                            <select
                                                value={discipline}
                                                onChange={(e) => setDiscipline(e.target.value)}
                                                className="w-full border border-bauhaus-dark bg-bauhaus-sand p-2 font-mono text-xs font-bold focus:ring-1 focus:ring-bauhaus-blue focus:outline-none"
                                            >
                                                <option value="typography">TYPOGRAPHY (HERBERT BAYER)</option>
                                                <option value="architecture">ARCHITECTURE (WALTER GROPIUS)</option>
                                                <option value="painting">PAINTING (KANDINSKY / KLEE)</option>
                                                <option value="sculpture">SCULPTURE (SCHLEMMER)</option>
                                            </select>
                                        </div>

                                        <button
                                            type="submit"
                                            className="w-full mt-2 bg-bauhaus-dark text-bauhaus-cream hover:bg-bauhaus-blue py-2.5 font-mono text-xs font-black shadow-bauhaus-sm uppercase flex items-center justify-center gap-2 cursor-pointer transition-colors focus:outline-none"
                                        >
                                            COMMIT LAYOUTS TO ACADEMY REGISTER
                                        </button>
                                    </form>
                                )}
                            </div>

                        </div>

                    </div>

                    {/* Section Footer */}
                    <div className="relative z-10 w-full pt-6 border-t border-bauhaus-grid flex justify-between items-center font-mono text-[11px] text-bauhaus-dark/45 mt-12">
                        <span>• MODULE_ID: ART_SYNTHESIS_5</span>
                        <span>• ALL SYSTEMS VALIDATED</span>
                    </div>
                </section>
            );
        }


        // Render standard entry mount inside the DOM element
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
